      const tx = 1 + i*(stw+1);
      const sel = this._combat_inv_subtab === i;
      drect(sel ? DBLUE : rgb(30,30,30), tx, 15, stw, 11);
      drect(sel ? CYAN : MGRAY, tx, 15, stw, 11, true);
      dtext(SUB[i], tx+2, 17, sel ? WHITE : GRAY);
    }

    // Categorise inventory
    const JUNK_GEM = new Set(["junk","gem"]);
    const CONSUME  = new Set(["heal","cure_p","cure_f","cure_a","uncurse","recall","id",
                               "lapis","fire_s","lit_s","shield_s","annihilate"]);
    const GEAR     = new Set(["weapon","armor"]);

    const items = [];
    for(let i=0; i<p.inventory.length; i++){
      const n = p.inventory[i];
      const itype = ITEMS[n] ? ITEMS[n][2] : "misc";
      const bucket = JUNK_GEM.has(itype)?0 : CONSUME.has(itype)?1 : GEAR.has(itype)?2 : -1;
      if(bucket === this._combat_inv_subtab) items.push({name:n, raw_idx:i});
    }

    // Group for display (stack consumables/junk)
    const STACKABLE = new Set(["junk","gem","heal","cure_p","cure_f","cure_a","uncurse",
                                "recall","id","lapis","fire_s","lit_s","shield_s","annihilate"]);
    const grouped = []; const seen = {};
    for(const {name:n, raw_idx} of items){
      const itype = ITEMS[n] ? ITEMS[n][2] : "misc";
      if(STACKABLE.has(itype)){
        if(!seen[n]){ seen[n]={name:n, raw_idx, count:0}; grouped.push(seen[n]); }
        seen[n].count++;
      } else {
        grouped.push({name:n, raw_idx, count:1});
      }
    }

    // Scroll
    const ROW_H = 10;
    const list_y = 28;
    const visible = ((SH - list_y - 14) / ROW_H) | 0;
    if(!this._cinv_scroll) this._cinv_scroll = 0;
    this._cinv_scroll = Math.min(this._cinv_scroll, Math.max(0, grouped.length - visible));
    if(!this._cinv_cur) this._cinv_cur = 0;
    this._cinv_cur = Math.max(0, Math.min(this._cinv_cur, grouped.length - 1));

    if(!grouped.length){
      dtext("(empty)", 44, list_y+20, GRAY);
    } else {
      for(let i=0; i<visible; i++){
        const idx = this._cinv_scroll + i;
        if(idx >= grouped.length) break;
        const {name:n, count} = grouped[idx];
        const sel = idx === this._cinv_cur;
        const col = ITEMS[n] ? ITEMS[n][4] : WHITE;
        if(sel) drect(DBLUE, 0, list_y+i*ROW_H, SW-6, ROW_H-1);
        let tag = "";
        if(n === p.weapon) tag = "[W]";
        else if(n === p.armor) tag = "[A]";
        if(p.enchants[n]?.length) tag += "★";
        if(p.is_cursed && p.is_cursed(n)) tag += "(C)";
        const qty = count > 1 ? ` ×${count}` : "";
        dtext(`${n.slice(0,16)}${qty}${tag}`, 3, list_y+i*ROW_H+1, sel ? WHITE : col);
        if(sel) dtext("A:use", SW-32, list_y+i*ROW_H+1, CYAN);
      }
    }

    // Bottom bar
    drect(DGRAY, 0, SH-12, SW, 12);
    dtext("L/R:Tab U/D:Pick A:Use B:Back", 2, SH-10, GRAY);
    this.draw_msg();

    const e = poll();
    if(e.b || e.m){ this.gs = ret; this._cinv_scroll=0; this._cinv_cur=0; return; }
    if(e.l){ this._combat_inv_subtab=(this._combat_inv_subtab-1+3)%3; this._cinv_scroll=0; this._cinv_cur=0; }
    else if(e.r){ this._combat_inv_subtab=(this._combat_inv_subtab+1)%3; this._cinv_scroll=0; this._cinv_cur=0; }
    else if(e.u){
      this._cinv_cur = Math.max(0, this._cinv_cur-1);
      if(this._cinv_cur < this._cinv_scroll) this._cinv_scroll = this._cinv_cur;
    }
    else if(e.d){
      this._cinv_cur = Math.min(grouped.length-1, this._cinv_cur+1);
      if(this._cinv_cur >= this._cinv_scroll + visible) this._cinv_scroll++;
    }
    else if(e.a && grouped.length){
      const entry = grouped[this._cinv_cur];
      if(!entry) return;
      const itype_check = ITEMS[entry.name] ? ITEMS[entry.name][2] : "misc";
      // Combat scrolls must be in actual combat to fire
      const in_combat = (ret === GS_COMBAT || ret === GS_BOSS_COMBAT);
      if((itype_check === "fire_s" || itype_check === "lit_s" || itype_check === "annihilate") && !in_combat){
        this.show_msg("Use in battle!");
        return;
      }
      if(itype_check === "shield_s" && !in_combat){
        this.show_msg("Use in battle!");
        return;
      }
      const result = p.use_item(entry.raw_idx);
      if(!result) return;
      const [msg, tag] = result;
      // Apply scroll effects directly
      if(tag === "fire_s" || tag === "lit_s"){
        // msg holds the scroll's display name; SCROLL_DATA indexes by that name
        const d = SCROLL_DATA[msg];
        if(d){
          const color = (tag === "fire_s") ? ORANGE : YELLOW;
          this._cast_damage_scroll(msg, d, color);
        }
        this.gs = ret; return;
      }
      if(tag === "shield_s"){
        const d = SCROLL_DATA[msg];
        if(d){
          const total_turns = d.turns + this.p.invocation_rank;
          this._shield_turns = total_turns;
          this._shield_immune = !!d.status_immune;
          this.show_msg(`Shield ${total_turns} turn${total_turns>1?"s":""}!`);
          burst(SW/2, SH-30, d.color, 18);
          flash(d.color, 5);
        }
        this.gs = ret; return;
      }
      if(tag === "annihilate"){
        // Instant kill regular monsters; 30% boss HP
        if(this.is_boss_fight && this.boss_data){
          const dmg = (this.boss_data[1] * 0.30) | 0;
          this.boss_data[2] -= dmg;
          this.show_msg(`Annihilate! -${dmg}HP!`);
        } else if(this.combat_mon){
          this.combat_mon[2] = 0;
          this.show_msg("Annihilated!");
        }
        FX.combat_target_flash = 8; shake(8); flash(WHITE, 10);
        burst(64, 28, WHITE, 30);
        this.gs = ret; return;
      }
      if(tag === "recall"){
        this.gs = GS_VILLAGE;
        this.show_msg(msg || "Recalled");
        return;
      }
      // For weapons/armor equipped or normal consumables, just show the message
      if(msg) this.show_msg(msg);
      // Rebuild cursor position to handle stack reduction
      const new_grouped_len = Math.max(0, grouped.length - 1);
      if(this._cinv_cur > new_grouped_len-1) this._cinv_cur = Math.max(0, new_grouped_len-1);
    }
  }

  // ── SCROLL PICKER (Magic button in combat) ───────────────────────
  _open_scroll_picker(){
    // Picker shows: damage/shield scrolls (cost a charge) + status cures (FREE)
    // Does NOT show: Recall (escape, not magic), ID, equipment, healing potions.
    const cost_charge = new Set(["fire_s","lit_s","shield_s","annihilate"]);
    const free_use    = new Set(["cure_p","cure_f","cure_a","uncurse"]);
    const counts = {};
    const order = [];
    for(const n of this.p.inventory){
      const t = ITEMS[n] && ITEMS[n][2];
      if(!cost_charge.has(t) && !free_use.has(t)) continue;
      if(!(n in counts)){ counts[n] = 0; order.push(n); }
      counts[n]++;
    }
    if(!order.length){
      this.show_msg("No scrolls or cures!");
      return;
    }
    const opts = order.map(n => {
      const c = counts[n];
      const t = ITEMS[n][2];
      const is_charge = cost_charge.has(t);
      const depleted = is_charge && this._magic_charges <= 0;
      const label = c>1 ? `${n} x${c}` : n;
      // Free actions get a tilde tag so the player can see what doesn't spend a star
      const decorated = is_charge ? label : `~${label}`;
      const col = depleted ? DGRAY : ITEMS[n][4];
      return [decorated, col];
    });
    opts.push(["-- Cancel --", GRAY]);
    this._scroll_names = order;
    this.menu = new Menu("Magic", opts);
    this._scroll_return = this.is_boss_fight ? GS_BOSS_COMBAT : GS_COMBAT;
    this.gs = GS_SCROLL_PICKER;
  }

  tick_scroll_picker(){
    clear_screen(BLACK);
    drect(PURPLE, 0, 0, SW, 14);
    dtext("MAGIC", 4, 3, LPURP);
    // Show charge indicator in title bar too
    const cmax = this._magic_charges_max;
    let cx = SW - 4 - cmax*7;
    for(let i=0; i<cmax; i++){
      const lit = i < this._magic_charges;
      dtext("*", cx, 3, lit ? GOLD : DGRAY);
      cx += 7;
    }
    this.menu.draw();
    dtext("A:Use B:Back ~=free", 4, SH-10, GRAY);
    this.draw_msg();
    const e = poll();
    if(e.u) this.menu.move(-1);
    else if(e.d) this.menu.move(1);
    else if(e.b || e.m){ this.gs = this._scroll_return; return; }
    else if(e.a){
      const idx = this.menu.sel_idx();
      const sel = this.menu.sel();
      if(!sel || sel.indexOf("Cancel") !== -1){ this.gs = this._scroll_return; return; }
      if(idx >= this._scroll_names.length){ this.gs = this._scroll_return; return; }
      const target_name = this._scroll_names[idx];
      const t = ITEMS[target_name][2];
      const cost_charge_types = new Set(["fire_s","lit_s","shield_s"]);
      const is_charge = cost_charge_types.has(t);
      // Charge gate
      if(is_charge && this._magic_charges <= 0){
        this.show_msg("No magic charges!");
        return;
      }
      const inv_idx = this.p.inventory.indexOf(target_name);
      if(inv_idx < 0){ this.gs = this._scroll_return; return; }
      // Use the item via existing handler (consumes from inventory)
      const [msg, tag] = this.p.use_item(inv_idx);
      // Free-use cures and uncurse — show message and return
      if(tag === null || tag === "uncurse" || tag === undefined){
        this.show_msg(msg);
        this.gs = this._scroll_return;
        return;
      }
      // Combat scrolls — apply effect immediately
      if(tag === "fire_s"){
        if(this.p.has_perk("spellweave") && this.p.perk_val("spw")>=2){ this._spellweave_casts++; if(this._spellweave_casts%3!==0) this._magic_charges--; } else this._magic_charges--;
        const d = SCROLL_DATA[target_name];
        this._cast_damage_scroll(target_name, d, ORANGE);
        // Apply burn (reuse poison DoT but tracked separately on the target)
        this._burn_turns = d.burn_turns;
        this._burn_dmg = d.burn_dmg;
        this.gs = this._scroll_return;
        return;
      }
      if(tag === "lit_s"){
        if(this.p.has_perk("spellweave") && this.p.perk_val("spw")>=2){ this._spellweave_casts++; if(this._spellweave_casts%3!==0) this._magic_charges--; } else this._magic_charges--;
        const d = SCROLL_DATA[target_name];
        this._cast_damage_scroll(target_name, d, YELLOW);
        this.gs = this._scroll_return;
        return;
      }
      if(tag === "shield_s"){
        if(this.p.has_perk("spellweave") && this.p.perk_val("spw")>=2){ this._spellweave_casts++; if(this._spellweave_casts%3!==0) this._magic_charges--; } else this._magic_charges--;
        const d = SCROLL_DATA[target_name];
        const total_turns = d.turns + this.p.invocation_rank;
        this._shield_turns = total_turns;
        this._shield_immune = !!d.status_immune;
        this.show_msg(`Shield ${total_turns} turn${total_turns>1?"s":""}!`);
        burst(SW/2, SH-30, d.color, 18);
        flash(d.color, 5);
        this.gs = this._scroll_return;
        return;
      }
      if(tag === "annihilate"){
        this._magic_charges--;
        // Against regular monsters: instant kill. Against bosses: deal 30% of max HP.
        if(this.is_boss_fight && this.boss_data){
          const dmg = (this.boss_data[1] * 0.30) | 0;
          this.boss_data[2] -= dmg;
          this.show_msg(`Annihilate! -${dmg}HP!`);
        } else if(this.combat_mon){
          this.combat_mon[2] = 0;
          this.show_msg("Annihilated!");
        }
        FX.combat_target_flash = 8;
        shake(8); flash(WHITE, 10);
        burst(64, 28, WHITE, 30);
        this.gs = this._scroll_return;
        return;
      }
      // Unknown tag — bail safely
      this.show_msg(msg || "Used");
      this.gs = this._scroll_return;
    }
  }

  // Apply immediate damage from a Fire/Lightning scroll to whatever target we're fighting.
  _cast_damage_scroll(name, d, color){
    // Base dmg + flat invocation bonus (+5 per rank)
    const inv_bonus = this.p.invocation_rank * 5;
    let dmg = d.dmg + inv_bonus;
    // Warlock perk: +25% (T1) or +50% (T2) per invocation rank
    if(this.p.has_perk("warlock") && this.p.invocation_rank > 0){
      const wlck_pct = this.p.perk_val("wlck") === 2 ? 0.50 : 0.25;
      dmg = (dmg * (1 + wlck_pct * this.p.invocation_rank)) | 0;
    }
    if(this.is_boss_fight && this.boss_data){
      this.boss_data[2] -= dmg;
    } else if(this.combat_mon){
      this.combat_mon[2] -= dmg;
    }
    const bonus_tag = inv_bonus > 0 ? `(+${inv_bonus})` : "";
    this.show_msg(`${name.split(" ").pop()} -${dmg}!${bonus_tag}`);
    FX.combat_target_flash = 6;
    shake(5);
    flash(color, 6);
    burst(64, 28, color, 20);
  }


  // ── SHOP ──────────────────────────────────────────────────────────
  _open_shop(){ this._shop_tab = 0; this._build_shop_menu(); this.gs = GS_SHOP; }
  _build_shop_menu(){
    // Defensive: clamp _shop_tab to 0/1 in case of stale state from old 3-tab logic
    if(this._shop_tab !== 0 && this._shop_tab !== 1) this._shop_tab = 0;
    const p = this.p;
    if(this._shop_tab === 0){
      const opts = SHOP_STOCK.map(n => [`${n} $${ITEMS[n][1]}`, ITEMS[n][4]]);
      opts.push(["-- Depart --", GRAY]);
      this.menu = new Menu("Buy  [L/R: Sell]", opts);
    } else {
      // SELL — group identical items, show count, show unit price
      const inv = p.inventory;
      const seen = new Map();
      for(let i=0; i<inv.length; i++){
        const n = inv[i];
        if(!seen.has(n)) seen.set(n, {count:0});
        seen.get(n).count++;
      }
      const opts = [];
      this._sell_menu_names = [];
      for(const [n, {count}] of seen){
        let tag = "";
        if(n === p.weapon) tag += "[W]";
        else if(n === p.armor) tag += "[A]";
        if(p.enchants[n] && p.enchants[n].length) tag += "★";
        if(p.is_cursed(n)) tag += "(C)";
        const col = p.is_cursed(n) ? CURSE_C : (p.enchants[n]?.length ? GOLD : ITEMS[n][4]);
        const qty_tag = count > 1 ? ` x${count}` : "";
        opts.push([`${n}${qty_tag} $${ITEMS[n][0]}${tag}`, col]);
        this._sell_menu_names.push(n);
      }
      if(!opts.length) opts.push(["(nothing to sell)", GRAY]);
      opts.push(["-- Depart --", GRAY]);
      this.menu = new Menu("Sell  [L/R: Buy]", opts);
    }
  }
  tick_shop(){
    clear_screen(BLACK); this.menu.draw();
    dtext(`Gold:${this.p.gold}G`, 4, SH-10, GOLD);
    // Tab indicator — village shop only has Buy / Sell
    const labels = ["Buy","Sell"];
    const bar_w = 30;
    for(let i=0; i<2; i++){
      const sel = i === this._shop_tab;
      drect(sel ? DBLUE : DGRAY, 2+i*32, SH-20, bar_w, 9);
      drect(sel ? CYAN : GRAY, 2+i*32, SH-20, bar_w, 9, true);
      dtext(labels[i], 8+i*32, SH-18, sel ? WHITE : GRAY);
    }
    this.draw_msg();
    const e = poll();
    if(e.u) this.menu.move(-1);
    else if(e.d) this.menu.move(1);
    else if(e.l){ this._shop_tab = (this._shop_tab-1+2)%2; this._build_shop_menu(); }
    else if(e.r){ this._shop_tab = (this._shop_tab+1)%2; this._build_shop_menu(); }
    else if(e.b || e.m){ this.gs = this._shop_return; this._shop_return = GS_VILLAGE; return; }
    else if(e.a){
      const sel = this.menu.sel(); const idx = this.menu.sel_idx();
      if(sel && sel.indexOf("Depart") !== -1){ this.gs = this._shop_return; this._shop_return = GS_VILLAGE; return; }
      if(this._shop_tab === 0){
        const name = SHOP_STOCK[idx];
        if(name){
          const price = ITEMS[name][1];
          const max_can_buy = Math.min(Math.floor(this.p.gold / price), this.p.max_inv - this.p.inventory.length);
          const itype = ITEMS[name][2];
          if(itype === "weapon" || itype === "armor"){
            const ok = this.p.buy_item(name);
            this.show_msg(ok ? `Bought ${name}` : "Insufficient coin");
            this._build_shop_menu();
          } else {
            this._open_qty(`Buy: ${name.slice(0,12)}`, `${price}G each`, price, max_can_buy, (qty) => {
              let bought = 0;
              for(let i=0; i<qty; i++){
                if(this.p.buy_item(name)) bought++; else break;
              }
              this.show_msg(`Bought ${bought}x ${name.slice(0,10)}`);
              this._build_shop_menu();
            }, GS_SHOP);
          }
        }
      } else {
        // Sell tab
        const sell_names = this._sell_menu_names || [];
        if(idx >= sell_names.length){ this._build_shop_menu(); return; }
        const sell_name = sell_names[idx];
        const sell_count = this.p.inventory.filter(n => n === sell_name).length;
        const unit_sell = ITEMS[sell_name][0];
        if(sell_count > 1){
          this._open_qty(`Sell: ${sell_name.slice(0,12)}`, `${unit_sell}G each`, 0, sell_count, (qty) => {
            let earned = 0;
            for(let i=0; i<qty; i++){
              const ri = this.p.inventory.indexOf(sell_name);
              if(ri < 0) break;
              earned += this.p.sell_item(ri);
            }
            this.show_msg(`+${earned}G from ${qty}x!`);
            this._build_shop_menu();
          }, GS_SHOP);
        } else {
          const ri = this.p.inventory.indexOf(sell_name);
          const earned = ri >= 0 ? this.p.sell_item(ri) : 0;
          this.show_msg(earned ? `+${earned}G!` : "Unequip first!");
          this._build_shop_menu();
        }
      }
    }
  }

  // ── ENCHANT ───────────────────────────────────────────────────────
  _open_enchant_pick(){
    const inv = this.p.inventory;
    const enchantable = inv.filter(n => enchantsFor(n).length > 0);
    if(!enchantable.length){ this.show_msg("Nothing to enchant!"); return; }
    const opts = enchantable.map(n => [n, ITEMS[n][4]]);
    opts.push(["-- Depart --", GRAY]);
    this.menu = new Menu("Pick item", opts);
    this._ench_phase = 0; this._ench_item = null;
    this.gs = GS_ENCHANT;
  }
  _build_enchant_list(){
    const pool = enchantsFor(this._ench_item);
    this._ench_pool = pool;
    const existing = new Set((this.p.enchants[this._ench_item] || []).map(e => e[3]));
    const opts = [];
    for(const enc of pool){
      const lap = enc[1], lv = enc[2];
      let col = enc[5];
      const have = existing.has(enc[3]);
      let label = `${enc[0]} L${lap} v${lv}`;
      if(have){ label += " +"; col = GRAY; }
      opts.push([label, col]);
    }
    opts.push(["-- Depart --", GRAY]);
    this.menu.rebuild(opts);
    this.menu.title = `Ench: ${this._ench_item.slice(0,8)}`;
  }
  tick_enchant(){
    clear_screen(BLACK);
    const lapis = this.p.count_lapis();
    drect(INDIGO, 0, 0, SW, 14);
    dtext("ENCHANTING", 4, 3, LPURP);
    dtext(`Ama:${lapis} L:${this.p.level}`, 68, 3, LBLUE);
    this.menu.draw();
    dtext("A:Select B:Back", 4, SH-10, GRAY);
    this.draw_msg();
    const e = poll();
    if(e.u) this.menu.move(-1);
    else if(e.d) this.menu.move(1);
    else if(e.b || e.m){ this.gs = GS_VILLAGE; return; }
    else if(e.a){
      const sel = this.menu.sel(); const idx = this.menu.sel_idx();
      if(!sel || sel.indexOf("Depart") !== -1){ this.gs = GS_VILLAGE; return; }
      if(this._ench_phase === 0){
        this._ench_item = sel; this._build_enchant_list(); this._ench_phase = 1;
      } else {
        if(idx < this._ench_pool.length){
          const enc = this._ench_pool[idx];
          if(this.p.count_lapis() < enc[1]){ this.show_msg(`Need ${enc[1]} Amaliate!`); return; }
          if(this.p.level < enc[2]){ this.show_msg(`Need level ${enc[2]}!`); return; }
          this.p.remove_lapis(enc[1]);
          if(!this.p.enchants[this._ench_item]) this.p.enchants[this._ench_item] = [];
          this.p.enchants[this._ench_item] = this.p.enchants[this._ench_item].filter(ex => ex[3] !== enc[3]);
          this.p.enchants[this._ench_item].push(enc);
          if(enc[3] === "maxhp"){
            this.p.max_hp += enc[4];
            this.p.hp = Math.min(this.p.hp + enc[4], this.p.max_hp);
          }
          this.show_msg(`${enc[0]} applied!`);
          burst(SW/2, SH/2, enc[5], 16);
          this.gs = GS_VILLAGE;
        }
      }
    }
  }

  // ── FORGE / BLDG ──────────────────────────────────────────────────
  _open_forge(){
    const inv = this.p.inventory;
    const forgeable = inv.filter(n => ITEMS[n][2]==="weapon" || ITEMS[n][2]==="armor");
    if(!forgeable.length){ this.show_msg("Nothing to forge!"); return; }
    const opts = forgeable.map(n => [n, ITEMS[n][4]]);
    opts.push(["-- Depart --", GRAY]);
    this.menu = new Menu("Forge (200G)", opts);
    this._bldg_mode = "forge"; this.gs = GS_BLDG;
  }
  tick_bldg(){
    clear_screen(BLACK); this.menu.draw();
    dtext("A:OK B:Back", 4, SH-10, GRAY);
    this.draw_msg();
    const e = poll();
    if(e.u) this.menu.move(-1);
    else if(e.d) this.menu.move(1);
    else if(e.b || e.m){ this.gs = GS_VILLAGE; return; }
    else if(e.a){
      const sel = this.menu.sel();
      if(!sel || sel.indexOf("Depart")!==-1){ this.gs = GS_VILLAGE; return; }
      if(this._bldg_mode === "forge"){
        const max_std = Math.floor(this.p.gold / 200);
        const max_prem = Math.min(Math.floor(this.p.gold / 400), Math.floor(this.p.count_lapis() / 3));
        if(max_std <= 0 && max_prem <= 0){ this.show_msg("Need 200G!"); return; }
        const item_type = ITEMS[sel][2];
        const std_stat  = item_type === "weapon" ? "+2 ATK" : "+1 DEF";
        const prem_stat = item_type === "weapon" ? "+4 ATK" : "+2 DEF";
        // Standard forge vs Premium forge (Forge+)
        if(sel === this._forge_plus_mode){
          // Premium forge chosen
          if(max_prem <= 0){ this.show_msg("Need 400G+3 Amaliate!"); this._forge_plus_mode = null; return; }
          this._open_qty(`Forge+ ${sel.slice(0,8)}`, `${prem_stat} ea · 400G+3 Amaliate`, 400, max_prem, (qty) => {
            this.p.gold -= qty * 400;
            this.p.remove_lapis(qty * 3);
            if(item_type === "weapon") this.p.atk += 4 * qty;
            else this.p.defense += 2 * qty;
            burst(SW/2, SH/2, GOLD, 24);
            this.show_msg(`${sel.slice(0,8)} ${prem_stat} x${qty}`);
          }, GS_VILLAGE);
          this._forge_plus_mode = null;
        } else {
          // Offer choice: Standard or Forge+
          if(this.p.count_lapis() >= 3 && this.p.gold >= 400){
            this._forge_plus_mode = sel;
            const opts = [
              [`Standard: ${std_stat} (200G)`, WHITE],
              [`Forge+: ${prem_stat} (400G+3 Amaliate)`, GOLD],
              ["-- Cancel --", GRAY]
            ];
            this.menu = new Menu(`Forge ${sel.slice(0,10)}`, opts);
            return;
          } else {
            // Can only afford standard
            this._open_qty(`Forge ${sel.slice(0,10)}`, `${std_stat} ea · 200G`, 200, max_std, (qty) => {
              this.p.gold -= qty * 200;
              if(item_type === "weapon") this.p.atk += 2 * qty;
              else this.p.defense += 1 * qty;
              burst(SW/2, SH/2, ORANGE, 18);
              this.show_msg(`${sel.slice(0,8)} ${std_stat} x${qty}`);
            }, GS_VILLAGE);
          }
        }
      } else if(this._bldg_mode === "temple"){
        if(sel.indexOf("Lift Curses") !== -1){
          const has_item_curse = this.p.cursed_items.size > 0;
          const has_status_curse = this.p.has_status(ST_CURSE);
          if(!has_item_curse && !has_status_curse){ this.show_msg("No curses!"); return; }
          if(this.p.gold < 40){ this.show_msg("Need 40G!"); return; }
          this.p.gold -= 40;
          this.p.cursed_items.clear();
          if(has_status_curse) this.p.clear_status(ST_CURSE);  // only clear curse, not poison/freeze etc
          this.show_msg("Curses lifted!");
        } else if(sel.indexOf("Invoke") !== -1 && !sel.includes("MAX")){
          if(this.p.invocation_rank >= 3){ this.show_msg("Already maxed!"); return; }
          if(this.p.gold < 200){ this.show_msg("Need 200G!"); return; }
          this.p.gold -= 200;
          this.p.invocation_rank++;
          const rank_name = ["I","II","III"][this.p.invocation_rank-1];
          burst(SW/2, SH/2, PURPLE, 18);
          this.show_msg(`Invocation ${rank_name}! +5 spell dmg`);
          // Rebuild temple menu to show updated rank
          this._open_temple();
          return;
        } else this.gs = GS_VILLAGE;
      } else if(this._bldg_mode === "bank"){
        if(sel.indexOf("Deposit") !== -1){
          if(this.p.gold <= 0){ this.show_msg("No gold to deposit!"); return; }
          const amt = this.p.gold;
          this.p.banked += amt;
          this.p.gold = 0;
          this.show_msg(`Deposited ${amt}G!`);
          burst(SW/2, SH/2, GOLD, 12);
          // Rebuild menu to refresh balance in title
          this._open_bank();
        } else if(sel.indexOf("Withdraw") !== -1){
          if(this.p.banked <= 0){ this.show_msg("Vault is empty!"); return; }
          const amt = this.p.banked;
          this.p.gold += amt;
          this.p.banked = 0;
          this.show_msg(`Withdrew ${amt}G!`);
          burst(SW/2, SH/2, GOLD, 12);
          this._open_bank();
        }
      }
    }
  }

  // ── LIBRARY ───────────────────────────────────────────────────────
  // Junk exchange: trade monster drops for XP. Bulk bonus: 3+=2x, 6+=3x, 9+=4x.
  _open_library(){
    this._library_scroll = 0;
    this.gs = GS_LIBRARY;
  }

  tick_library(){
    const JUNK_XP = {
      "Old Coin":3, "Rat Whiskers":4, "Goblin Ear":5,
      "Cracked Skull":8, "Troll Wart":15
    };
    const p = this.p;
    clear_screen(BLACK);
    // Header
    drect(LBLUE, 0, 0, SW, 14);
    dtext("LIBRARY", 40, 3, WHITE);
    dtext(`Lv${p.level}`, 98, 3, YELLOW);

    // Build list of junk the player has, grouped
    const junk_counts = {};
    for(const name of p.inventory){
      if(name in JUNK_XP) junk_counts[name] = (junk_counts[name]||0) + 1;
    }
    const junk_types = Object.keys(junk_counts);

    if(!junk_types.length){
      dtext("No junk items.", 18, 40, GRAY);
      dtext("Kill monsters to", 12, 54, GRAY);
      dtext("collect loot.", 20, 64, GRAY);
      dtext("B: Back", 44, 100, GRAY);
      const e = poll();
      if(e.b || e.m) this.gs = GS_VILLAGE;
      return;
    }

    // Info bar
    dtext("Study junk for XP", 8, 16, CYAN);
    dtext("3+=2x 6+=3x 9+=4x", 8, 25, GRAY);

    // List entries
    const ROW_H = 16;
    const list_y = 35;
    const visible = ((SH - list_y - 20) / ROW_H)|0;
    this._library_scroll = Math.min(this._library_scroll, Math.max(0, junk_types.length - visible));
    for(let i=0; i<visible; i++){
      const idx = this._library_scroll + i;
      if(idx >= junk_types.length) break;
      const name = junk_types[idx];
      const qty = junk_counts[name];
      const base_xp = JUNK_XP[name];
      const mult = qty >= 9 ? 4 : qty >= 6 ? 3 : qty >= 3 ? 2 : 1;
      const total_xp = base_xp * qty * mult;
      const py = list_y + i * ROW_H;
      // Row bg
      drect(DGRAY, 2, py, SW-4, ROW_H-2);
      drect(mult > 1 ? GOLD : GRAY, 2, py, SW-4, ROW_H-2, true);
      dtext(`${name.slice(0,12)} x${qty}`, 5, py+2, ITEMS[name]?ITEMS[name][4]:WHITE);
      const bonus_label = mult > 1 ? ` [${mult}x]` : "";
      dtext(`+${total_xp}XP${bonus_label}`, 5, py+9, mult>1 ? GOLD : CYAN);
      dtext("A", SW-12, py+4, YELLOW);
    }
    // Scroll
    if(junk_types.length > visible){
      drect(DGRAY, SW-4, list_y, 2, SH-list_y-18);
      const th = Math.max(4, (visible/junk_types.length*(SH-list_y-18))|0);
      const ty_ = list_y + (this._library_scroll/Math.max(1,junk_types.length-visible)*(SH-list_y-18-th))|0;
      drect(LBLUE, SW-4, ty_, 2, th);
    }
    drect(DGRAY, 0, SH-14, SW, 14);
    dtext("U/D:Browse A:Study B:Back", 4, SH-11, GRAY);
    this.draw_msg();

    const e = poll();
    if(e.u) this._library_scroll = Math.max(0, this._library_scroll-1);
    else if(e.d) this._library_scroll = Math.min(Math.max(0, junk_types.length-visible), this._library_scroll+1);
    else if(e.b || e.m){ this.gs = GS_VILLAGE; return; }
    else if(e.a){
      // Study the item currently at the top of visible list
      const idx = this._library_scroll;
      if(idx >= junk_types.length) return;
      const name = junk_types[idx];
      const qty = junk_counts[name];
      const base_xp = JUNK_XP[name];
      const mult = qty >= 9 ? 4 : qty >= 6 ? 3 : qty >= 3 ? 2 : 1;
      const total_xp = base_xp * qty * mult;
      // Remove ALL of this junk type from inventory
      p.inventory = p.inventory.filter(n => n !== name);
      // Grant XP
      if(p.gain_xp(total_xp)){
        p.do_level_up();
        FX.level_flash = 30;
        this.perk_pool = getPerkChoices(p, p.perk_choices); this._levelup_cooldown = 45;
        this.perk_cur = 0;
        this.gs = GS_LEVELUP;
        return;
      }
      burst(SW/2, SH/2-20, CYAN, 14);
      this.show_msg(`+${total_xp} XP${mult>1?" ("+mult+"x bonus)":""}`);
    }
  }

  // ── DUNGEON ───────────────────────────────────────────────────────
  _enter_dungeon(){
    this.d = new DungeonMap(this.p.floor);
    this.p.x = this.d.start_x; this.p.y = this.d.start_y;
    this.snap_cam();
    FX.transition = 30; FX.transition_text = `Floor ${this.p.floor}`;
    this.gs = GS_DUNGEON;
  }

  // Floor palette shift - deeper floors get cooler/darker tones (Pass 2)
  _floor_palette(){
    const f = this.p.floor;
    const t = Math.min(1, (f-1)/24);
    // Wall: brown → cold purple-grey
    const wr = (35 + (35-35)*t) | 0;
    const wg = (35 + (20-35)*t) | 0;
    const wb = (45 + (60-45)*t) | 0;
    // Floor: brown → dark teal
    const fr = (110 + (60-110)*t) | 0;
    const fg = (70 + (60-70)*t) | 0;
    const fb = (30 + (70-30)*t) | 0;
    return {
      wall: rgb(wr, wg, wb),
      wall_edge: rgb(wr+25, wg+25, wb+25),
      floor: rgb(fr, fg, fb),
      floor_alt: rgb(Math.max(0,fr-15), Math.max(0,fg-10), Math.max(0,fb-5)),
    };
  }

  _draw_tiles(){
    const d = this.d, p = this.p;
    const pal = this._floor_palette();
    for(let ty=0; ty<VIEW_H; ty++){
      for(let tx=0; tx<VIEW_W; tx++){
        const mx = tx + this.cam_x, my = ty + this.cam_y;
        const t = d.tile_at(mx, my);
        const px = tx*TILE, py = ty*TILE + HUD_H;
        if(t === T_WALL){
          drect(pal.wall, px, py, TILE, TILE);
          // Wall variation: 3 patterns
          const v = (d.wall_var[my] && d.wall_var[my][mx]) || 0;
          if(v === 0){ drect(pal.wall_edge, px, py, TILE, TILE, true); }
          else if(v === 1){
            drect(pal.wall_edge, px, py, TILE, TILE, true);
            drect(pal.wall_edge, px+1, py+1, 2, 1);
          } else {
            drect(pal.wall_edge, px, py, TILE, TILE, true);
            drect(pal.wall_edge, px+5, py+3, 2, 2);
          }
        } else if(t === T_FLOOR){
          const v = (d.floor_var[my] && d.floor_var[my][mx]) || 0;
          drect(v===0 ? pal.floor : pal.floor_alt, px, py, TILE, TILE);
          // subtle floor speckle
          if((mx*7 + my*13) % 11 === 0){
            ctx.fillStyle = pal.floor_alt;
            ctx.fillRect(px+3, py+5, 1, 1);
          }
        } else if(t === T_STAIR){
          drect(LBROWN, px, py, TILE, TILE);
          drect(YELLOW, px+2, py+2, TILE-4, TILE-4);
          // animated glow
          const g = (Math.sin(performance.now()/200) * 0.5 + 0.5);
          ctx.fillStyle = `rgba(255,255,255,${g*0.4})`;
          ctx.fillRect(px+3, py+3, 2, 2);
        } else if(t === T_CHEST){
          drect(BROWN, px, py, TILE, TILE);
          drect(GOLD, px+1, py+1, TILE-2, TILE-2);
          // lock plate
          drect(DRED, px+3, py+3, 2, 2);
          // sparkle
          if(Math.random() < 0.05) burst(px+TILE/2, py+TILE/2, GOLD, 1);
        } else if(t === T_TOWN){
          drect(TEAL, px, py, TILE, TILE);
          drect(WHITE, px+2, py+2, TILE-4, TILE-4, true);
          const g = (Math.sin(performance.now()/300) * 0.5 + 0.5);
          ctx.fillStyle = `rgba(255,255,255,${g*0.5})`;
          ctx.fillRect(px+3, py+3, 2, 2);
        } else if(t === T_SHRINE){
          drect(SHRINE_C, px, py, TILE, TILE);
          drect(WHITE, px+3, py+1, 2, TILE-2);
          drect(WHITE, px+1, py+3, TILE-2, 2);
        } else if(t === T_BOSS_DOOR){
          drect(BOSS_C, px, py, TILE, TILE);
          drect(DRED, px+1, py+1, TILE-2, TILE-2, true);
          drect(YELLOW, px+3, py+3, 2, 2);
          const g = (Math.sin(performance.now()/120) * 0.5 + 0.5);
          ctx.fillStyle = `rgba(255,${(50*g)|0},${(50*g)|0},${g*0.3})`;
          ctx.fillRect(px, py, TILE, TILE);
        } else if(t === T_SLOT){
          // Slot machine tile — gold box, pulsing "7" in center
          drect(PURPLE, px, py, TILE, TILE);
          drect(GOLD, px+1, py+1, TILE-2, TILE-2, true);
          const gp = (Math.sin(performance.now()/200) * 0.5 + 0.5);
          ctx.fillStyle = `rgba(255,200,0,${0.5 + gp*0.5})`;
          ctx.fillRect(px+3, py+3, 2, 2);
        } else if(t === T_MERCHANT){
          // Dungeon merchant — teal tile with pulsing M
          drect(TEAL, px, py, TILE, TILE);
          drect(WHITE, px+1, py+1, TILE-2, TILE-2, true);
          const mp = (Math.sin(performance.now()/300) * 0.5 + 0.5);
          ctx.fillStyle = `rgba(255,255,255,${0.5 + mp*0.5})`;
          ctx.fillRect(px+3, py+3, 2, 2);
        }
      }
    }
    // Monsters
    for(const m of d.monsters){
      if(!m[10]) continue;
      const sx = m[8] - this.cam_x, sy = m[9] - this.cam_y;
      if(p.blinded && (Math.abs(m[8]-p.x) > 2 || Math.abs(m[9]-p.y) > 2)) continue;
      if(sx >= 0 && sx < VIEW_W && sy >= 0 && sy < VIEW_H){
        const mx = sx*TILE + 1, my = sy*TILE + HUD_H + 1;
        // body
        drect(m[7], mx, my, TILE-2, TILE-2);
        // simple eyes
        drect(BLACK, mx+1, my+2, 1, 1);
        drect(BLACK, mx+4, my+2, 1, 1);
      }
    }
    // Player (Pass 2: facing direction + walk animation)
    const ppx = (p.x - this.cam_x)*TILE;
    const ppy = (p.y - this.cam_y)*TILE + HUD_H;
    const pc = (p.has_any_status()) ? (STATUS_COLORS[p.status] || BLUE) : BLUE;
    // shadow
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.fillRect(ppx+1, ppy+TILE-2, TILE-2, 1);
    // body outline
    drect(WHITE, ppx, ppy, TILE, TILE);
    drect(pc, ppx+1, ppy+1, TILE-2, TILE-2);
    // weapon shown by facing
    const bob = FX.player_anim_frame;
    if(p.facing === 0){      // N
      drect(GRAY, ppx+TILE/2, ppy-1+bob, 1, 3);
    } else if(p.facing === 1){ // E
      drect(GRAY, ppx+TILE-1, ppy+TILE/2-1+bob, 3, 1);
    } else if(p.facing === 2){ // S
      drect(GRAY, ppx+TILE/2, ppy+TILE-1+bob, 1, 3);
    } else {                   // W
      drect(GRAY, ppx-1, ppy+TILE/2-1+bob, 3, 1);
    }
    // eyes facing direction
    drect(WHITE, ppx+2, ppy+2, 1, 1);
    drect(WHITE, ppx+5, ppy+2, 1, 1);
  }

  tick_dungeon(){
    apply_shake_transform();
    clear_screen(BLACK); draw_hud(this.p); this._draw_tiles();
    draw_particles();
    end_shake_transform();
    draw_flash();
    draw_transition();

    const e = poll();
    if(e.m){ this._open_home(GS_DUNGEON); return; }
    if(e.b){ this._combat_inv_return = GS_DUNGEON; this.gs = GS_COMBAT_INV; return; }
    if(this.p.has_perk("paladin")){
      const pd = this.p.perk_tier_data("paladin");
      if(pd && Math.random() < pd.chance && this.p.hp / this.p.max_hp < pd.cap){
        this.p.hp = Math.min(this.p.hp + pd.heal, this.p.max_hp);
      }
    }
    let dx=0, dy=0;
    if(e.u){ dy=-1; this.p.facing=0; }
    else if(e.d){ dy=1; this.p.facing=2; }
    else if(e.l){ dx=-1; this.p.facing=3; }
    else if(e.r){ dx=1; this.p.facing=1; }
    if(!dx && !dy) return;
    // Freeze check — only ticks when movement is ATTEMPTED (not every frame)
    if(this.p.has_status(ST_FREEZE) && this.p.statuses[ST_FREEZE] > 0){
      // Only tick the freeze status, not everything (prevents poison from double-ticking on frozen moves)
      const cursebane = this.p.has_perk("cursebane");
      this.p.statuses[ST_FREEZE] = Math.max(0, this.p.statuses[ST_FREEZE] - (cursebane?2:1));
      if(this.p.statuses[ST_FREEZE] <= 0) delete this.p.statuses[ST_FREEZE];
      this.show_msg(`Frozen! (${this.p.statuses[ST_FREEZE]||0} left)`);
      flash(FREEZE_C, 3);
      return;
    }
    const nx = this.p.x + dx, ny = this.p.y + dy;
    const t = this.d.tile_at(nx, ny);
    if(t === T_WALL) return;
    const mon = this.d.monster_at(nx, ny);
    if(mon){
      this.combat_mon = mon; this.cphase = 0; this.combat_msg = "";
      this.is_boss_fight = false;
      this._refresh_combat_magic();
      this._juggernaut_stacks = 0;
      this.gs = GS_COMBAT; return;
    }
    this.p.x = nx; this.p.y = ny; this.snap_cam();
    const dmg = this.p.tick_status();
    if(dmg > 0){
      if(this.p.has_status(ST_POISON)){
        this.show_msg(`Poison -${dmg}HP!`);
        flash(POISON_C, 3);
      }
      if(this.p.has_status(ST_CURSE) && this.p.statuses[ST_CURSE] !== -1){
        const ts = String(this.p.statuses[ST_CURSE]);
        this.show_msg(`Curse -${dmg}HP (${ts})`);
        flash(CURSE_C, 3);
      }
    }
    if(this.p.hp <= 0){ this.gs = GS_GAMEOVER; return; }
    if(t === T_STAIR){
      this.p.floor++;
      this.d = new DungeonMap(this.p.floor);
      this.p.x = this.d.start_x; this.p.y = this.d.start_y;
      this.snap_cam(); this.p.immune_used = false;
      // Eternal perk: gain Max HP every floor
      if(this.p.has_perk("eternal")){
        const hp_gain = this.p.perk_val("etern");
        this.p.max_hp += hp_gain;
        this.p.hp = Math.min(this.p.hp + hp_gain, this.p.max_hp);
        burst(this.p.x*8, this.p.y*8, CYAN, 6);
      }
      this.show_msg(`Floor ${this.p.floor}!`);
      FX.transition = 30; FX.transition_text = `Floor ${this.p.floor}`;
    } else if(t === T_TOWN){
      this.gs = GS_VILLAGE;
    } else if(t === T_BOSS_DOOR){
      this._enter_boss_fight();
    } else if(t === T_CHEST){
      const key = `${nx},${ny}`;
      const item = this.d.chests[key];
      if(item){
        // Check space needed: 1 normally, 2 with Treasure perk
        const space_needed = this.p.has_perk("treasure") ? 2 : 1;
        const space_avail = this.p.max_inv - this.p.inventory.length;
        if(space_avail <= 0){
          // Inventory full — warn but don't open chest so it stays for later
          this.show_msg("Inventory full!");
          return;
        }
        delete this.d.chests[key];
        this.d.tiles[ny][nx] = T_FLOOR;
        this.p.inventory.push(item);
        this.chest_item = item;
        if(this.p.has_perk("treasure") && space_avail >= 2){
          const b = randomLoot(this.p.floor);
          this.p.inventory.push(b);
          this.chest_item = `${item} +${b.slice(0,8)}`;
        } else if(this.p.has_perk("treasure") && space_avail < 2){
          // Only room for one — still give it but note bonus was lost
          this.chest_item = `${item} (inv full)`;
        }
        // Burst!
        burst((nx-this.cam_x)*TILE + 4, (ny-this.cam_y)*TILE + HUD_H + 4, GOLD, 18);
        this.gs = GS_CHEST;
      }
    } else if(t === T_SHRINE){
      this.d.tiles[ny][nx] = T_FLOOR;
      this._trigger_shrine();
    } else if(t === T_SLOT){
      this._open_slot_machine(nx, ny);
    } else if(t === T_MERCHANT){
      this._open_dungeon_merchant(nx, ny);
    } else if(`${nx},${ny}` in this.d.traps){
      const trap = this.d.traps[`${nx},${ny}`];
      delete this.d.traps[`${nx},${ny}`];
      this._trigger_trap(trap);
    }
  }

  _attempt_recall(){
    if(this.is_boss_fight){
      const msg = BOSS_SEAL_MSGS[Math.floor(Math.random()*BOSS_SEAL_MSGS.length)];
      this.show_dialog(msg, "Sealed!", DRED, GS_BOSS_COMBAT); return;
    }
    for(let i=0; i<this.p.inventory.length; i++){
      if(this.p.inventory[i] === "Recall Scroll"){
        this.p.inventory.splice(i, 1);
        this.show_dialog(RECALL_MSG, "Recall", CYAN, GS_VILLAGE);
        return;
      }
    }
    this.gs = GS_VILLAGE;
  }

  _trigger_trap(trap){
    const p = this.p;
    // Trap intensity scales with depth
    const trap_scale = Math.max(1, 1 + Math.floor(p.floor / 15));
    if(trap === "spike"){
      const dmg = Math.max(1, 3 + ((p.floor/2)|0) - p.total_def());
      p.hp -= dmg;  // can kill
      shake(4); flash(RED, 5);
      burst((p.x - this.cam_x)*TILE + 4, (p.y - this.cam_y)*TILE + HUD_H + 4, RED, 12);
      this.show_dialog(`Spikes burst forth!\n${dmg} damage taken!`, "TRAP!", RED, GS_DUNGEON);
      if(p.hp <= 0){
        if(p.has_perk("phoenix") && p.revive_remaining > 0){
          const ph_td = p.perk_tier_data("phoenix");
          p.revive_remaining--;
          p.hp = Math.max(1, Math.floor(p.max_hp * (ph_td ? ph_td.hp_frac : 0.05)));
          this.show_msg("PHOENIX revive!");
          burst(SW/2, SH/2, GOLD, 24);
        } else {
          this.gs = GS_GAMEOVER;
        }
      }
    } else if(trap === "poison"){
      const turns = STATUS_TURNS[ST_POISON] * trap_scale;
      if(p.apply_status(ST_POISON, turns)){
        flash(POISON_C, 4);
        this.show_dialog(`A foul miasma rises!\nPoisoned ${turns} turns!`, "TRAP!", POISON_C, GS_DUNGEON);
      } else this.show_msg("Resist poison!");
    } else if(trap === "freeze"){
      const turns = STATUS_TURNS[ST_FREEZE] * trap_scale;
      if(p.apply_status(ST_FREEZE, turns)){
        flash(FREEZE_C, 4);
        this.show_dialog(`Ice shatters beneath!\nFrozen ${turns} moves!`, "TRAP!", FREEZE_C, GS_DUNGEON);
      } else this.show_msg("Resist freeze!");
    }
  }

  _shrine_scale(){
    const f = this.p.floor;
    if(f <= 5)  return 1.0;
    if(f <= 10) return 1.5;
    if(f <= 20) return 2.0;
    if(f <= 40) return 3.0;
    return 4.0;
  }

  _trigger_shrine(){
    const sc = this._shrine_scale();
    const f = this.p.floor;
    const hp_amt  = (10 * sc)|0;
    const atk_amt = (3  * sc)|0;
    const gold_amt= (50 * sc)|0;
    const xp_amt  = (30 * sc)|0;
    const dmg_amt = (15 * sc)|0;
    // Curse debuff scales: base -2 ATK/-2 DEF, +1 per 10 floors, cap at -8/-8
    const curse_pen = Math.min(8, 2 + Math.floor(f / 10));
    const outcomes = [
      ["Blessing of Valor",`The shrine glows!\n+${hp_amt} Max HP!`,`hp:${hp_amt}`],
      ["Shrine of Might",  `Runes pulse red!\n+${atk_amt} ATK!`,  `atk:${atk_amt}`],
      ["Warding Shrine",   "Holy light flows!\nStatus cleared!",   "cure"],
      ["Shrine of Plenty", `Coins rain down!\n+${gold_amt} gold!`,`gold:${gold_amt}`],
      ["Knowledge",        `Visions of battle!\n+${xp_amt} XP!`,  `xp:${xp_amt}`],
      ["Cursed Altar",     `Dark runes flare!\n-${curse_pen} ATK/DEF!`, `curse:${curse_pen}`],
      ["Mimic!",           `A mimic strikes!\n-${dmg_amt} HP!`,   `dmg:${dmg_amt}`],
    ];
    const s = outcomes[Math.floor(Math.random()*outcomes.length)];
    this._shrine_effect = s[2];
    burst((this.p.x - this.cam_x)*TILE + 4, (this.p.y - this.cam_y)*TILE + HUD_H + 4, SHRINE_C, 16);
    this.show_dialog(s[1], s[0], SHRINE_C, GS_DUNGEON);
  }

  _apply_shrine_effect(eff){
    const p = this.p;
    if(eff.startsWith("hp:")){
      const n = parseInt(eff.split(":")[1]);
      p.max_hp += n; p.hp = Math.min(p.hp + n, p.max_hp);
    } else if(eff.startsWith("atk:")){
      p.atk += parseInt(eff.split(":")[1]);
    } else if(eff === "cure"){
      p.clear_status();
    } else if(eff.startsWith("gold:")){
      p.gold += parseInt(eff.split(":")[1]);
    } else if(eff.startsWith("curse:")){
      // Shrine curse — permanent, scaled penalty
      const pen = parseInt(eff.split(":")[1]) || 4;
      if(!p.resist_status()){
        if(p.has_status(ST_CURSE)){
          if(p.statuses[ST_CURSE] !== -1){
            p.statuses[ST_CURSE] = -1;
            p.atk_mod -= pen; p.def_mod -= pen;
            p._curse_penalty = (p._curse_penalty||0) + pen;
          }
        } else {
          p.statuses[ST_CURSE] = -1;
          p.atk_mod -= pen; p.def_mod -= pen;
          p._curse_penalty = pen;
        }
      }
    } else if(eff.startsWith("dmg:")){
      const dmg = parseInt(eff.split(":")[1]);
      p.hp -= dmg; shake(5); flash(RED, 4);  // can kill
    } else if(eff.startsWith("xp:")){
      const xp = parseInt(eff.split(":")[1]);
      if(p.gain_xp(xp)){
        p.do_level_up();
        FX.level_flash = 30;
        this.perk_pool = getPerkChoices(p, p.perk_choices); this._levelup_cooldown = 45;
        this.perk_cur = 0;
        this.gs = GS_LEVELUP;
      }
    }
  }

  // ── BOSS ──────────────────────────────────────────────────────────
  _enter_boss_fight(){
    const b = getBoss(this.p.floor);
    // [name, max_hp, cur_hp, atk, def, xp, gold, color, loot, phase]
    this.boss_data = [b[0], b[1], b[1], b[2], b[3], b[4], b[5], b[6], b[8], 1];
    this.is_boss_fight = true;
    this._pending_levelup = false;
    this._refresh_combat_magic();
    this.show_dialog(BOSS_INTRO[Math.floor(Math.random()*BOSS_INTRO.length)],
                     `Boss:${b[0]}`, BOSS_C, GS_BOSS_COMBAT);
  }

  tick_boss_combat(){
    apply_shake_transform();
    clear_screen(DGRAY);
    const b = this.boss_data, p = this.p;
    // Boss portrait — dark backdrop + sprite art on the right half (text on left)
    const flash_b = FX.combat_target_flash > 0 && (FX.combat_target_flash%2);
    drect(rgb(40,15,15), 20, 4 - FX.combat_attacker_offset, 88, 48);
    drect(DRED, 20, 4 - FX.combat_attacker_offset, 88, 48, true);
    const b_sprite = BOSS_SPRITE[b[0]];
    if(b_sprite){
      // Position boss sprite on right half so left-side text stays readable
      // Sprites are 32-40 wide × 17-20 tall — center in right 60% of box
      const spW = b_sprite[0].length;
      const sx = 20 + 28 + (60 - spW) / 2;
      const sy = 4 + (48 - b_sprite.length) / 2 - FX.combat_attacker_offset;
      drawSprite(b_sprite, sx, sy, flash_b);
    } else {
      // Fallback for unknown bosses
      drect(b[7], 50, 12 - FX.combat_attacker_offset, 50, 32);
      drect(RED, 60, 22, 4, 4);
      drect(RED, 86, 22, 4, 4);
    }
    dtext(b[0].slice(0,14), 4, 6, WHITE);
    hbar(4, 16, 50, 6, Math.max(0, b[2]/b[1]), RED);
    dtext(`HP:${b[2]}/${b[1]}`, 4, 24, RED);
    dtext(`ATK:${b[3]} DEF:${b[4]}`, 4, 34, GRAY);
    dtext(`Phase ${b[9]}`, 4, 44, b[9]===1 ? YELLOW : ORANGE);
    // Magic charge indicator (right side, vertical)
    this._draw_charge_indicator();
    // Shield ring around the bottom hero portrait area if shielded
    if(this._shield_turns > 0) this._draw_shield_ring();
    drect(DGRAY, 0, SH-28, SW, 28);
    const hpf = Math.max(0, p.hp/p.max_hp);
    const hpc = hpf>0.5 ? GREEN : (hpf>0.25 ? ORANGE : RED);
    hbar(2, SH-27, 50, 5, hpf, hpc);
    dtext(`${p.hp}/${p.max_hp}`, 54, SH-27, hpc);
    dtext(`ATK:${p.total_atk()} DEF:${p.total_def()}`, 2, SH-20, GRAY);
    if(p.has_any_status()){
      dtext(STATUS_NAMES[p.status] || "?", 90, SH-20, STATUS_COLORS[p.status] || WHITE);
    }
    if(this.cphase === 0) dtext("A:Fight M:Magic B:Inv", 2, SH-10, WHITE);
    else dtext(this.combat_msg.slice(0,21), 2, SH-10, YELLOW);

    draw_particles();
    end_shake_transform();
    draw_flash();

    const e = poll();
    if(e.m){ this._open_scroll_picker(); return; }
    if(this.cphase === 1){
      if(e.a || e.b){
        if(b[2] <= 0){
          this.is_boss_fight = false;
          this.d.boss_cleared = true;
          // Spawn the staircase now that boss is defeated
          if(this.d.is_boss_floor){
            this.d.tiles[this.d.stair_y][this.d.stair_x] = T_STAIR;
            burst((this.d.stair_x - this.cam_x)*TILE + 4, (this.d.stair_y - this.cam_y)*TILE + HUD_H + 4, GOLD, 20);
            this.show_msg("The way down opens!");
          }
          // Convert boss door back to floor
          if(this.d.boss_door){
            const [bx,by] = this.d.boss_door;
            this.d.tiles[by][bx] = T_FLOOR;
          }
          if(this._pending_levelup){
            this._pending_levelup = false;
            this.gs = GS_LEVELUP;
          } else this.gs = GS_DUNGEON;
        } else this.cphase = 0;
      }
      return;
    }
    if(e.b){ this._combat_inv_return = GS_BOSS_COMBAT; this.gs = GS_COMBAT_INV; return; }
    if(e.a) this._do_boss_round();
  }

  _do_boss_round(){
    const b = this.boss_data, p = this.p;
    let atk = p.total_atk() + this._scroll_dmg + p.unique_bonus(b[0]) + this._juggernaut_stacks * (p.has_perk("juggernaut") ? p.perk_val("jugg") : 0); this._scroll_dmg = 0;
    const bd=p.perk_tier_data("berserker"); if(bd && p.hp/p.max_hp < bd.threshold) atk += bd.val;
    const is_crit = p.roll_crit_combat(this);
    let pdmg = Math.max(1, atk - b[4] + Math.floor(Math.random()*4) - 1);
    if(is_crit) pdmg = Math.max(2, pdmg * 2);
    b[2] -= pdmg;
    let thorn = 0;
    if(p.armor){
      for(const e of (p.enchants[p.armor] || [])){
        if(e[3] === "thorn") thorn += e[4];
      }
    }
    if(thorn && b[2] > 0) b[2] -= thorn;
    // Burn DoT (from Fire scroll) — ticks on boss each round
    let burn_done = 0;
    if(this._burn_turns > 0 && b[2] > 0){
      burn_done = this._burn_dmg;
      b[2] -= burn_done;
      this._burn_turns--;
      if(this._burn_turns <= 0){ this._burn_dmg = 0; }
      burst(64, 28, ORANGE, 8);
    }
    // FX
    FX.combat_target_flash = 4;
    if(is_crit){
      shake(8); flash(YELLOW, 8);
      burst(64, 28, YELLOW, 24);
    } else {
      shake(pdmg > 15 ? 4 : 2);
      burst(64, 28, RED, 10);
    }
    const burn_tag = burn_done > 0 ? `+B${burn_done}` : "";
    const dmg_label = (is_crit ? `CRIT!${pdmg}` : `${pdmg}`) + burn_tag;

    if(b[2] <= b[1]/2 && b[9] === 1){
      b[9] = 2; b[3] += 4;
      this.combat_msg = `You:${dmg_label} PHASE 2!`;
      shake(6); flash(ORANGE, 6);
      burst(64, 28, ORANGE, 24);
      this.cphase = 1; return;
    }
    if(b[2] <= 0){
      p.gold += b[6];
      if(p.has_perk("scavenger")) p.gold += b[6];
      // Boss drops two items — push each if inventory has space
      const cycle = Math.floor((p.floor - 1) / 25);
      let loot = Array.isArray(b[8]) ? [...b[8]] : [b[8]];
      // Cycle 2+ (floor 50+): replace weapon drop with legendary
      if(cycle >= 2){
        const LEGENDARY_WEAPONS = ["Mythril Blade","Abyssal Edge"];
        const LEGENDARY_ARMORS  = ["Titan Plate","Void Eternal"];
        loot = [
          LEGENDARY_WEAPONS[cycle % LEGENDARY_WEAPONS.length],
          LEGENDARY_ARMORS[cycle  % LEGENDARY_ARMORS.length],
        ];
      } else if(cycle === 1){
        // Cycle 1 (floor 25-49): keep normal loot but add a Soul Crystal bonus
        loot = [...loot, "Soul Crystal"];
      }
      for(const item of loot){
        if(p.inventory.length < p.max_inv) p.inventory.push(item);
      }
      // Bestiary tracking
      this.bestiary[b[0]] = (this.bestiary[b[0]] || 0) + 1;
      const leveled = p.gain_xp(b[5]);
      if(leveled){
        p.do_level_up();
        FX.level_flash = 30;
        this.perk_pool = getPerkChoices(p, p.perk_choices); this._levelup_cooldown = 45;
        this.perk_cur = 0;
        this._pending_levelup = true;
      }
      this.combat_msg = `Win! +${b[5]}XP`;
      burst(64, 28, GOLD, 32);
      this.cphase = 1; return;
    }

    // Boss attack
    let raw = Math.max(0, b[3] - p.total_def() + Math.floor(Math.random()*4) - 1);
    if(p.has_perk("ninja") && Math.floor(Math.random()*100)+1 <= p.perk_val("dodge")){
      this.combat_msg = `DODGE! You:${dmg_label}`;
      this.cphase = 1; return;
    }
    if(raw > 0 && p.has_perk("dungeon_born") && !p.immune_used){
      raw = 0; p.immune_used = true;
    }
    // Arcane Shield blocks incoming damage
    let shield_blocked = false;
    if(this._shield_turns > 0){
      if(raw > 0){ shield_blocked = true; raw = 0; }
      this._shield_turns--;
      // Shield visual: blue ring flash on player area
      flash(this._shield_immune ? CYAN : LBLUE, 3);
    }
    p.hp -= raw;
    if(raw > 0){ shake(3); flash(RED, 4); FX.combat_attacker_offset = 3; }
    let st_str = "";
    if(Math.floor(Math.random()*100)+1 <= 25){
      const st = [ST_POISON, ST_FREEZE, ST_BLIND][Math.floor(Math.random()*3)];
      // Major shield grants status immunity while active (turn already ticked, was active this strike)
      if(!shield_blocked || !this._shield_immune){
        if(p.apply_status(st, STATUS_TURNS[st]||4)) st_str = "+" + (STATUS_NAMES[st] || "?");
      }
    }
    const block_tag = shield_blocked ? "BLK" : `${raw}`;
    this.combat_msg = `You:${dmg_label} B:${block_tag}${st_str}`;
    this.cphase = 1;
    if(p.hp <= 0){
      const ph_td=p.perk_tier_data("phoenix"); if(ph_td && p.revive_remaining>0){
        p.revive_remaining--; p.hp=Math.max(5,Math.floor(p.max_hp*ph_td.hp_frac));
        this.show_msg("PHOENIX revive!");
        burst(SW/2, SH/2, GOLD, 24);
        this.cphase = 0;
      } else this.gs = GS_GAMEOVER;
    }
  }

  // ── NORMAL COMBAT ─────────────────────────────────────────────────
  tick_combat(){
    apply_shake_transform();
    clear_screen(DGRAY);
    const m = this.combat_mon, p = this.p;
    // Backdrop (Pass 2)
    for(let i=0; i<14; i++){
      ctx.fillStyle = `rgba(20,15,30,${0.5 - i*0.03})`;
      ctx.fillRect(0, 14+i, SW, 2);
    }
    // Monster — draw backdrop panel then pixel art sprite
    const flash_m = FX.combat_target_flash > 0 && (FX.combat_target_flash%2);
    drect(rgb(30,25,40), 36, 6 - FX.combat_attacker_offset, 56, 46);
    drect(BLACK, 36, 6 - FX.combat_attacker_offset, 56, 46, true);
    const m_sprite = MONSTER_SPRITE[m[0]];
    if(m_sprite){
      // Sprite is ~20 wide × ~18 tall — center in 56x46 box
      const sx = 36 + (56 - 20) / 2;
      const sy = 6 + (46 - m_sprite.length) / 2 - FX.combat_attacker_offset;
      drawSprite(m_sprite, sx, sy, flash_m);
    } else {
      // Fallback for unknown monsters
      drect(m[7], 50, 20 - FX.combat_attacker_offset, 28, 22);
      drect(RED, 56, 26, 3, 3);
      drect(RED, 70, 26, 3, 3);
    }
    dtext(m[0].slice(0,12), 2, 8, WHITE);
    hbar(2, 18, 34, 6, Math.max(0, m[2]/m[1]), RED);
    dtext(`HP:${m[2]}/${m[1]}`, 2, 26, RED);
    dtext(`ATK:${m[3]}`, 2, 36, GRAY);
    if(m[11] > 0) dtext(STATUS_NAMES[m[12]] || "?", 80, 10, STATUS_COLORS[m[12]] || WHITE);
    // Magic charge indicator (right side, vertical)
    this._draw_charge_indicator();
    // Hero portrait — backdrop + pixel art with idle breathing
    drect(rgb(30,25,40), 36, 62, 30, 34);
    drect(WHITE, 36, 62, 30, 34, true);
    // Idle breathing: alternate hero frame every ~30 ticks
    const hero_sprite = (Math.floor(performance.now()/600) % 2) ? SPRITE_HERO_B : SPRITE_HERO_A;
    const hx = 36 + (30 - 18) / 2;  // center 18-wide sprite in 30-wide portrait
    const hy = 62 + (34 - 24) / 2;  // center 24-tall sprite in 34-tall portrait
    drawSprite(hero_sprite, hx, hy, false);
    // Shield ring around hero portrait if shielded
    if(this._shield_turns > 0) this._draw_shield_ring();
    drect(DGRAY, 0, SH-26, SW, 26);
    const hpf = Math.max(0, p.hp/p.max_hp);
    const hpc = hpf>0.5 ? GREEN : (hpf>0.25 ? ORANGE : RED);
    hbar(2, SH-25, 50, 5, hpf, hpc);
    dtext(`${p.hp}/${p.max_hp}`, 54, SH-25, hpc);
    dtext(`A:${p.total_atk()} D:${p.total_def()}`, 2, SH-18, GRAY);
    if(this.cphase === 0) dtext("A:Fight M:Magic B:Inv", 2, SH-10, WHITE);
    else dtext(this.combat_msg.slice(0,21), 2, SH-10, YELLOW);

    draw_particles();
    end_shake_transform();
    draw_flash();

    const e = poll();
    if(this.cphase === 1){
      if(e.a || e.b){
        if(!m[10]) this.gs = GS_DUNGEON;
        else this.cphase = 0;
      }
      return;
    }
    if(e.m){ this._open_scroll_picker(); return; }
    if(e.b){ this._combat_inv_return = GS_COMBAT; this.gs = GS_COMBAT_INV; return; }
    if(e.a) this._do_combat_round();
  }

  // ── COMBAT VISUAL HELPERS ─────────────────────────────────────────
  _draw_charge_indicator(){
    // Right-side vertical stack of stars. 3 by default, 4 with Arcane perk.
    const cmax = this._magic_charges_max;
    const x = SW - 8;
    let y = 52;
    // Background panel
    drect(BLACK, x-2, y-2, 8, cmax*9 + 4);
    drect(LPURP, x-2, y-2, 8, cmax*9 + 4, true);
    for(let i=0; i<cmax; i++){
      const lit = i < this._magic_charges;
      // Star glyph (simple cross of pixels for a tiny "star" feel)
      const c = lit ? GOLD : DGRAY;
      drect(c, x+1, y, 2, 1);
      drect(c, x,   y+1, 4, 1);
      drect(c, x+1, y+2, 2, 1);
      y += 9;
    }
  }
  _draw_shield_ring(){
    // Faint colored ring/outline behind the hero portrait when shielded.
    const t = performance.now() / 80;
    const pulse = (Math.sin(t) * 0.5 + 0.5) * 0.6 + 0.4;  // 0.4..1.0
    const c = this._shield_immune ? CYAN : LBLUE;
    ctx.save();
    ctx.globalAlpha = pulse * 0.6;
    // Two concentric outlines around the hero area
    drect(c, 33, 59, 36, 40, true);
    drect(c, 32, 58, 38, 42, true);
    ctx.restore();
    // Show remaining turns next to it
    dtext(`S:${this._shield_turns}`, 70, 92, c);
  }

  _do_combat_round(){
    const m = this.combat_mon, p = this.p;
    let atk = p.total_atk() + this._scroll_dmg + p.unique_bonus(m[0]) + this._juggernaut_stacks * (p.has_perk("juggernaut") ? p.perk_val("jugg") : 0); this._scroll_dmg = 0;
    const bd=p.perk_tier_data("berserker"); if(bd && p.hp/p.max_hp < bd.threshold) atk += bd.val;
    const is_crit = p.roll_crit_combat(this);
    let pdmg = Math.max(1, atk - m[4] + Math.floor(Math.random()*4) - 1);
    if(is_crit) pdmg = Math.max(2, pdmg * 2);
    m[2] -= pdmg;
    let thorn = 0;
    if(p.armor){
      for(const e of (p.enchants[p.armor] || [])){
        if(e[3] === "thorn") thorn += e[4];
      }
    }
    if(thorn && m[2] > 0) m[2] -= thorn;
    // Burn DoT (from Fire scroll)
    let burn_done = 0;
    if(this._burn_turns > 0 && m[2] > 0){
      burn_done = this._burn_dmg;
      m[2] -= burn_done;
      this._burn_turns--;
      if(this._burn_turns <= 0){ this._burn_dmg = 0; }
      burst(64, 28, ORANGE, 8);
    }

    FX.combat_target_flash = 4;
    if(is_crit){
      shake(6); flash(YELLOW, 6);
      burst(64, 28, YELLOW, 16);
    } else {
      shake(pdmg > 12 ? 3 : 2);
      burst(64, 28, RED, 8);
    }
    const burn_tag = burn_done > 0 ? `+B${burn_done}` : "";
    const dmg_label = (is_crit ? `CRIT!${pdmg}` : `${pdmg}`) + burn_tag;

    const alive = m[2] > 0;
    let mdmg = 0;
    let shield_blocked_outer = false;
    if(alive){
      let raw = Math.max(0, m[3] - p.total_def() + Math.floor(Math.random()*3) - 1);
      if(p.has_perk("ninja") && Math.floor(Math.random()*100)+1 <= p.perk_val("dodge")){
        this.combat_msg = `DODGE! You:${dmg_label}`;
        this.cphase = 1; return;
      }
      if(raw > 0 && p.has_perk("dungeon_born") && !p.immune_used){ raw = 0; p.immune_used = true; }
      // Arcane Shield blocks monster damage
      let shield_blocked = false;
      if(this._shield_turns > 0){
        if(raw > 0){ shield_blocked = true; raw = 0; }
        this._shield_turns--;
        flash(this._shield_immune ? CYAN : LBLUE, 3);
      }
      shield_blocked_outer = shield_blocked;
      mdmg = raw; p.hp -= mdmg;
      if(mdmg > 0){ shake(2); flash(RED, 3); FX.combat_attacker_offset = 2; }
      if(m[11] > 0 && Math.floor(Math.random()*100)+1 <= m[11]){
        // Status applies unless major shield's status immunity kicked in this turn
        const status_blocked = shield_blocked && this._shield_immune;
        if(!status_blocked && p.apply_status(m[12], STATUS_TURNS[m[12]]||4)){
          const sn = STATUS_NAMES[m[12]] || "?";
          const dmg_tag = shield_blocked ? "BLK" : `${mdmg}`;
          this.combat_msg = `You:${dmg_label} F:${dmg_tag}+${sn}`;
          this.cphase = 1; return;
        }
      }
    }
    if(!alive){
      m[10] = false;
      // Bestiary tracking
      this.bestiary[m[0]] = (this.bestiary[m[0]] || 0) + 1;
      // Juggernaut: gain stacks on kill (capped by tier)
      if(this.p.has_perk("juggernaut")){
        const max_stacks = this.p.perk_ranks["juggernaut"] >= 1 ? 15 : 10;
        this._juggernaut_stacks = Math.min(this._juggernaut_stacks + 1, max_stacks);
      }
      let gold = m[6];
      if(p.has_perk("scavenger")) gold *= p.perk_val("gold_m");
      if(p.weapon){
        for(const e of (p.enchants[p.weapon] || [])){
          if(e[3] === "gold") gold += m[6] * e[4];
          if(e[3] === "life") p.hp = Math.min(p.hp + e[4], p.max_hp);
        }
      }
      if(p.weapon === "Soulrender"){
        // Soulrender: drain 25% of max player HP as lifesteal per kill
        const drain = Math.max(3, (p.max_hp * 0.25) | 0);
        p.hp = Math.min(p.hp + drain, p.max_hp);
      }
      if(p.has_perk("bloodthirst")) p.hp = Math.min(p.hp + p.perk_val("blood"), p.max_hp);
      p.gold += gold;
      if(Math.random() < 0.45){
        const item = randomLoot(p.floor);
        if(p.inventory.length < p.max_inv) p.inventory.push(item);
      }
      const leveled = p.gain_xp(m[5]);
      this.combat_msg = `Win! +${m[5]}XP +${gold}G`;
      burst(64, 28, GOLD, 16);
      this.cphase = 1;
      if(leveled){
        p.do_level_up();
        FX.level_flash = 30;
        this.perk_pool = getPerkChoices(p, p.perk_choices); this._levelup_cooldown = 45;
        this.perk_cur = 0;
        this.gs = GS_LEVELUP;
      }
      return;
    }
    const final_foe_tag = shield_blocked_outer ? "BLK" : `${mdmg}`;
    this.combat_msg = `You:${dmg_label} Foe:${final_foe_tag}`;
    this.cphase = 1;
    if(p.hp <= 0){
      const ph_td=p.perk_tier_data("phoenix"); if(ph_td && p.revive_remaining>0){
        p.revive_remaining--; p.hp=Math.max(5,Math.floor(p.max_hp*ph_td.hp_frac));
        this.show_msg("PHOENIX revive!");
        burst(SW/2, SH/2, GOLD, 24);
        this.cphase = 0;
      } else this.gs = GS_GAMEOVER;
    }
  }

  // ── CHEST / LEVELUP / GAMEOVER ────────────────────────────────────
  tick_chest(){
    clear_screen(BLACK); draw_hud(this.p); this._draw_tiles();
    draw_particles();
    drect(BROWN, 16, 44, 96, 40);
    drect(GOLD, 16, 44, 96, 40, true);
    // Pulsing sparkle around chest text
    const g = (Math.sin(performance.now()/200) * 0.5 + 0.5);
    ctx.fillStyle = `rgba(255,255,0,${0.4 + g*0.4})`;
    ctx.fillRect(20, 46, 88, 2);
    dtext("A CHEST!", 30, 48, GOLD);
    dtext(this.chest_item.slice(0,18), 20, 60, WHITE);
    dtext("A: Take", 46, 74, GRAY);
    const e = poll();
    if(e.a || e.b) this.gs = GS_DUNGEON;
  }

  tick_levelup(){
    clear_screen(rgb(15,10,25));
    if(Math.random() < 0.25) burst(Math.random()*SW, Math.random()*SH, GOLD, 1);
    draw_particles();
    const p = this.p;

    // Header strip — compact to give cards more room
    drect(PURPLE, 0, 0, SW, 20);
    drect(GOLD, 0, 0, SW, 20, true);
    dtext("★ LEVEL UP ★", 30, 2, GOLD);
    dtext(`Lv${p.level} HP:${p.max_hp} ATK:${p.total_atk()} DEF:${p.total_def()}`, 4, 11, GREEN);

    // Perk cards — 4 max, 21px each, 1px gap, starting y=21 → ends y=106
    const CARD_H = 21;
    const CARD_X = 4, CARD_W = SW - 8;
    for(let i=0; i<this.perk_pool.length; i++){
      const choice = this.perk_pool[i];
      const pk = choice.pk;
      const rank = choice.rank;
      const tiers = PERK_TIERS[pk[0]];
      const cy = 21 + i * (CARD_H + 1);
      const sel = (i === this.perk_cur);

      // Card background
      drect(sel ? rgb(30,40,80) : rgb(25,20,35), CARD_X, cy, CARD_W, CARD_H);
      // Left color stripe = perk's color
      drect(pk[6], CARD_X, cy, 3, CARD_H);
      // Border
      if(sel){
        drect(GOLD, CARD_X, cy, CARD_W, CARD_H, true);
      } else {
        drect(rgb(70,55,90), CARD_X, cy, CARD_W, CARD_H, true);
      }

      // Perk name in perk's own color
      const roman = ["I","II","III"][rank] || "";
      let display_name = tiers ? `${pk[1]} ${roman}` : pk[1];
      if(choice.is_upgrade) display_name = `↑ ${display_name}`;
      const name_col = choice.is_upgrade ? CYAN : pk[6];
      dtext(display_name.slice(0,15), CARD_X+6, cy+2, name_col);

      // Description — white on dark strip for maximum contrast
      const desc = tiers ? tiers[rank].desc : pk[2];
      drect(rgb(15,10,25), CARD_X+4, cy+11, CARD_W-8, 8);
      dtext(desc.slice(0,20), CARD_X+6, cy+12, WHITE);
    }

    // Cooldown bar — sits at y=108, well clear of cards
    const COOLDOWN_MAX = 45;
    if(this._levelup_cooldown > 0) this._levelup_cooldown--;
    const cd_frac = 1 - this._levelup_cooldown / COOLDOWN_MAX;
    const cd_done = this._levelup_cooldown <= 0;
    const bar_y = 109;
    drect(rgb(20,15,30), CARD_X, bar_y, CARD_W, 9);
    if(!cd_done){
      drect(PURPLE, CARD_X, bar_y, (CARD_W*cd_frac)|0, 9);
      drect(rgb(100,70,140), CARD_X, bar_y, CARD_W, 9, true);
      dtext("Reading...", 40, bar_y+1, rgb(160,120,200));
    } else {
      drect(rgb(120,90,20), CARD_X, bar_y, CARD_W, 9);
      drect(GOLD, CARD_X, bar_y, CARD_W, 9, true);
      dtext("U/D select  A: Take", 14, bar_y+1, rgb(20,15,5));
    }
    const e = poll();
    if(e.u) this.perk_cur = Math.max(0, this.perk_cur-1);
    else if(e.d) this.perk_cur = Math.min(this.perk_pool.length-1, this.perk_cur+1);
    else if(e.a && cd_done && this.perk_pool.length){
      const choice = this.perk_pool[this.perk_cur];
      const pk = choice.pk;
      const rank = choice.rank;
      const tiers = PERK_TIERS[pk[0]];
      if(choice.is_upgrade){
        // Upgrade: update rank only, don't push perk again
        const old_rank = p.perk_ranks[pk[0]] || 0;
        p.perk_ranks[pk[0]] = rank;
        // Vitality upgrade: add the HP difference
        if(pk[3] === "maxhp" && tiers){
          const diff = tiers[rank].val - tiers[old_rank].val;
          p.max_hp += diff;
          p.hp = Math.min(p.hp + diff, p.max_hp);
        }
        // Phoenix upgrade: reset revive count to new total
        if(pk[0] === "phoenix" && tiers){
          p.revive_remaining = tiers[rank].count;
        }
        // Pack Rat upgrade: add the slot difference
        if(pk[0] === "pack_rat" && tiers){
          const diff = tiers[rank].val - tiers[old_rank].val;
          p.max_inv += diff;
        }
      } else {
        // New perk
        p.perks.push(pk);
        p.perk_ranks[pk[0]] = 0;
        // Vitality: apply initial HP
        if(pk[3] === "maxhp"){
          const val = tiers ? tiers[0].val : pk[4];
          p.max_hp += val;
          p.hp = Math.min(p.hp + val, p.max_hp);
        }
        // Pack Rat: expand inventory by tier value
        if(pk[0] === "pack_rat"){
          const pr_val = tiers ? tiers[0].val : 2;
          p.max_inv += pr_val;
        }
        // Phoenix: set initial revive count
        if(pk[0] === "phoenix" && tiers){
          p.revive_remaining = tiers[0].count;
        }
      }
      const roman = ["I","II","III"][rank] || "";
      const label = tiers ? `${pk[1]} ${roman}` : pk[1];
      this.show_msg(`${choice.is_upgrade?"↑":""}${label.slice(0,14)}`);
      burst(SW/2, SH/2, pk[6], 24);
      this.gs = GS_DUNGEON;
    }
  }

  tick_gameover(){
    clear_screen(BLACK);
    // Atmospheric red flicker
    const flick = (Math.sin(performance.now()/300) * 0.2 + 0.8);
    ctx.fillStyle = `rgba(80,0,0,${flick*0.3})`;
    ctx.fillRect(0, 0, SW, SH);
    drect(DRED, 8, 20, 112, 88);
    drect(RED, 8, 20, 112, 88, true);
    dtext("THOU HAST", 24, 28, RED);
    dtext("  FALLEN  ", 24, 40, RED);
    const p = this.p;
    dtext(`Floor ${p.floor}`, 36, 56, WHITE);
    dtext(`Level ${p.level}`, 36, 68, YELLOW);
    dtext(`Gold: ${p.gold}`, 30, 80, GOLD);
    if(p.banked > 0) dtext(`Banked: ${p.banked}`, 22, 92, GOLD);
    dtext("A: Title", 36, 104, GRAY);
    const e = poll();
    if(e.a || e.b){
      const banked = this.p.banked;
      const bestiary = this.bestiary;  // persist across runs
      this.p.reset();
      this.p.gold += banked;
      this.bestiary = bestiary;
      this.gs = GS_TITLE;
    }
  }

  // ── MAIN TICK ─────────────────────────────────────────────────────
  tick(){
    update_fx();
    const g = this.gs;
    if(g === GS_TITLE) this.tick_title();
    else if(g === GS_VILLAGE) this.tick_village();
    else if(g === GS_DUNGEON) this.tick_dungeon();
    else if(g === GS_COMBAT) this.tick_combat();
    else if(g === GS_BOSS_COMBAT) this.tick_boss_combat();
    else if(g === GS_SHOP) this.tick_shop();
    else if(g === GS_CHEST) this.tick_chest();
    else if(g === GS_LEVELUP) this.tick_levelup();
    else if(g === GS_GAMEOVER) this.tick_gameover();
    else if(g === GS_ENCHANT) this.tick_enchant();
    else if(g === GS_BLDG) this.tick_bldg();
    else if(g === GS_DIALOG) this.tick_dialog();
    else if(g === GS_HOME) this.tick_home();
    else if(g === GS_SCROLL_PICKER) this.tick_scroll_picker();
    else if(g === GS_QTY_PROMPT) this.tick_qty_prompt();
    else if(g === GS_SLOT) this.tick_slot();
    else if(g === GS_COMBAT_INV) this.tick_combat_inv();
    else if(g === GS_LIBRARY) this.tick_library();
    else if(g === GS_MERCHANT) this.tick_merchant();
  }
}

// ════════════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════════════
const game = new Game();
let last = 0;
function loop(t){
  // 30 FPS feel — Thumby Color targets similar
  if(t - last >= 33){
    last = t;
    game.tick();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// Focus canvas so keys work
canvas.tabIndex = 0;
canvas.focus();
window.addEventListener("click", () => canvas.focus());
</script>
