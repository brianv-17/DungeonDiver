<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<meta name="apple-mobile-web-app-title" content="DungeonDiver" />
<meta name="mobile-web-app-capable" content="yes" />
<title>DungeonDiver</title>
<style>
  html,body{ margin:0; padding:0; background:#0a0604; color:#e0c896; font-family:Georgia, serif; height:100%; overflow:hidden; }
  body{ display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:14px; box-sizing:border-box; }
  h1{ font-family:'Cinzel', Georgia, serif; color:#b8862b; margin:0 0 8px; font-size:22px; letter-spacing:.25em; text-shadow:1px 1px 0 #000; }
  .device{
    background:linear-gradient(160deg, #2a1810, #1a0f08);
    padding:22px 22px 28px;
    border-radius:18px;
    box-shadow:
      inset 0 0 0 2px #3a2515,
      inset 0 0 30px rgba(0,0,0,.6),
      0 8px 28px rgba(0,0,0,.7),
      0 0 60px rgba(80,30,10,.4);
    border:1px solid #1a0a04;
  }
  canvas{
    display:block;
    image-rendering:pixelated;
    image-rendering:crisp-edges;
    background:#000;
    border:2px solid #4a3520;
    box-shadow:
      inset 0 0 20px rgba(0,0,0,.8),
      0 0 0 1px #000,
      0 4px 12px rgba(0,0,0,.7);
  }
  .controls{
    margin-top:14px;
    font-size:11px;
    text-align:center;
    color:#8a7a5a;
    letter-spacing:.1em;
    line-height:1.7;
    max-width:520px;
  }
  .controls kbd{
    display:inline-block;
    background:#2a1810;
    color:#e0c896;
    border:1px solid #5a3a20;
    padding:1px 7px;
    border-radius:3px;
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    margin:0 1px;
  }
  .controls .sep{ color:#5a3a20; margin:0 6px; }
  .badge{ font-size:9px; color:#5a3a20; margin-top:6px; letter-spacing:.3em; }

  /* ── Touch controls (mobile / tablet) ──────────────────────── */
  .touch-pad{
    display:none;
    user-select:none;
    -webkit-user-select:none;
    -webkit-touch-callout:none;
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
  }
  .touch-pad button{
    -webkit-appearance:none;
    appearance:none;
    background:linear-gradient(160deg, #3a2515, #1a0f08);
    color:#e0c896;
    border:2px solid #5a3a20;
    box-shadow:
      inset 0 0 0 1px rgba(255,200,150,.1),
      inset 0 -3px 8px rgba(0,0,0,.5),
      0 3px 6px rgba(0,0,0,.6);
    font-family:'Cinzel', Georgia, serif;
    font-weight:700;
    font-size:18px;
    cursor:pointer;
    touch-action:none;
    user-select:none;
    -webkit-user-select:none;
  }
  .touch-pad button:active,
  .touch-pad button.pressed{
    background:linear-gradient(160deg, #1a0f08, #3a2515);
    box-shadow:
      inset 0 0 0 1px rgba(255,200,150,.1),
      inset 0 3px 8px rgba(0,0,0,.7),
      0 1px 2px rgba(0,0,0,.4);
    color:#f4d35e;
    transform:translateY(1px);
  }

  /* D-pad: cross layout */
  .dpad{
    position:relative;
    width:160px;
    height:160px;
  }
  .dpad button{
    position:absolute;
    width:54px;
    height:54px;
    border-radius:8px;
    font-size:22px;
  }
  .dpad .up    { top:0;    left:53px; }
  .dpad .down  { bottom:0; left:53px; }
  .dpad .left  { top:53px; left:0; }
  .dpad .right { top:53px; right:0; }
  .dpad .center{
    position:absolute;
    top:53px; left:53px;
    width:54px; height:54px;
    background:#1a0f08;
    border:2px solid #3a2515;
    border-radius:8px;
    pointer-events:none;
  }

  /* Action cluster: A, B, MENU */
  .actions{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:14px;
  }
  .actions .ab-row{
    display:flex;
    gap:14px;
  }
  .actions .btn-a,
  .actions .btn-b{
    width:64px;
    height:64px;
    border-radius:50%;
    font-size:26px;
  }
  .actions .btn-a{ color:#f4d35e; border-color:#7a5a20; }
  .actions .btn-menu{
    width:142px;
    height:44px;
    border-radius:22px;
    font-size:14px;
    letter-spacing:.2em;
  }

  /* ── Show touch controls on touchscreens — pure CSS, no JS needed ── */
  @media (pointer: coarse), (max-width: 768px) {
    body{
      /* Full-height flex column: game on top, controls on bottom, no gap */
      display:flex !important;
      flex-direction:column !important;
      align-items:center !important;
      justify-content:flex-start !important;
      padding:0 !important;
      margin:0 !important;
      width:100vw !important;
      height:100vh !important;
      height:100dvh !important; /* dynamic viewport — accounts for Safari address bar */
      overflow:hidden !important;
      background:#000 !important;
    }
    h1, .controls, .badge{ display:none !important; }
    .device{
      /* No extra padding/margin — canvas fills its allocated space exactly */
      padding:0 !important;
      margin:env(safe-area-inset-top, 0px) 0 0 0 !important;
      background:transparent !important;
      border:none !important;
      box-shadow:none !important;
      flex-shrink:0;
    }
    canvas{
      /* Square canvas: side = min of viewport width and available height above controls */
      /* Controls take ~190px. Safe area top ~44px. Remaining = 100dvh - 234px. */
      width:min(100vw, calc(100dvh - 190px)) !important;
      height:min(100vw, calc(100dvh - 190px)) !important;
      display:block !important;
    }
    .touch-pad{
      display:flex !important;
      position:static !important;  /* in normal flow, sits flush under canvas */
      width:100vw;
      flex-direction:row;
      justify-content:space-between;
      align-items:flex-end;
      padding:8px 16px env(safe-area-inset-bottom, 8px);
      flex-shrink:0;
      background:transparent;
      box-sizing:border-box;
    }
  }

  /* Smaller phones: shrink controls */
  @media (pointer: coarse) and (max-height: 700px) {
    .dpad{ width:130px; height:130px; }
    .dpad button{ width:42px; height:42px; }
    .dpad .up    { left:44px; }
    .dpad .down  { left:44px; }
    .dpad .left  { top:44px; }
    .dpad .right { top:44px; }
    .dpad .center{ top:44px; left:44px; width:42px; height:42px; }
    .actions .btn-a,
    .actions .btn-b{ width:50px; height:50px; font-size:20px; }
    .actions .btn-menu{ width:110px; height:34px; font-size:11px; }
  }
</style>
</head>
<body>
<h1>⚔ DungeonDiver ⚔</h1>
<div class="device">
  <canvas id="screen" width="384" height="384"></canvas>
</div>
<div class="controls">
  <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> move
  <span class="sep">·</span>
  <kbd>Z</kbd> A button (confirm/attack)
  <span class="sep">·</span>
  <kbd>X</kbd> B button (inventory/back)
  <span class="sep">·</span>
  <kbd>Enter</kbd> MENU (recall/village)
  <div class="badge">JS PORT · v4 · 128×128 @ 3×</div>
</div>

<!-- Touch controls (visible on touchscreens) -->
<div class="touch-pad">
  <div class="dpad">
    <button class="up"    data-key="u" aria-label="Up">▲</button>
    <button class="down"  data-key="d" aria-label="Down">▼</button>
    <button class="left"  data-key="l" aria-label="Left">◀</button>
    <button class="right" data-key="r" aria-label="Right">▶</button>
    <div class="center"></div>
  </div>
  <div class="actions">
    <button class="btn-menu" data-key="m" aria-label="Menu">MENU</button>
    <div class="ab-row">
      <button class="btn-b" data-key="b" aria-label="B button">B</button>
      <button class="btn-a" data-key="a" aria-label="A button">A</button>
    </div>
  </div>
</div>

<script>
"use strict";
/* ════════════════════════════════════════════════════════════════
   DUNGEONFATE v4 — JS PORT WITH PASS 2 VISUAL POLISH
   ════════════════════════════════════════════════════════════════
   Faithful port of main.py: all monsters, items, perks, enchants,
   shrines, traps, village, combat math, boss phases. Plus polish:
     · animated player sprite with facing direction (N/S/E/W)
     · tile variation per floor (wall/floor variants, palette shift)
     · screen shake on heavy hits, hit-flash on attacker
     · particle bursts on hit / chest open / level up
     · pulsing HP bar below 25%, flashing XP bar on level
     · animated title (starfield + pulsing logo)
     · fade-to-black floor transitions with banner
   ─────────────────────────────────────────────────────────────── */

const canvas = document.getElementById("screen");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

// Virtual screen 128×128, scaled by SCALE to canvas
const SW = 128, SH = 128, SCALE = 3;
canvas.width = SW * SCALE;
canvas.height = SH * SCALE;
ctx.scale(SCALE, SCALE);

// ── Colors (Python's rgb() helper used RGB565; we just store hex) ────
const rgb = (r,g,b) => `rgb(${r},${g},${b})`;
const BLACK=rgb(0,0,0), WHITE=rgb(255,255,255);
const GRAY=rgb(110,110,110), DGRAY=rgb(35,35,45), MGRAY=rgb(60,60,75);
const BROWN=rgb(110,70,30), LBROWN=rgb(165,115,60);
const GREEN=rgb(55,185,55), DGREEN=rgb(25,95,25), LGREEN=rgb(130,230,100);
const RED=rgb(225,50,50), DRED=rgb(140,20,20);
const ORANGE=rgb(225,140,40), YELLOW=rgb(245,215,50);
const BLUE=rgb(55,100,225), LBLUE=rgb(115,185,245), DBLUE=rgb(20,40,120);
const PURPLE=rgb(165,55,205), LPURP=rgb(210,130,255), INDIGO=rgb(75,0,130);
const CYAN=rgb(45,205,205), GOLD=rgb(255,200,0), PINK=rgb(235,130,155);
const TEAL=rgb(35,165,140);
const POISON_C=rgb(100,200,60), FREEZE_C=rgb(140,210,255);
const CURSE_C=rgb(180,0,180), BOSS_C=rgb(180,20,20), SHRINE_C=rgb(200,180,50);

// ── Constants ────────────────────────────────────────────────────────

// Tile IDs

// Named unique bonus-vs table: { name: { bonus, types[] } }
const UNIQUE_VS = {

const LUCKY_SEVEN_CRIT_BONUS = 33;

// Scroll behaviour table — keyed by item name.
// dmg = immediate damage (fire/lit). burn_turns/burn_dmg = burn DoT (fire only).
// turns = shield duration (shield). status_immune = whether shield blocks status too.
const SCROLL_DATA = {

const SHOP_STOCK=["Iron Sword","Steel Sword","Leather Armor","Chain Mail",
 "Plate Armor","Iron Shield","Health Potion","Elixir","Herb",

// (floor_min, floor_max, item, weight)

 // Scroll drops

 // Other rare drops

function randomLoot(floor){
  const elig = LOOT_TABLE.filter(e => e[0]<=floor && floor<=e[1]).map(e => [e[3],e[2]]);
  if(!elig.length) return "Old Coin";
  const total = elig.reduce((a,[w])=>a+w, 0);
  let r = Math.floor(Math.random()*total), acc = 0;
  for(const [w,n] of elig){ acc += w; if(r<acc) return n; }
  return "Old Coin";
}

// ── Monsters ─────────────────────────────────────────────────────────
// name, floor_min, hp, atk, def, xp, gold, color, status%, status
const MONSTERS=[

const BOSSES=[

function getBoss(floor){
  const idx = Math.min(((floor/5)|0)-1, BOSSES.length-1) % BOSSES.length;
  const b = [...BOSSES[idx]];
  // Tier scaling: each 5-floor tier adds +15% HP and +10% ATK
  const tier = ((floor/5)|0) - 1;
  if(tier > 0){
    b[1] = (b[1] * (1 + tier * 0.15)) | 0;
    b[2] = (b[2] * (1 + tier * 0.10)) | 0;
    b[7] = (b[7] * (1 + tier * 0.10)) | 0;
  }
  // Cycle scaling: each full 25-floor cycle beyond floor 25 adds 1.6x multiplier
  const cycle = Math.floor((floor - 1) / 25);
  if(cycle > 0){
    const cm = Math.pow(1.6, cycle);
    b[1] = (b[1] * cm) | 0;
    b[2] = (b[2] * cm) | 0;
    b[7] = (b[7] * cm) | 0;
    // XP and gold also scale with cycle
    b[4] = (b[4] * cm) | 0;
    b[5] = (b[5] * cm) | 0;
  }
  // Add cycle indicator to boss name so player knows difficulty
  if(cycle > 0) b[0] = `${b[0]} C${cycle}`;
  return b;
}

function pickMonster(floor){
  let elig = MONSTERS.filter(m => m[1] <= floor).map(m => [...m]);
  if(!elig.length) elig = [[...MONSTERS[0]]];
  const tail = elig.slice(-5);
  return [...tail[Math.floor(Math.random()*tail.length)]];
}

function shuffle(arr){
  for(let i=arr.length-1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function getPerkChoices(player, count=3){
  const choices = [];
  for(const pk of ALL_PERKS){
    const id = pk[0];
    const tiers = PERK_TIERS[id];
    const has = player.has_perk(id);
    if(!has){
      // Can take T1 (or the only rank for utility perks)
      const min_lv = tiers ? tiers[0].lv : pk[5];
      if(player.level >= min_lv) choices.push({pk, rank:0, is_upgrade:false});
    } else if(tiers){
      // Can we upgrade to next rank?
      const cur = player.perk_ranks[id] || 0;
      const nxt = cur + 1;
      if(nxt < tiers.length && player.level >= tiers[nxt].lv)
        choices.push({pk, rank:nxt, is_upgrade:true});
    }
  }
  // Fallback: if nothing eligible at all, show any unowned perk
  if(!choices.length){
    for(const pk of ALL_PERKS){
      if(!player.has_perk(pk[0])) choices.push({pk, rank:0, is_upgrade:false});
    }
  }
  shuffle(choices);
  return choices.slice(0, count);
}

// ════════════════════════════════════════════════════════════════
//  PLAYER
// ════════════════════════════════════════════════════════════════
class Player {
  constructor(){ this.reset(); }
  reset(){
    this.hp=30; this.max_hp=30;
    this.atk=4; this.defense=1;
    this.xp=0; this.xp_next=55; this.level=1;
    this.gold=10; this.floor=1;
    this.inventory=[]; this.enchants={}; this.perks=[];
    this.weapon=null; this.armor=null;
    this.cursed_items=new Set();
    this.identified=new Set();
    this.buildings={shop:true, inn:true, home:true};
    this.banked=0;
    this.max_inv=20;  // expandable via Pack Rat perk
    this.immune_used=false;
    this.revive_remaining=0;   // replaces revive_used — counts remaining revives this run
    this.perk_choices=3;
    this.perk_ranks={};        // {perk_id: rank_index 0..2}
    this.max_inv=20;           // base inventory cap; Pack Rat perk adds +2
    this.invocation_rank=0;    // 0-3; each rank adds +5 dmg to attack scrolls, +1 turn to shield
    this.x=2; this.y=2;
    this.statuses = {};
    this._curse_penalty = 0;  // tracks actual ATK/DEF penalty applied by curse
    this.atk_mod=0; this.def_mod=0;
    this.facing=2; // 0=N 1=E 2=S 3=W
  }
  has_perk(pid){ return this.perks.some(pk => pk[0]===pid); }
  perk_val(key){
    // Match by perk id (pk[0]) OR type (pk[3]).
    // For tiered perks, return the current rank's value from PERK_TIERS.
    for(const pk of this.perks){
      if(pk[0]===key || pk[3]===key){
        const id = pk[0];
        if(PERK_TIERS[id]){
          const rank = this.perk_ranks[id] || 0;
          return PERK_TIERS[id][rank].val;
        }
        return pk[4];
      }
    }
    return 0;
  }
  perk_tier_data(id){
    // Returns the full tier data object for the current rank, or null if not owned / no tiers.
    if(!this.has_perk(id) || !PERK_TIERS[id]) return null;
    return PERK_TIERS[id][this.perk_ranks[id] || 0];
  }
  total_atk(){
    let b = this.atk + this.atk_mod;
    if(this.weapon){
      b += ITEMS[this.weapon][3];
      for(const e of (this.enchants[this.weapon]||[])){
        if(e[3]==="atk") b += e[4];
      }
    }
    for(const pk of this.perks){
      const id = pk[0];
      if(pk[3]==="atk")   b += this.perk_val(id);       // iron_fist
      if(id==="warlord")  b += (this.perk_tier_data(id)||{val:pk[4]}).val;
      if(id==="titan")    b += this.perk_val(id);
      // berserker handled in combat (conditional on HP)
    }
    return Math.max(1, b);
  }
  total_def(){
    let b = this.defense + this.def_mod;
    if(this.armor){
      b += ITEMS[this.armor][3];
      for(const e of (this.enchants[this.armor]||[])){
        if(e[3]==="def") b += e[4];
      }
    }
    for(const pk of this.perks){
      const id = pk[0];
      if(pk[3]==="def")  b += this.perk_val(id);        // toughness
      if(id==="paladin") b += (this.perk_tier_data(id)||{def:0}).def;  // fix: was never applied before
      if(id==="warlord") b += (this.perk_tier_data(id)||{def_mod:-3}).def_mod;
      if(id==="titan")   b += this.perk_val(id);
    }
    return Math.max(0, b);
  }
  resist_status(){
    let c = 0;
    const ps = this.perk_tier_data("pure_soul");
    if(ps) c += ps.val;  // uses tiered value (35/55/100)
    if(this.armor){
      for(const e of (this.enchants[this.armor]||[])){
        if(e[3]==="resist") c += 50;
      }
    }
    return Math.floor(Math.random()*100)+1 <= c;
  }
  crit_chance(){
    // Base 5% crit. Vorpal weapon enchant adds +10. Lucky Seven adds +33.
    let c = 5;
    if(this.weapon){
      for(const e of (this.enchants[this.weapon]||[])){
        if(e[0]==="Vorpal") c += 10;
      }
      if(this.weapon === "Lucky Seven") c += LUCKY_SEVEN_CRIT_BONUS;
    }
    return c;
  }
  roll_crit(){
    return Math.floor(Math.random()*100)+1 <= this.crit_chance();
  }
  // Called from combat — checks deathmark before random crit
  roll_crit_combat(game){
    if(game._deathmark_crits > 0){ game._deathmark_crits--; return true; }
    return this.roll_crit();
  }
  unique_bonus(enemy_name){
    // Returns bonus ATK if equipped weapon is a named unique vs this enemy type
    if(!this.weapon) return 0;
    const uv = UNIQUE_VS[this.weapon];
    if(!uv) return 0;
    return uv.types.includes(enemy_name) ? uv.bonus : 0;
  }
  // ── Status helpers ─────────────────────────────────────────────
  // Backward-compat getters. Use a fixed priority order rather than object key order
  // (which is unreliable for numeric keys).
  _primary_status(){
    const order = [ST_CURSE, ST_POISON, ST_BLIND, ST_FREEZE];
    for(const s of order) if(s in this.statuses) return s;
    return ST_NONE;
  }
  get status(){ return this._primary_status(); }
  get status_turns(){ const s = this._primary_status(); return s===ST_NONE ? 0 : this.statuses[s]; }
  get blinded(){ return ST_BLIND in this.statuses; }
  has_any_status(){ return Object.keys(this.statuses).length > 0; }
  has_status(stype){ return stype in this.statuses; }
  active_statuses(){ return Object.keys(this.statuses).map(Number); }

  apply_status(stype, turns=5){
    if(this.resist_status()) return false;
    if(stype === ST_CURSE){
      if(this.has_status(ST_CURSE)){
        if(turns !== -1) this.statuses[ST_CURSE] = Math.max(this.statuses[ST_CURSE]==-1?999:this.statuses[ST_CURSE], turns);
        return true;
      }
      this.atk_mod -= 2; this.def_mod -= 2;
      this._curse_penalty = 2;  // track how much was applied for proper reversal
    }
    this.statuses[stype] = turns;
    return true;
  }
  _remove_curse_penalty(){
    // Reverse exactly the penalty we applied. _curse_penalty must be set when curse was applied.
    const pen = this._curse_penalty || 0;
    this.atk_mod += pen; this.def_mod += pen;
    this._curse_penalty = 0;
  }
  clear_status(stype=null){
    if(stype === null){
      // Clear all statuses
      if(ST_CURSE in this.statuses) this._remove_curse_penalty();
      this.statuses = {};
    } else {
      if(stype === ST_CURSE && this.has_status(ST_CURSE)) this._remove_curse_penalty();
      delete this.statuses[stype];
    }
  }
  tick_status(){
    if(!this.has_any_status()) return 0;
    let total_dmg = 0;
    const cursebane2 = this.has_perk("cursebane");
    const to_remove = [];

    for(const stypeStr of Object.keys(this.statuses)){
      const stype = Number(stypeStr);
      const is_permanent = (stype === ST_CURSE && this.statuses[stype] === -1);

      if(!is_permanent){
        const tick = (stype === ST_NONE ? 0 : (cursebane2 ? 2 : 1));
        this.statuses[stype] = Math.max(0, this.statuses[stype] - tick);
      }

      if(stype === ST_POISON && (is_permanent || this.statuses[stype] > 0)){
        // Poison kills — no floor
        const dmg = 2; this.hp -= dmg; total_dmg += dmg;
      }
      if(stype === ST_CURSE && (is_permanent || this.statuses[stype] > 0)){
        // Monster curse (timed): 5% HP drain per step, leaves at 1
        // Shrine curse (permanent): bigger debuff only, NO damage
        if(!is_permanent){
          const dmg = Math.max(1, (this.max_hp * 0.05) | 0);
          this.hp = Math.max(1, this.hp - dmg);
          total_dmg += dmg;
        }
      }

      // Expire timed statuses
      if(!is_permanent && this.statuses[stype] <= 0){
        to_remove.push(stype);
      }
    }

    for(const s of to_remove){
      if(s === ST_CURSE) this._remove_curse_penalty();
      delete this.statuses[s];
    }
    return total_dmg;
  }
  heal(amount){
    if(this.has_perk("medic")) amount = (amount * this.perk_val("heal_m") / 100) | 0;
    const before = this.hp;
    this.hp = Math.min(this.hp + amount, this.max_hp);
    return this.hp - before;
  }
  gain_xp(amount){
    if(this.has_perk("quick_learn")) amount = (amount * this.perk_val("xp_m") / 100) | 0;
    this.xp += amount;
    return this.xp >= this.xp_next;
  }
  _calc_xp_next(lv){
    // Smooth piecewise curve: early (1-20) → mid (21-35) → late (36-50+)
    const base = 50 * lv + 5 * lv * lv;
    const mid  = lv > 20 ? 15 * (lv-20) * (lv-20) : 0;
    const late = lv > 35 ? 50 * (lv-35) * (lv-35) : 0;
    return base + mid + late;
  }
  do_level_up(){
    this.level++; this.xp -= this.xp_next;
    this.xp_next = this._calc_xp_next(this.level);
    this.max_hp += 6; this.hp = Math.min(this.hp+6, this.max_hp); this.atk++;
    this.perk_choices = 3 + (this.buildings && this.buildings.library ? 1 : 0);
  }
  count_lapis(){ return this.inventory.filter(i => i==="Amaliate").length; }
  remove_lapis(n){
    let removed = 0; const ni = [];
    for(const i of this.inventory){
      if(i==="Amaliate" && removed<n) removed++;
      else ni.push(i);
    }
    this.inventory = ni;
  }
  is_cursed(name){ return this.cursed_items.has(name); }
  is_identified(name){ return this.identified.has(name); }
  sell_item(idx){
    if(idx<0 || idx>=this.inventory.length) return 0;
    const name = this.inventory[idx];
    // Only block if this is the equipped item AND it's the only copy in inventory
    if((name===this.weapon || name===this.armor)){
      const count = this.inventory.filter(n => n===name).length;
      if(count <= 1) return 0;
    }
    let price = ITEMS[name][0];
    if(this.has_perk("scavenger") && ITEMS[name][2]==="gem") price *= this.perk_val("gold_m");
    this.inventory.splice(idx, 1); this.gold += price;
    // Only remove curse state if no more copies remain in inventory
    if(!this.inventory.includes(name)) this.cursed_items.delete(name);
    return price;
  }
  buy_item(name){
    const price = ITEMS[name][1];
    if(this.gold>=price && this.inventory.length<this.max_inv){
      this.gold -= price; this.inventory.push(name);
      this.identified.add(name);
      return true;
    }
    return false;
  }
  use_item(idx){
    if(idx<0 || idx>=this.inventory.length) return ["",null];
    const name = this.inventory[idx];
    const itype = ITEMS[name][2];
    if(itype==="heal"){
      const g = this.heal(ITEMS[name][3]);
      this.inventory.splice(idx,1); return [`+${g} HP`, null];
    }
    if(itype==="cure_p"){
      const ok = this.has_status(ST_POISON);
      if(ok){ this.clear_status(ST_POISON); }
      this.inventory.splice(idx,1);
      return [ok?"Poison cured!":"No poison...", null];
    }
    if(itype==="cure_f"){
      const ok = this.has_status(ST_FREEZE);
      if(ok){ this.clear_status(ST_FREEZE); }
      this.inventory.splice(idx,1);
      return [ok?"Freeze cured!":"Not frozen...", null];
    }
    if(itype==="cure_a"){
      const had_any = this.has_any_status();
      this.clear_status();  // clears all
      this.inventory.splice(idx,1);
      return [had_any?"All ailments cured!":"Feeling fine", null];
    }
    if(itype==="uncurse"){
      if(this.cursed_items.size>0){
        this.cursed_items.clear();
        if(this.has_status(ST_CURSE)) this.clear_status(ST_CURSE);
        else { this.atk_mod = Math.max(0,this.atk_mod); this.def_mod = Math.max(0,this.def_mod); }
        this.inventory.splice(idx,1); return ["All curses lifted!", null];
      }
      this.inventory.splice(idx,1); return ["No curses to lift", null];
    }
    if(itype==="recall"){ this.inventory.splice(idx,1); return ["Recall!","recall"]; }
    // Combat scrolls (fire/lit/shield/annihilate) — consumed via picker
    if(itype==="fire_s" || itype==="lit_s" || itype==="shield_s" || itype==="annihilate"){
      this.inventory.splice(idx,1); return [name, itype];
    }
    if(itype==="id"){ this.inventory.splice(idx,1); return ["id","id"]; }
    if(itype==="weapon"){
      if(!this.is_identified(name)){
        if(ITEMS[name][5]>0 && Math.floor(Math.random()*100)+1 <= ITEMS[name][5]) this.cursed_items.add(name);
        this.identified.add(name);
      }
      this.weapon = name;
      if(this.is_cursed(name)){ this.atk_mod-=2; this.def_mod-=1; return ["Equipped... cursed!","cursed"]; }
      return [`Equipped ${name}`, null];
    }
    if(itype==="armor"){
      if(!this.is_identified(name)){
        if(ITEMS[name][5]>0 && Math.floor(Math.random()*100)+1 <= ITEMS[name][5]) this.cursed_items.add(name);
        this.identified.add(name);
      }
      this.armor = name;
      if(this.is_cursed(name)){ this.def_mod-=2; this.atk_mod-=1; return ["Equipped... cursed!","cursed"]; }
      return [`Equipped ${name}`, null];
    }
    return ["Can't use", null];
  }
}

// ════════════════════════════════════════════════════════════════
//  DUNGEON
// ════════════════════════════════════════════════════════════════
class DungeonMap {
  constructor(floor){
    this.floor = floor;
    this.tiles = Array.from({length:MAP_H}, () => Array(MAP_W).fill(T_WALL));
    this.monsters = []; this.chests = {}; this.shrines = new Set(); this.traps = {};
    this.stair_x = this.stair_y = 0;
    this.town_x = this.town_y = 0;
    this.start_x = this.start_y = 2;
    this.is_boss_floor = (floor>0 && floor%5===0);
    this.boss_door = null;
    this.boss_cleared = false;  // staircase locked on boss floors until boss dies
    // Tile variation seeds (Pass 2 polish): per-tile variant indices for floor/wall
    this.wall_var = Array.from({length:MAP_H}, () => Array(MAP_W).fill(0).map(() => Math.floor(Math.random()*3)));
    this.floor_var = Array.from({length:MAP_H}, () => Array(MAP_W).fill(0).map(() => Math.floor(Math.random()*2)));
    this._generate();
  }
  _carve(x,y,w,h){
    for(let ty=y; ty<y+h; ty++){
      for(let tx=x; tx<x+w; tx++){
        if(tx>0 && tx<MAP_W-1 && ty>0 && ty<MAP_H-1) this.tiles[ty][tx] = T_FLOOR;
      }
    }
  }
  _generate(){
    const rooms = [];
    let attempts = 0;
    while(rooms.length<7 && attempts<200){
      attempts++;
      const rw = 3 + Math.floor(Math.random()*4);
      const rh = 3 + Math.floor(Math.random()*3);
      const rx = 1 + Math.floor(Math.random()*(MAP_W-rw-2));
      const ry = 1 + Math.floor(Math.random()*(MAP_H-rh-2));
      let overlap = false;
      for(const [ox,oy,ow,oh] of rooms){
        if(rx<ox+ow+1 && rx+rw+1>ox && ry<oy+oh+1 && ry+rh+1>oy){ overlap = true; break; }
      }
      if(!overlap){ rooms.push([rx,ry,rw,rh]); this._carve(rx,ry,rw,rh); }
    }
    // Corridors
    for(let i=1; i<rooms.length; i++){
      const ax = rooms[i-1][0] + (rooms[i-1][2]/2|0);
      const ay = rooms[i-1][1] + (rooms[i-1][3]/2|0);
      const bx = rooms[i][0] + (rooms[i][2]/2|0);
      const by = rooms[i][1] + (rooms[i][3]/2|0);
      let x=ax, y=ay;
      while(x!==bx){ this.tiles[y][x]=T_FLOOR; x += (bx>x ? 1 : -1); }
      while(y!==by){ this.tiles[y][x]=T_FLOOR; y += (by>y ? 1 : -1); }
    }
    // Staircase — boss floors don't place stair until boss dies
    const stair_room = (this.is_boss_floor && rooms.length>=2) ? rooms[rooms.length-2] : rooms[rooms.length-1];
    this.stair_x = stair_room[0] + (stair_room[2]/2|0);
    this.stair_y = stair_room[1] + (stair_room[3]/2|0);
    if(!this.is_boss_floor){
      this.tiles[this.stair_y][this.stair_x] = T_STAIR;
    }
    // (On boss floors, T_STAIR is placed when boss_cleared becomes true)
    // Town portal in first room
    const fr = rooms[0];
    this.town_x = fr[0]+1; this.town_y = fr[1]+1;
    this.tiles[this.town_y][this.town_x] = T_TOWN;
    this.start_x = fr[0] + (fr[2]/2|0);
    this.start_y = fr[1] + (fr[3]/2|0);
    // Boss door
    if(this.is_boss_floor && rooms.length){
      const br = rooms[rooms.length-1];
      const bdx = br[0] + (br[2]/2|0);
      const bdy = br[1];
      this.tiles[bdy][bdx] = T_BOSS_DOOR;
      this.boss_door = [bdx, bdy];
    }
    // Monsters
    for(let i=1; i<rooms.length; i++){
      const room = rooms[i];
      if(this.is_boss_floor && i===rooms.length-1) continue;
      if(Math.random() < 0.75){
        const tx = room[0] + 1 + Math.floor(Math.random()*(room[2]-1));
        const ty = room[1] + 1 + Math.floor(Math.random()*(room[3]-1));
        if(!(tx===this.stair_x && ty===this.stair_y)){
          const m = pickMonster(this.floor);
          const d = Math.max(0, this.floor - m[1]);
          m[2] = (m[2] * (1 + d*0.15)) | 0;
          m[3] = (m[3] * (1 + d*0.1)) | 0;
          // [name, max_hp, cur_hp, atk, def, xp, gold, color, tx, ty, alive, st%, st]
          this.monsters.push([m[0], m[2], m[2], m[3], m[4], m[5], m[6], m[7], tx, ty, true, m[8], m[9]]);
        }
      }
    }
    // Chests
    let sample = (this.is_boss_floor && rooms.length>2) ? rooms.slice(1,-1) : rooms.slice(1);
    if(sample.length){
      shuffle([...sample]).slice(0, Math.min(3, sample.length)).forEach(room => {
        const tx = room[0] + room[2] - 1;
        const ty = room[1] + room[3] - 1;
        if(this.tiles[ty][tx] === T_FLOOR){
          this.tiles[ty][tx] = T_CHEST;
          this.chests[`${tx},${ty}`] = randomLoot(this.floor);
        }
      });
    }
    // Traps
    const trap_types = ["spike","poison","freeze"];
    for(let i=0; i<2+((this.floor/2)|0); i++){
      const room = (rooms.length>1 ? rooms.slice(1) : rooms)[Math.floor(Math.random()*Math.max(1,rooms.length-1))];
      if(!room) break;
      const tx = room[0] + Math.floor(Math.random()*room[2]);
      const ty = room[1] + Math.floor(Math.random()*room[3]);
      const key = `${tx},${ty}`;
      if(this.tiles[ty][tx]===T_FLOOR && !(key in this.traps)){
        this.traps[key] = trap_types[Math.floor(Math.random()*trap_types.length)];
      }
    }
    // Shrines
    const nshrines = 1 + Math.floor(Math.random()*2);
    for(let i=0; i<nshrines; i++){
      const room = rooms[Math.floor(Math.random()*rooms.length)];
      const tx = room[0] + (room[2]/2|0);
      const ty = room[1] + 1;
      if(this.tiles[ty][tx]===T_FLOOR){
        this.tiles[ty][tx] = T_SHRINE;
        this.shrines.add(`${tx},${ty}`);
      }
    }
    // Slot machine — 5% chance per floor, one-time use
    if(Math.random() < 0.05 && rooms.length > 1){
      const room = rooms[1 + Math.floor(Math.random()*(rooms.length-1))];
      const tx = room[0] + (room[2]/2|0);
      const ty = room[1] + (room[3]/2|0);
      if(this.tiles[ty][tx] === T_FLOOR){
        this.tiles[ty][tx] = T_SLOT;
      }
    }
    // Dungeon merchant — floor 50+ only, 5% chance, one visit
    if(this.floor >= 50 && Math.random() < 0.05 && rooms.length > 2){
      const room = rooms[1 + Math.floor(Math.random()*(rooms.length-2))];
      const tx = room[0] + 1;
      const ty = room[1] + 1;
      if(this.tiles[ty][tx] === T_FLOOR) this.tiles[ty][tx] = T_MERCHANT;
    }
  }
  tile_at(x,y){
    if(x>=0 && x<MAP_W && y>=0 && y<MAP_H) return this.tiles[y][x];
    return T_WALL;
  }
  monster_at(x,y){
    for(const m of this.monsters) if(m[8]===x && m[9]===y && m[10]) return m;
    return null;
  }
}

// ════════════════════════════════════════════════════════════════
//  DRAW HELPERS
// ════════════════════════════════════════════════════════════════
function clear_screen(c){ ctx.fillStyle = c; ctx.fillRect(0, 0, SW, SH); }
function drect(c,x,y,w,h,outline=false){
  if(outline){
    ctx.strokeStyle = c; ctx.lineWidth = 1;
    ctx.strokeRect((x|0)+0.5, (y|0)+0.5, (w|0)-1, (h|0)-1);
  } else {
    ctx.fillStyle = c; ctx.fillRect(x|0, y|0, w|0, h|0);
  }
}
// Text rendering — uses a pixel-style font on canvas; small caps using a simple bitmap-ish approach
ctx.textBaseline = "top";
function dtext(s, x, y, c=WHITE){
  if(!s) return;
  ctx.fillStyle = c;
  ctx.font = "8px monospace";
  ctx.fillText(String(s), x|0, y|0);
}
function hbar(x,y,w,h,frac,fg,bg=BLACK){
  drect(bg,x,y,w,h);
  drect(fg,x,y,Math.max(1,(w*frac)|0),h);
}

  'D': rgb(85,35,30),       // dragon dark
  'F': rgb(255,140,40),     // flame
  // Stone (golem)
  'h': rgb(110,105,100),    // stone
  'H': rgb(70,65,60),       // stone shadow
};

// Draw a sprite from a string array. (cx,cy) = top-left of where sprite goes.
function drawSprite(spriteRows, cx, cy, flashWhite=false){
  for(let row=0; row<spriteRows.length; row++){
    const line = spriteRows[row];
    for(let col=0; col<line.length; col++){
      const ch = line[col];
      const c = SP[ch];
      if(c === null || c === undefined) continue;
      ctx.fillStyle = flashWhite ? rgb(240,240,245) : c;
      ctx.fillRect((cx + col)|0, (cy + row)|0, 1, 1);
    }
  }
}

// ════════════════════════════════════════════════════════════════
//  VISUAL POLISH (Pass 2)
// ════════════════════════════════════════════════════════════════
const FX = {
  shake: 0,                       // screen shake intensity (frames)
  hit_flash: 0,                   // global red flash
  flash_color: RED,
  level_flash: 0,                 // gold XP-bar flash
  particles: [],                  // {x,y,vx,vy,life,color,size}
  transition: 0,                  // floor-transition fade (0-30)
  transition_text: "",
  combat_attacker_offset: 0,      // animation offset for hit
  combat_target_flash: 0,         // flash on target on hit
  player_anim_frame: 0,           // walk frame
  player_anim_t: 0,
};

function shake(intensity){ FX.shake = Math.max(FX.shake, intensity); }
function flash(color=RED, frames=4){ FX.hit_flash = frames; FX.flash_color = color; }
function burst(x, y, color, count=8){
  for(let i=0; i<count; i++){
    const a = Math.random()*Math.PI*2;
    const sp = 0.4 + Math.random()*1.4;
    FX.particles.push({
      x, y,
      vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
      life: 12 + Math.floor(Math.random()*10),
      color, size: 1 + (Math.random()<0.3 ? 1 : 0)
    });
  }
}
function update_fx(){
  if(FX.shake>0) FX.shake--;
  if(FX.hit_flash>0) FX.hit_flash--;
  if(FX.level_flash>0) FX.level_flash--;
  if(FX.combat_attacker_offset>0) FX.combat_attacker_offset--;
  if(FX.combat_target_flash>0) FX.combat_target_flash--;
  if(FX.transition>0) FX.transition--;
  FX.player_anim_t++;
  if(FX.player_anim_t>10){ FX.player_anim_t=0; FX.player_anim_frame=(FX.player_anim_frame+1)%2; }
  // Particle physics
  FX.particles = FX.particles.filter(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.08; // gravity
    p.life--;
    return p.life > 0;
  });
}
function draw_particles(){
  for(const p of FX.particles){
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x|0, p.y|0, p.size, p.size);
  }
}
function apply_shake_transform(){
  if(FX.shake>0){
    const dx = (Math.random()-0.5) * FX.shake * 0.8;
    const dy = (Math.random()-0.5) * FX.shake * 0.8;
    ctx.save();
    ctx.translate(dx|0, dy|0);
  }
}
function end_shake_transform(){
  if(FX.shake>0) ctx.restore();
}
function draw_flash(){
  if(FX.hit_flash>0){
    ctx.save();
    ctx.globalAlpha = 0.35 * (FX.hit_flash/4);
    ctx.fillStyle = FX.flash_color;
    ctx.fillRect(0, 0, SW, SH);
    ctx.restore();
  }
}
function draw_transition(){
  if(FX.transition>0){
    const fade = FX.transition / 30;
    const alpha = (fade>0.5) ? (2-fade*2) : (fade*2);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = BLACK;
    ctx.fillRect(0, 0, SW, SH);
    if(alpha > 0.7 && FX.transition_text){
      ctx.globalAlpha = (alpha-0.5)*2;
      ctx.fillStyle = GOLD;
      ctx.font = "bold 12px monospace";
      const w = ctx.measureText(FX.transition_text).width;
      ctx.fillText(FX.transition_text, (SW-w)/2|0, SH/2-6|0);
    }
    ctx.restore();
  }
}

// ── HUD ──────────────────────────────────────────────────────────────
function draw_hud(p){
  drect(DGRAY, 0, 0, SW, HUD_H);

  // ── Row 1 (y=2): HP text | HP bar | Floor right-anchored ──────────
  const hpf = Math.max(0, p.hp / p.max_hp);
  let hpc = hpf>0.5 ? GREEN : (hpf>0.25 ? ORANGE : RED);
  if(hpf < 0.25){
    const pulse = Math.sin(performance.now()/120) * 0.5 + 0.5;
    if(pulse > 0.5) hpc = WHITE;
  }
  dtext(`${p.hp}/${p.max_hp}`, 2, 2, hpc);
  hbar(44, 3, 54, 5, hpf, hpc, rgb(40,40,50));
  const fl = `F${p.floor}`;
  dtext(fl, SW - fl.length*6 - 1, 2, LBLUE);

  // ── Row 2 (y=11): Level | XP-or-Statuses | Gold right-anchored ───────
  dtext(`L${p.level}`, 2, 11, YELLOW);
  const active_st = p.active_statuses().filter(s => s !== ST_NONE);
  if(active_st.length > 0){
    const parts = active_st.map(s => {
      const t = p.statuses[s]; const n = STATUS_NAMES[s]||"?";
      return t===-1 ? `${n}!` : `${n}:${t}`;
    });
    const priority = [ST_CURSE,ST_POISON,ST_BLIND,ST_FREEZE];
    const primary = priority.find(s => active_st.includes(s)) || active_st[0];
    dtext(parts.join(" ").slice(0,14), 20, 11, STATUS_COLORS[primary]||WHITE);
  } else {
    dtext(`${p.xp}/${p.xp_next} XP`, 20, 11, CYAN);
  }
  const gs = `${p.gold}G`;
  dtext(gs, SW - gs.length*6 - 1, 11, GOLD);
  if(p.cursed_items.size > 0 && !active_st.includes(ST_CURSE)){
    dtext("C", SW-8, 2, CURSE_C);
  }
  if(active_st.length > 0){
    const primary2 = [ST_CURSE,ST_POISON,ST_BLIND,ST_FREEZE].find(s=>active_st.includes(s))||active_st[0];
    drect(STATUS_COLORS[primary2]||WHITE, 0, HUD_H-2, SW, 2);
  }
}

class Menu {
  constructor(title, opts, x=4, y=4, w=120, h=120, rh=9){
    this.title = title; this.opts = [...opts];
    this.x = x; this.y = y; this.w = w; this.h = h; this.rh = rh;
    this.cur = 0; this.scroll = 0;
    this.vis = ((h-14)/rh) | 0;
  }
  rebuild(opts){
    this.opts = [...opts];
    this.cur = Math.min(this.cur, Math.max(0, opts.length-1));
    this.scroll = 0;
  }
  draw(){
    drect(DGRAY, this.x, this.y, this.w, this.h);
    drect(GRAY, this.x, this.y, this.w, this.h, true);
    dtext(this.title.slice(0,18), this.x+2, this.y+2, YELLOW);
    for(let i=0; i<this.vis; i++){
      const idx = this.scroll + i;
      if(idx >= this.opts.length) break;
      const py = this.y + 12 + i*this.rh;
      if(idx === this.cur) drect(DBLUE, this.x+1, py-1, this.w-2, this.rh);
      const o = this.opts[idx];
      let label, col;
      if(Array.isArray(o)){ label = o[0]; col = o[1]; }
      else { label = o; col = WHITE; }
      dtext(String(label).slice(0,18), this.x+4, py, col);
    }
  }
  move(d){
    const n = Math.max(1, this.opts.length);
    this.cur = ((this.cur + d) % n + n) % n;
    if(this.cur < this.scroll) this.scroll = this.cur;
    else if(this.cur >= this.scroll + this.vis) this.scroll = this.cur - this.vis + 1;
  }
  sel(){
    if(!this.opts.length) return null;
    const o = this.opts[this.cur];
    return Array.isArray(o) ? o[0] : o;
  }
  sel_idx(){ return this.cur; }
}

class DialogBox {
  constructor(text, title="", color=GRAY){
    this.lines = text.split("\n"); this.title = title; this.color = color;
  }
  draw(){
    const h = 14 + this.lines.length * 10;
    const y = ((SH - h) / 2) | 0;
    drect(DGRAY, 6, y, SW-12, h);
    drect(this.color, 6, y, SW-12, h, true);
    let start;
    if(this.title){
      dtext(this.title.slice(0,18), 9, y+3, this.color);
      start = y + 13;
    } else {
      start = y + 4;
    }
    for(let i=0; i<this.lines.length; i++){
      dtext(this.lines[i].slice(0,18), 9, start + i*10, WHITE);
    }
    dtext("A: Continue", 34, y+h-10, GRAY);
  }
}

const keys = { u:false, d:false, l:false, r:false, a:false, b:false, m:false };
const keys_prev = { u:false, d:false, l:false, r:false, a:false, b:false, m:false };
window.addEventListener("keydown", (e) => {
  switch(e.key){
    case "ArrowUp": case "w": case "W": keys.u = true; e.preventDefault(); break;
    case "ArrowDown": case "s": case "S": keys.d = true; e.preventDefault(); break;
    case "ArrowLeft": case "a": case "A": keys.l = true; e.preventDefault(); break;
    case "ArrowRight": case "d": case "D": keys.r = true; e.preventDefault(); break;
    case "z": case "Z": case " ": keys.a = true; e.preventDefault(); break;
    case "x": case "X": keys.b = true; e.preventDefault(); break;
    case "Enter": case "Escape": keys.m = true; e.preventDefault(); break;
  }
});
window.addEventListener("keyup", (e) => {
  switch(e.key){
    case "ArrowUp": case "w": case "W": keys.u = false; break;
    case "ArrowDown": case "s": case "S": keys.d = false; break;
    case "ArrowLeft": case "a": case "A": keys.l = false; break;
    case "ArrowRight": case "d": case "D": keys.r = false; break;
    case "z": case "Z": case " ": keys.a = false; break;
    case "x": case "X": keys.b = false; break;
    case "Enter": case "Escape": keys.m = false; break;
  }
});

function poll(){
  const e = {};
  for(const k in keys){ e[k] = keys[k] && !keys_prev[k]; keys_prev[k] = keys[k]; }
  return e;
}

// ── Touch controls ─────────────────────────────────────────────────
// Visibility is handled by CSS media query above — no JS class toggling needed.
// This block only wires the touch/mouse events to the keys object.
(function setupTouchControls(){
  // Wire each touch-pad button to flip a key flag while pressed.
  // D-pad buttons get auto-repeat after a hold delay (so movement isn't tap-tap-tap).
  // Auto-repeat works by clearing keys_prev[k] periodically; this makes poll() see
  // a fresh edge on the next game tick while the finger is still held.
  const REPEAT_DELAY = 280;   // ms before auto-repeat starts
  const REPEAT_RATE  = 130;   // ms between repeats once started
  const DPAD_KEYS = new Set(["u","d","l","r"]);

  const buttons = document.querySelectorAll('.touch-pad button[data-key]');
  buttons.forEach(btn => {
    const k = btn.dataset.key;
    const isDpad = DPAD_KEYS.has(k);
    let holdTimeout = null;
    let repeatTimer = null;

    const stopRepeat = () => {
      if(holdTimeout){ clearTimeout(holdTimeout); holdTimeout = null; }
      if(repeatTimer){ clearInterval(repeatTimer); repeatTimer = null; }
    };

    const press = (ev) => {
      ev.preventDefault();
      keys[k] = true;
      btn.classList.add('pressed');
      if(isDpad){
        stopRepeat();
        holdTimeout = setTimeout(() => {
          repeatTimer = setInterval(() => {
            // Re-trigger an edge by resetting keys_prev so poll() sees the held key as fresh
            keys_prev[k] = false;
          }, REPEAT_RATE);
        }, REPEAT_DELAY);
      }
    };
    const release = (ev) => {
      ev.preventDefault();
      keys[k] = false;
      btn.classList.remove('pressed');
      stopRepeat();
    };
    btn.addEventListener('touchstart', press,   { passive: false });
    btn.addEventListener('touchend',   release, { passive: false });
    btn.addEventListener('touchcancel',release, { passive: false });
    btn.addEventListener('mousedown',  press);
    btn.addEventListener('mouseup',    release);
    btn.addEventListener('mouseleave', release);
    btn.addEventListener('contextmenu', e => e.preventDefault());
  });

  // Prevent iOS double-tap zoom on the whole page
  let lastTouch = 0;
  document.addEventListener('touchend', (e) => {
    const now = Date.now();
    if(now - lastTouch < 300) e.preventDefault();
    lastTouch = now;
  }, { passive: false });
  // Prevent pinch zoom
  document.addEventListener('gesturestart', e => e.preventDefault());
})();

// ════════════════════════════════════════════════════════════════
//  GAME
// ════════════════════════════════════════════════════════════════
class Game {
  constructor(){
    this.gs = GS_TITLE;
    this.p = new Player();
    this.d = null;
    this.cam_x = 0; this.cam_y = 0;
    this.menu = null; this.dialog = null;
    this.msg = ""; this.msg_t = 0;
    this.combat_mon = null; this.combat_msg = ""; this.cphase = 0;
    this.is_boss_fight = false; this.boss_data = null;
    this.chest_item = "";
    this.perk_pool = []; this.perk_cur = 0;
    this._shop_tab = 0; this._vtab = 0;
    this._ench_phase = 0; this._ench_item = null; this._ench_pool = [];
    this._bldg_mode = "";
    this._scroll_dmg = 0;
    this._after_dialog = GS_DUNGEON;
    this._shrine_effect = null;
    this._pending_levelup = false;
    this._shop_return = GS_VILLAGE;  // where to return when leaving shop
    this._home_tab = 0;       // 0=Stats 1=Gear 2=Perks 3=Beast 4=Inv
    this._home_scroll = 0;
    this._inv_subtab = 0;     // 0=Junk+Gems 1=Consumables 2=Gear
    this._home_inv_focus = 0; // 0=main tabs 1=subtab row 2=item list
    this._home_inv_cur = 0;   // cursor within item list
    this._home_inv_grouped = []; // populated by _draw_home_inventory each frame
    this._combat_inv_subtab = 1; // default to Consumables in combat
    this._combat_inv_return = GS_COMBAT;
    this._cinv_scroll = 0;
    this._cinv_cur = 0;
    this._scroll_return = GS_COMBAT;
    this._home_return_gs = GS_VILLAGE;
    this._levelup_cooldown = 0;
    this._library_scroll = 0;
    this._sell_menu_names = [];   // parallel to sell tab menu rows
    this._juggernaut_stacks = 0;
    this._spellweave_casts = 0;
    this._forge_plus_mode = null;
    this._merchant_stock = [];    // current dungeon merchant items
    this._merchant_x = 0; this._merchant_y = 0;
    this._merchant_scroll = 0;
    // Bestiary — persists across runs (lifetime kill counts)
    this.bestiary = {};
    this._bestiary_scroll = 0;
    // Quantity prompt state
    this._qty = { title:"", item:"", unit_cost:0, max:1, cur:1, cb:null, ret:GS_SHOP };
    // Slot machine state
    this._slot_x = 0; this._slot_y = 0;
    this._slot_phase = 0;  // 0=bet, 1=spin, 2..4=reel stopping, 5=result
    this._slot_frame = 0;
    this._slot_bet   = 0;
    this._slot_reels = [0,0,0];  // final reel values (0-9)
    this._slot_shown = [0,0,0];  // currently displayed reel values (spinning)
    // Magic system (per-combat)
    this._magic_charges = 0;     // remaining attack/shield scroll casts this fight
    this._magic_charges_max = 3; // refilled at start of each combat
    this._shield_turns = 0;      // remaining shield turns (blocks incoming damage)
    this._shield_immune = false; // major shield grants status immunity while active
    this._burn_turns = 0;        // burn DoT applied to current monster/boss
    this._burn_dmg = 0;
    // Title-screen starfield (Pass 2)
    this._title_stars = Array.from({length: 36}, () => ({
      x: Math.random()*SW, y: Math.random()*SH/2,
      v: 0.2 + Math.random()*0.6, b: 0.5 + Math.random()*0.5
    }));
    this._title_t = 0;
  }

  show_dialog(text, title="", color=GRAY, after=null){
    this.dialog = new DialogBox(text, title, color);
    this._after_dialog = after !== null ? after : GS_DUNGEON;
    this.gs = GS_DIALOG;
  }
  show_msg(s, t=90){
    this.msg = String(s).slice(0, 20); this.msg_t = t;
  }
  _refresh_combat_magic(){
    // Called at the start of every combat encounter.
    // Base 3 charges. Arcane perk grants +1.
    this._magic_charges_max = 3 + (this.p.has_perk("arcane") ? this.p.perk_val("arcane") : 0);
    this._magic_charges = this._magic_charges_max;
    this._shield_turns = 0;
    this._shield_immune = false;
    this._burn_turns = 0;
    this._burn_dmg = 0;
    // Deathmark: guaranteed crits at combat start
    this._deathmark_crits = this.p.has_perk("deathmark") ? this.p.perk_val("dmk") : 0;
  }
  draw_msg(){
    if(this.msg_t > 0){
      this.msg_t--;
      // Bottom-centered toast, sized to fit the message; sits just above the XP bar (SH-3..SH)
      const text = this.msg;
      const w = Math.min(SW - 6, text.length * 6 + 8);
      const x = ((SW - w) / 2) | 0;
      const y = SH - 16;  // 13px box + 3px gap above XP bar
      // Subtle fade at end of timer
      const alpha = this.msg_t < 12 ? this.msg_t / 12 : 1;
      ctx.save();
      ctx.globalAlpha = alpha;
      drect(BLACK, x, y, w, 12);
      drect(GOLD, x, y, w, 12, true);
      dtext(text, x + 4, y + 2, WHITE);
      ctx.restore();
    }
  }
  snap_cam(){
    this.cam_x = Math.max(0, Math.min(this.p.x - (VIEW_W/2|0), MAP_W - VIEW_W));
    this.cam_y = Math.max(0, Math.min(this.p.y - (VIEW_H/2|0), MAP_H - VIEW_H));
  }

  // ── TITLE ─────────────────────────────────────────────────────────
  tick_title(){
    this._title_t++;
    clear_screen(BLACK);
    // Animated starfield (Pass 2 polish)
    for(const s of this._title_stars){
      s.x -= s.v;
      if(s.x < 0) s.x = SW;
      const tw = Math.sin(this._title_t*0.05 + s.x*0.1) * 0.3 + 0.7;
      const br = (255 * s.b * tw) | 0;
      ctx.fillStyle = `rgb(${br},${br},${br})`;
      ctx.fillRect(s.x|0, s.y|0, 1, 1);
    }
    // Background mist near bottom
    for(let i=0; i<14; i++){
      const y = 100 + i*2;
      ctx.fillStyle = `rgba(${60+i*4},${20+i*2},${20+i*2},0.15)`;
      ctx.fillRect(0, y, SW, 2);
    }
    // Pulsing logo
    const pulse = Math.sin(this._title_t*0.05) * 0.3 + 0.7;
    const gc = (255 * pulse) | 0;
    ctx.fillStyle = `rgb(${gc},${(gc*0.78)|0},0)`;
    ctx.font = "bold 12px monospace";
    const t1 = "DUNGEON DIVER";
    const w1 = ctx.measureText(t1).width;
    ctx.fillText(t1, (SW-w1)/2|0, 24);
    ctx.fillStyle = ORANGE;
    ctx.font = "8px monospace";
    const t2 = "v4.2 - Mobile";
    const w2 = ctx.measureText(t2).width;
    ctx.fillText(t2, (SW-w2)/2|0, 38);
    // Decorative crossed swords (simple pixel art)
    drect(GRAY, SW/2-12, 50, 24, 2);
    drect(LBLUE, SW/2-1, 48, 2, 6);
    // Menu
    dtext("A: New Game", 30, 72, WHITE);
    dtext("B: Continue", 30, 84, CYAN);
    // Banked gold display (if any from previous run)
    if(this.p.banked > 0){
      dtext(`Banked: ${this.p.banked}G`, 22, 102, GOLD);
    }
    // Version tag — bottom right corner, always visible
    dtext("v4.2", SW-26, SH-10, rgb(80,70,55));

    const e = poll();
    if(e.a){ const banked = this.p.banked; this.p.reset(); this.p.gold += banked; this.gs = GS_VILLAGE; }
    else if(e.b){ this.gs = GS_VILLAGE; }
  }

  // ── DIALOG ────────────────────────────────────────────────────────
  tick_dialog(){
    const nxt = this._after_dialog;
    if(nxt === GS_DUNGEON || nxt === GS_CHEST){
      clear_screen(BLACK); draw_hud(this.p); this._draw_tiles();
    } else if(nxt === GS_BOSS_COMBAT && this.boss_data){
      clear_screen(DGRAY);
    } else {
      clear_screen(BLACK);
    }
    this.dialog.draw();
    const e = poll();
    if(e.a || e.b){
      this.gs = nxt;
      if(this._shrine_effect){
        this._apply_shrine_effect(this._shrine_effect);
        this._shrine_effect = null;
        // Shrine damage or curse might have killed the player
        if(this.p.hp <= 0){
          if(this.p.has_perk("phoenix") && this.p.revive_remaining > 0){
            const ph_td = this.p.perk_tier_data("phoenix");
            this.p.revive_remaining--;
            this.p.hp = Math.max(1, Math.floor(this.p.max_hp * (ph_td ? ph_td.hp_frac : 0.05)));
            this.show_msg("PHOENIX revive!");
            burst(SW/2, SH/2, GOLD, 24);
          } else {
            this.gs = GS_GAMEOVER; return;
          }
        }
      }
      if(this._pending_levelup){
        this._pending_levelup = false;
        this.gs = GS_LEVELUP;
      }
    }
  }

  // ── VILLAGE ───────────────────────────────────────────────────────
  tick_village(){
    this.p.immune_used = false;
    clear_screen(DGREEN);
    // Sky gradient (subtle Pass 2 polish)
    for(let i=0; i<30; i++){
      ctx.fillStyle = `rgba(80,140,200,${0.4 - i*0.012})`;
      ctx.fillRect(0, 14+i, SW, 1);
    }
    // Ground (LBROWN cobble area) sized to fit both rows without bottom-bar collision
    drect(LBROWN, 0, 80, SW, 36);
    // Cobblestone hints
    for(let i=0; i<8; i++){
      drect(BROWN, i*16+2, 84, 12, 2);
      drect(BROWN, i*16+10, 102, 12, 2);
    }
    for(let i=0; i<BLDG_ORDER.length; i++){
      const bid = BLDG_ORDER[i];
      const bx = 2 + (i%4)*31;
      const by = (i<4) ? 44 : 82;
      const owned = !!this.p.buildings[bid];
      const bc = owned ? BLDG_DEF[bid][2] : DGRAY;
      drect(bc, bx, by, 28, 28);
      // Roof triangle
      ctx.fillStyle = owned ? DRED : DGRAY;
      ctx.beginPath();
      ctx.moveTo(bx, by);
      ctx.lineTo(bx+14, by-4);
      ctx.lineTo(bx+28, by);
      ctx.closePath();
      ctx.fill();
      // Door
      drect(BROWN, bx+12, by+20, 4, 8);
      drect(i===this._vtab ? WHITE : GRAY, bx, by, 28, 28, true);
      dtext(BLDG_DEF[bid][0].slice(0,5), bx+1, by+9, owned ? WHITE : GRAY);
      if(!owned) dtext(`$${BLDG_DEF[bid][1]}`, bx+1, by+19, YELLOW);
    }
    drect(DGRAY, 0, 0, SW, 14);
    dtext(`HP:${this.p.hp}/${this.p.max_hp}`, 2, 2, GREEN);
    dtext(`G:${this.p.gold}`, 60, 2, GOLD);
    dtext(`B${this.p.floor}`, 96, 2, LBLUE);
    dtext(`L${this.p.level}`, 112, 2, YELLOW);
    const bid = BLDG_ORDER[this._vtab];
    // Single-line bottom info bar (12px) - description fits if short, else fallback to name+controls
    drect(DGRAY, 0, SH-12, SW, 12);
    const desc = BLDG_DEF[bid][3];
    const owned = !!this.p.buildings[bid];
    if(!owned){
      dtext(`$${BLDG_DEF[bid][1]}`, 2, SH-10, YELLOW);
      dtext(desc.slice(0,17), 22, SH-10, CYAN);
    } else {
      dtext(desc.slice(0,15), 2, SH-10, CYAN);
      dtext("A B:Down", 78, SH-10, WHITE);
    }
    this.draw_msg();

    const e = poll();
    if(e.l) this._vtab = (this._vtab - 1 + BLDG_ORDER.length) % BLDG_ORDER.length;
    else if(e.r) this._vtab = (this._vtab + 1) % BLDG_ORDER.length;
    else if(e.u) this._vtab = (this._vtab - 4 + BLDG_ORDER.length) % BLDG_ORDER.length;
    else if(e.d) this._vtab = (this._vtab + 4) % BLDG_ORDER.length;
    else if(e.a) this._enter_building(BLDG_ORDER[this._vtab]);
    else if(e.b) this._enter_dungeon();
    else if(e.m) this.gs = GS_TITLE;
  }

  _enter_building(bid){
    if(!this.p.buildings[bid]){
      const cost = BLDG_DEF[bid][1];
      if(this.p.gold >= cost){
        this.p.gold -= cost; this.p.buildings[bid] = true;
        if(bid === "library") this.p.perk_choices = 4;
        this.show_msg(`Built ${BLDG_DEF[bid][0]}!`);
        burst(15 + (BLDG_ORDER.indexOf(bid)%4)*31, 50, GOLD, 12);
      } else {
        this.show_msg(`Need ${cost}G!`);
      }
      return;
    }
    const actions = {
      shop:    () => this._open_shop(),
      inn:     () => this._open_inn(),
      enchant: () => this._open_enchant_pick(),
      forge:   () => this._open_forge(),
      library: () => this._open_library(),
      temple:  () => this._open_temple(),
      bank:    () => this._open_bank(),
      home:    () => this._open_home(),
    };
    actions[bid]();
  }
  _open_inn(){
    if(this.p.hp >= this.p.max_hp && !this.p.has_any_status()){
      this.show_msg("Already at full health!"); return;
    }
    if(this.p.gold >= 50){
      this.p.gold -= 50; this.p.hp = this.p.max_hp;
      this.p.clear_status();
      this.show_msg("Fully rested!");
    } else this.show_msg("Need 50G to rest!");
  }
  _open_bank(){
    const opts = [
      ["Deposit All", GOLD],
      ["Withdraw All", LBLUE],
      ["-- Depart --", GRAY],
    ];
    this.menu = new Menu(`Bank: ${this.p.banked}G`, opts);
    this._bldg_mode = "bank"; this.gs = GS_BLDG;
  }
  _open_temple(){
    const p = this.p;
    const inv_rank = p.invocation_rank;
    const inv_maxed = inv_rank >= 3;
    const inv_label = inv_maxed
      ? `Invocation III (MAX)`
      : `Invoke ${["I","II","III"][inv_rank]} → ${["II","III","MAX"][inv_rank]} (200G)`;
    const opts = [
      ["Lift Curses (40G)", WHITE],
      [inv_label, inv_maxed ? DGRAY : PURPLE],
      ["-- Depart --", GRAY]
    ];
    this.menu = new Menu("Temple", opts);
    this._bldg_mode = "temple"; this.gs = GS_BLDG;
  }

  // ── HOME ──────────────────────────────────────────────────────────
  _open_home(ret=GS_VILLAGE){
    this._home_tab = 0;
    this._home_scroll = 0;
    this._home_return_gs = ret;
    this.gs = GS_HOME;
  }

  tick_home(){
    const p = this.p;
    clear_screen(BLACK);
    const NUM_TABS = 5;
    const tab_labels = ["Stats","Gear","Perks","Best","Inv"];

    // Top tab bar — 5 tabs at ~25px each
    drect(DGRAY, 0, 0, SW, 14);
    for(let i=0; i<NUM_TABS; i++){
      const tw = 25, tx = i*tw + (i>0?1:0);
      const sel = (i === this._home_tab);
      // Dim main tab row when focus is inside inv
      const focused_away = (this._home_tab === 4 && this._home_inv_focus > 0);
      drect(sel ? (focused_away ? DGRAY : CYAN) : MGRAY, tx, 1, tw-1, 12);
      drect(sel ? (focused_away ? GRAY : WHITE) : DGRAY, tx, 1, tw-1, 12, true);
      dtext(tab_labels[i], tx+2, 3, sel ? (focused_away ? GRAY : BLACK) : LBLUE);
    }
    drect(DGRAY, 125, 0, 3, 14);

    const CY0 = 16, CY_BOT = SH - 12;

    if(this._home_tab === 0){
      this._draw_home_stats(p, CY0);
    } else if(this._home_tab === 1){
      this._draw_home_gear(p, CY0, CY_BOT);
    } else if(this._home_tab === 2){
      this._draw_home_perks(p, CY0, CY_BOT);
    } else if(this._home_tab === 3){
      this._draw_home_bestiary(CY0, CY_BOT);
    } else {
      this._draw_home_inventory(p, CY0, CY_BOT);
    }

    drect(DGRAY, 0, CY_BOT, SW, 12);
    const home_from_dung = this._home_return_gs === GS_DUNGEON;
    if(this._home_tab === 4 && this._home_inv_focus > 0){
      dtext("U:back  A:use  L/R:tab", 4, CY_BOT+2, GRAY);
    } else {
      dtext(home_from_dung ? "L/R:Tab  D:Inv  B:Resume" : "L/R:Tab  D:Inv  B:Back", 4, CY_BOT+2, GRAY);
    }
    this.draw_msg();

    const e = poll();

    // Always: B exits Home entirely
    if(e.b || e.m){
      this._home_inv_focus = 0; this._home_inv_cur = 0;
      this.gs = this._home_return_gs; this._home_return_gs = GS_VILLAGE; return;
    }

    if(this._home_tab !== 4 || this._home_inv_focus === 0){
      // Normal main-tab navigation
      if(e.l){ this._home_tab = (this._home_tab-1+NUM_TABS)%NUM_TABS; this._home_scroll=0; this._home_inv_focus=0; }
      else if(e.r){ this._home_tab = (this._home_tab+1)%NUM_TABS; this._home_scroll=0; this._home_inv_focus=0; }
      else if(e.u) this._home_scroll = Math.max(0, this._home_scroll-1);
      else if(e.d){
        if(this._home_tab === 4){
          // Down from main tab row enters subtab row
          this._home_inv_focus = 1;
        } else {
          this._home_scroll++;
        }
      }
    } else if(this._home_inv_focus === 1){
      // Focus on subtab row — L/R switches subtabs, D enters list, U returns to main tabs
      if(e.l){ this._inv_subtab=(this._inv_subtab-1+3)%3; this._home_scroll=0; this._home_inv_cur=0; }
      else if(e.r){ this._inv_subtab=(this._inv_subtab+1)%3; this._home_scroll=0; this._home_inv_cur=0; }
      else if(e.u){ this._home_inv_focus=0; }
      else if(e.d){ this._home_inv_focus=2; this._home_inv_cur=0; }
    } else {
      // Focus on item list — U/D moves cursor, A uses item, U at top returns to subtab row
      const grouped = this._home_inv_grouped || [];
      if(e.u){
        if(this._home_inv_cur <= 0) this._home_inv_focus=1;
        else { this._home_inv_cur--; if(this._home_inv_cur < this._home_scroll) this._home_scroll--; }
      }
      else if(e.d){
        this._home_inv_cur = Math.min(grouped.length-1, this._home_inv_cur+1);
        const CY0v = 16, CY_BOTv = SH-12;
        const ROW_H = 10, list_y = CY0v+24;
        const visible = ((CY_BOTv - list_y - 2) / ROW_H) | 0;
        if(this._home_inv_cur >= this._home_scroll + visible) this._home_scroll++;
      }
      else if(e.l){ this._inv_subtab=(this._inv_subtab-1+3)%3; this._home_scroll=0; this._home_inv_cur=0; this._home_inv_focus=1; }
      else if(e.r){ this._inv_subtab=(this._inv_subtab+1)%3; this._home_scroll=0; this._home_inv_cur=0; this._home_inv_focus=1; }
      else if(e.a && grouped.length){
        const entry = grouped[this._home_inv_cur];
        if(entry){
          const result = p.use_item(entry.raw_idx);
          if(result && result[0]) this.show_msg(result[0]);
          // Rebuild grouped after use
          this._home_inv_cur = Math.min(this._home_inv_cur, Math.max(0,(grouped.length-2)));
        }
      }
    }
  }

  _draw_home_stats(p, y){
    // Hero header
    drect(BLUE, 4, y+2, 18, 18);
    drect(WHITE, 4, y+2, 18, 18, true);
    drect(WHITE, 8, y+8, 2, 2);
    drect(WHITE, 16, y+8, 2, 2);
    drect(GRAY, 10, y+14, 6, 1);
    dtext(`Lv ${p.level}`, 26, y+2, YELLOW);
    dtext(`B${p.floor}`, 26, y+12, LBLUE);
    // Core stats - two columns
    let ry = y + 24;

      const encs = p.enchants[wname] || [];
      if(encs.length){

      }
    } else {
      lines.push({text: "Wpn: (bare hands)", color: GRAY, indent: 0});
    }
    // Spacer
    lines.push({text: "", color: GRAY, indent: 0});

      const cursed = p.is_cursed(aname);
      lines.push({text: `Arm: ${aname.slice(0,12)}`, color: cursed ? CURSE_C : WHITE, indent: 0});
      lines.push({text: `  +${ITEMS[aname][3]} DEF${cursed?" [CURSED]":""}`, color: cursed ? CURSE_C : GRAY, indent: 0});
      const encs = p.enchants[aname] || [];
      if(encs.length){

          lines.push({text: `  \u2605 ${e[0]}`, color: e[5], indent: 0});

  _draw_home_perks(p, y, y_bot){
    const lines = [];
    if(!p.perks.length){
      lines.push({text: "No perks yet.", color: GRAY, indent: 0});
      lines.push({text: "Level up to earn", color: DGRAY, indent: 0});
      lines.push({text: "perks!", color: DGRAY, indent: 0});
    } else {
      lines.push({text: `Perks: ${p.perks.length}/18`, color: YELLOW, indent: 0});
      lines.push({text: "", color: GRAY, indent: 0});
      for(const pk of p.perks){

  _draw_home_list(lines, y, y_bot){
    const ROW_H = 9;
    const visible = Math.floor((y_bot - y - 2) / ROW_H);
    const max_scroll = Math.max(0, lines.length - visible);
    if(this._home_scroll > max_scroll) this._home_scroll = max_scroll;
    for(let i=0; i<visible; i++){
      const idx = this._home_scroll + i;
      if(idx >= lines.length) break;
      const ln = lines[idx];
      dtext(ln.text, 4, y + 2 + i*ROW_H, ln.color);
    }
    if(lines.length > visible){
      const sb_x = SW - 4;
      drect(DGRAY, sb_x, y, 2, y_bot - y);
      const thumb_h = Math.max(4, ((visible/lines.length) * (y_bot-y)) | 0);
      const thumb_y = y + ((this._home_scroll/Math.max(1,lines.length-visible)) * (y_bot-y-thumb_h)) | 0;
      drect(LBLUE, sb_x, thumb_y, 2, thumb_h);
    }
  }

  _draw_home_bestiary(y, y_bot){
    // All 20 monsters + 5 bosses in definition order
    const ALL_ENTRIES = [
      ...MONSTERS.map(m => ({ name:m[0], color:m[7], floor:m[1], hp:m[2], atk:m[3], def:m[4], is_boss:false })),
      ...BOSSES.map(b => ({ name:b[0], color:b[6], floor:b[0]==="Rat King"?5:b[0]==="Bone Colossus"?10:b[0]==="Void Hydra"?15:b[0]==="Lich Lord"?20:25, hp:b[1], atk:b[2], def:b[3], is_boss:true })),
    ];
    const killed = ALL_ENTRIES.filter(e => this.bestiary[e.name]);
    const total = killed.length;
    // Header
    const discovered = Object.keys(this.bestiary).length;
    dtext(`Slain: ${discovered}/25`, 4, y+1, GOLD);
    const ry = y + 12;
    const ROW_H = 18;
    const visible = Math.floor((y_bot - ry) / ROW_H);
    const max_scroll = Math.max(0, total - visible);
    if(this._home_scroll > max_scroll) this._home_scroll = max_scroll;

    if(total === 0){
      dtext("No kills yet!", 22, ry+20, GRAY);
      dtext("Venture forth!", 18, ry+32, GRAY);
      return;
    }
    for(let i=0; i<visible; i++){
      const idx = this._home_scroll + i;
      if(idx >= total) break;
      const en = killed[idx];
      const py = ry + i*ROW_H;
      // Color square icon
      drect(en.color, 4, py, 8, 8);
      drect(en.is_boss ? GOLD : WHITE, 4, py, 8, 8, true);
      // Name + kills
      const nameCol = en.is_boss ? GOLD : WHITE;
      dtext(en.name.slice(0,12), 14, py, nameCol);
      dtext(`x${this.bestiary[en.name]}`, SW-22, py, CYAN);
      // Stats row (always visible after first kill)
      dtext(`HP${en.hp} A${en.atk} D${en.def} F${en.floor}`, 14, py+9, GRAY);
    }
    // Scroll indicator
    if(total > visible){
      drect(DGRAY, SW-4, ry, 2, y_bot-ry);
      const th = Math.max(4, ((visible/total)*(y_bot-ry))|0);
      const ty_ = ry + ((this._home_scroll/Math.max(1,total-visible))*(y_bot-ry-th))|0;
      drect(LBLUE, SW-4, ty_, 2, th);
    }
  }

  // ── INVENTORY TAB (3 sub-tabs: Junk+Gems | Consumables+Scrolls | Armor+Weapons) ──
  _draw_home_inventory(p, y, y_bot){
    const SUB_TABS = ["Junk+Gems","Consume","Gear"];
    const stw = (SW-4) / 3 | 0;
    // Subtab bar — highlighted when focus=1, dimmer otherwise
    for(let i=0; i<3; i++){
      const tx = 2 + i*stw;
      const sel = (this._inv_subtab === i);
      const focused = (this._home_inv_focus === 1);
      drect(sel ? (focused?DBLUE:rgb(20,40,60)) : rgb(25,25,25), tx, y, stw-1, 10);
      drect(sel ? (focused?CYAN:LBLUE) : MGRAY, tx, y, stw-1, 10, true);
      dtext(SUB_TABS[i].slice(0,8), tx+2, y+1, sel ? WHITE : GRAY);
    }
    // Focus indicator on subtab row
    if(this._home_inv_focus === 1){
      dtext("▼", SW-8, y+1, CYAN);
    } else if(this._home_inv_focus === 0){
      dtext("↓", SW-8, y+1, GRAY);
    }

    const cy = y + 12;

    // Categorise
    const junk_types = new Set(["junk","gem"]);
    const cons_types = new Set(["heal","cure_p","cure_f","cure_a","uncurse","recall","id",
                                 "lapis","fire_s","lit_s","shield_s","annihilate"]);
    const gear_types = new Set(["weapon","armor"]);

    const items_in_tab = [];
    for(let i=0; i<p.inventory.length; i++){
      const n = p.inventory[i];
      const itype = ITEMS[n] ? ITEMS[n][2] : "misc";
      if(this._inv_subtab === 0 && junk_types.has(itype)) items_in_tab.push({name:n, raw_idx:i});
      else if(this._inv_subtab === 1 && cons_types.has(itype)) items_in_tab.push({name:n, raw_idx:i});
      else if(this._inv_subtab === 2 && gear_types.has(itype)) items_in_tab.push({name:n, raw_idx:i});
    }

    // Group stackables
    const counts = {}; const order = []; const raw_idxs = {};
    for(const {name:n, raw_idx} of items_in_tab){
      if(!counts[n]){ counts[n]=0; order.push(n); raw_idxs[n]=raw_idx; }
      counts[n]++;
    }
    // Build grouped array — store on game object so tick_home can access it
    const grouped = order.map(n => ({name:n, raw_idx:raw_idxs[n], count:counts[n]}));
    this._home_inv_grouped = grouped;

    const ROW_H = 10;
    const visible = ((y_bot - cy - 2) / ROW_H) | 0;
    const max_scroll = Math.max(0, grouped.length - visible);
    if(this._home_scroll > max_scroll) this._home_scroll = max_scroll;
    if(this._home_inv_cur > grouped.length-1) this._home_inv_cur = Math.max(0, grouped.length-1);

    if(!grouped.length){
      dtext("(empty)", 44, cy+20, GRAY);
    } else {
      for(let i=0; i<visible; i++){
        const idx = this._home_scroll + i;
        if(idx >= grouped.length) break;
        const {name:n, count} = grouped[idx];
        const sel = (this._home_inv_focus === 2 && idx === this._home_inv_cur);
        const col = ITEMS[n] ? ITEMS[n][4] : WHITE;
        if(sel) drect(DBLUE, 0, cy+i*ROW_H, SW-6, ROW_H-1);
        let tag = "";
        if(n === p.weapon) tag = " [W]";
        else if(n === p.armor) tag = " [A]";
        if(p.enchants[n]?.length) tag += "★";
        if(p.is_cursed && p.is_cursed(n)) tag += "(C)";
        const qty_str = count > 1 ? ` ×${count}` : "";
        dtext(`${n.slice(0,15)}${qty_str}${tag}`, 3, cy+i*ROW_H+1, sel ? WHITE : col);
        if(sel) dtext("A", SW-10, cy+i*ROW_H+1, CYAN);
      }
    }

    // Scrollbar
    if(grouped.length > visible){
      drect(DGRAY, SW-4, cy, 2, y_bot-cy-12);
      const th = Math.max(4,(visible/grouped.length*(y_bot-cy-12))|0);
      const ty_ = cy + (this._home_scroll/Math.max(1,grouped.length-visible)*(y_bot-cy-12-th))|0;
      drect(LBLUE, SW-4, ty_, 2, th);
    }

    // Bottom hint
    dtext(`${p.inventory.length}/${p.max_inv} slots`, 4, y_bot-10, GRAY);
  }

  // ── QUANTITY PROMPT ──────────────────────────────────────────────
  _open_qty(title, item, unit_cost, max_qty, cb, ret){

    if(max_qty <= 0){ this.show_msg("Nothing to sell!"); return; }
    this._qty = { title, item, unit_cost, max:max_qty, cur:1, cb, ret };
    this.gs = GS_QTY_PROMPT;

  tick_qty_prompt(){
    const q = this._qty;
    clear_screen(BLACK);
    drect(DGRAY, 8, 20, SW-16, 88);
    drect(GOLD, 8, 20, SW-16, 88, true);
    drect(DBLUE, 9, 21, SW-18, 14);
    dtext(q.title.slice(0,18), 12, 24, YELLOW);
    dtext(q.item.slice(0,18), 12, 38, WHITE);
    // Quantity picker
    dtext("QTY:", 12, 54, GRAY);
    drect(DGRAY, 48, 51, 32, 14);
    drect(WHITE, 48, 51, 32, 14, true);
    dtext(String(q.cur), 60, 54, GOLD);
    dtext(`/${q.max}`, 82, 54, GRAY);
    // Cost or earnings display
    const is_sell = q.unit_cost === 0;
    if(!is_sell){
      const total = q.cur * q.unit_cost;
      dtext(`Cost: ${total}G`, 12, 70, GREEN);
      dtext(`Have: ${this.p.gold}G`, 12, 80, this.p.gold >= total ? GRAY : RED);
    } else {
      dtext(`Qty: ${q.cur} of ${q.max}`, 12, 70, CYAN);
    }
    dtext("U/D:Change A:OK B:Cancel", 10, 96, GRAY);
    this.draw_msg();
    const e = poll();
    if(e.u || e.r) this._qty.cur = Math.min(q.max, q.cur+1);
    else if(e.d || e.l) this._qty.cur = Math.max(1, q.cur-1);
    else if(e.b || e.m){ this.gs = q.ret; }
    else if(e.a){ q.cb(q.cur); this.gs = q.ret; }
  }

  // ── SLOT MACHINE ─────────────────────────────────────────────────
  _open_slot_machine(tx, ty){
    this._slot_x = tx; this._slot_y = ty;
    this._slot_phase = 0; this._slot_frame = 0; this._slot_bet = 0;
    this._slot_reels = [0,0,0];
    this._slot_shown = [Math.floor(Math.random()*10), Math.floor(Math.random()*10), Math.floor(Math.random()*10)];
    this.gs = GS_SLOT;
  }

  _slot_result(){
    const [a,b,c] = this._slot_reels;
    const bet = this._slot_bet;
    const p = this.p;
    if(a===7 && b===7 && c===7){
      p.gold += bet * 10;
      if(p.inventory.length < p.max_inv) p.inventory.push("Lucky Seven");
      shake(8); flash(GOLD, 12);
      for(let i=0; i<3; i++) burst(SW/2, SH/2, GOLD, 20);
      return;
    }
    if(a===b && b===c){ p.gold += bet*4; burst(SW/2,SH/2,GOLD,14); return; }
    const sevens = [a,b,c].filter(x=>x===7).length;
    if(sevens===2){ p.gold += bet*3; burst(SW/2,SH/2,GOLD,10); return; }
    if(sevens===1){ p.gold += bet; burst(SW/2,SH/2,YELLOW,6); return; }
    if(a===b || b===c || a===c){ p.gold += (bet*0.5)|0; return; }
    if(a===1 && b===1 && c===1){ p.hp=Math.max(1,p.hp-5); shake(4); flash(RED,5); return; }
    // plain loss — gold already spent
  }

  _roll_slot_reels(floor){
    // Higher floors = better 7 odds: base 10%, +1% per 5 floors, cap 20%
    const sc = Math.min(20, 10 + Math.floor(floor/5));
    const reel = () => {
      if(Math.floor(Math.random()*100)+1 <= sc) return 7;
      let v; do { v=Math.floor(Math.random()*10); } while(v===7);
      return v;
    };
    return [reel(), reel(), reel()];
  }

  tick_slot(){
    const p = this.p;
    const ph = this._slot_phase;
    clear_screen(rgb(20,10,30));
    drect(PURPLE, 2, 2, SW-4, SH-4);
    drect(GOLD, 2, 2, SW-4, SH-4, true);
    drect(rgb(20,10,30), 4, 4, SW-8, SH-8);
    dtext("* SLOTS *", 36, 8, GOLD);
    dtext(`Gold: ${p.gold}G`, 38, 18, YELLOW);

    if(ph === 0){
      dtext("Place your bet:", 18, 34, WHITE);
      drect(DGRAY,14,44,44,18); drect(GOLD,14,44,44,18,true);
      dtext("A: 25G", 20, 51, YELLOW);
      drect(DGRAY,70,44,44,18); drect(GOLD,70,44,44,18,true);
      dtext("B: 100G", 74, 51, ORANGE);
      dtext("Floor "+p.floor+": "+Math.min(20,10+Math.floor(p.floor/5))+"% 7s", 18, 72, DGRAY);
      dtext("MENU: Leave", 28, 84, GRAY);
      const e = poll();
      if(e.m){ this.gs=GS_DUNGEON; return; }
      if(e.a){
        if(p.gold>=25){ p.gold-=25; this._slot_bet=25; this._slot_reels=this._roll_slot_reels(p.floor); this._slot_phase=1; this._slot_frame=0; }
        else this.show_msg("Need 25G!");
      } else if(e.b){
        if(p.gold>=100){ p.gold-=100; this._slot_bet=100; this._slot_reels=this._roll_slot_reels(p.floor); this._slot_phase=1; this._slot_frame=0; }
        else this.show_msg("Need 100G!");
      }
      this.draw_msg(); return;
    }

    // Reel boxes
    const RX=[18,50,82], RW=26, RY=36, RH=36;
    for(let i=0; i<3; i++){
      const stopped = ph > i+1 || (ph===i+1 && this._slot_frame>=28);
      drect(stopped ? rgb(20,50,20) : rgb(20,15,30), RX[i],RY,RW,RH);
      drect(GOLD,RX[i],RY,RW,RH,true);
      const val = stopped ? this._slot_reels[i] : this._slot_shown[i];
      ctx.font = "bold 20px monospace";
      ctx.fillStyle = (val===7) ? GOLD : WHITE;
      const ns = String(val);
      const nw = ctx.measureText(ns).width;
      ctx.fillText(ns, (RX[i]+(RW-nw)/2)|0, RY+26);
      ctx.font = "8px monospace";
    }
    dtext(`Bet: ${this._slot_bet}G`, 44, 80, GRAY);

    // Spin: update displayed reels for spinning ones
    if(this._slot_frame % 3 === 0){
      for(let i=0; i<3; i++){
        if(ph<=i+1 && !(ph===i+1 && this._slot_frame>=28))
          this._slot_shown[i]=Math.floor(Math.random()*10);
      }
    }
    this._slot_frame++;

    // Phase transitions — reel stops every 30 frames
    if(ph===1&&this._slot_frame>=30){this._slot_phase=2;this._slot_frame=0;}
    else if(ph===2&&this._slot_frame>=30){this._slot_phase=3;this._slot_frame=0;}
    else if(ph===3&&this._slot_frame>=30){this._slot_phase=4;this._slot_frame=0;}
    else if(ph===4&&this._slot_frame>=20){
      this._slot_result();
      this.d.tiles[this._slot_y][this._slot_x]=T_FLOOR;
      this._slot_phase=5; this._slot_frame=0;
    }

    if(ph===5){
      const [a,b,c]=this._slot_reels;
      const is777=a===7&&b===7&&c===7;
      if(is777){
        // 777 — big gold pulsing banner
        const pulse=(Math.sin(performance.now()/80)*0.5+0.5);
        ctx.fillStyle=`rgba(255,200,0,${0.3+pulse*0.6})`;
        ctx.fillRect(10,82,SW-20,26);
        ctx.font="bold 16px monospace";
        ctx.fillStyle=RED;
        const txt="7  7  7";
        const tw2=ctx.measureText(txt).width;
        ctx.fillText(txt,(SW-tw2)/2|0,100);
        ctx.font="8px monospace";
        dtext("JACKPOT!!",36,106,GOLD);
        if(this._slot_frame%6===0) burst(SW/2,SH/2,GOLD,10);
        this._slot_frame++;
      } else {
        // Show result message based on outcome
        const sevens=[a,b,c].filter(x=>x===7).length;
        let msg="";
        if(a===b&&b===c) msg=`3x${a}! +${this._slot_bet*4}G`;
        else if(sevens===2) msg=`Two 7s! +${this._slot_bet*3}G`;
        else if(sevens===1) msg="Lucky 7! Even.";
        else if(a===b||b===c||a===c) msg=`Pair! +${(this._slot_bet*0.5)|0}G`;
        else if(a===1&&b===1&&c===1) msg="Snake eyes -5HP!";
        else msg=`Lost ${this._slot_bet}G.`;
        dtext(msg.slice(0,18), (SW-msg.slice(0,18).length*6)/2|0, 88, YELLOW);
      }
      dtext("A: Leave", 44, is777?116:100, WHITE);
      const e=poll();
      if(e.a||e.b||e.m){this.gs=GS_DUNGEON; return;}
    }
    this.draw_msg();
  }

  // ── DUNGEON MERCHANT ─────────────────────────────────────────────
  // 9-item pool: 3 weapons, 3 armors, Elixir of Life, Soulrender (1% chance),
  // Scroll of Annihilation (1% chance). Shows 3 random items per visit. Wildly expensive.
  _build_merchant_pool(){
    const weapons  = ["Lich Blade","Chaos Edge","Mythril Blade","Void Steel","Dragon Fang"];
    const armors   = ["Lich Shroud","Chaos Plate","Titan Plate","Void Carapace","Colossus Mail"];
    const specials = ["Elixir of Life"];
    // Soulrender and Scroll of Annihilation each have 1% chance to appear
    if(Math.random() < 0.01) specials.push("Soulrender");
    if(Math.random() < 0.01) specials.push("Scroll of Annihilation");

    // Pick 1 weapon, 1 armor, 1 from specials, then shuffle for 3 shown
    const shuffle = a => { for(let i=a.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [a[i],a[j]]=[a[j],a[i]]; } return a; };
    const pool = [
      shuffle(weapons)[0],
      shuffle(armors)[0],
      shuffle(specials)[0],
    ];
    return shuffle(pool);
  }

  _merchant_price(name){
    // Base sell value × 8 — wildly expensive as intended
    const base = (ITEMS[name] && ITEMS[name][0]) || 100;
    return Math.max(800, base * 8);
  }

  _open_dungeon_merchant(tx, ty){
    this._merchant_x = tx; this._merchant_y = ty;
    this._merchant_stock = this._build_merchant_pool();
    this._merchant_scroll = 0;
    this.gs = GS_MERCHANT;
  }

  tick_merchant(){
    const p = this.p;
    clear_screen(rgb(15,25,20));
    drect(TEAL, 0, 0, SW, 18);
    drect(WHITE, 0, 0, SW, 18, true);
    dtext("DEEP MERCHANT", 20, 2, BLACK);
    dtext(`Gold: ${p.gold}G`, 2, 10, GOLD);

    const stock = this._merchant_stock || [];
    const ROW_H = 26;
    let y = 22;
    for(let i=0; i<stock.length; i++){
      const name = stock[i];
      if(!name || !ITEMS[name]) continue;
      const price = this._merchant_price(name);
      const can_afford = p.gold >= price;
      const itype = ITEMS[name][2];

      drect(can_afford ? rgb(20,40,30) : rgb(30,20,20), 4, y, SW-8, ROW_H-2);
      drect(can_afford ? TEAL : RED, 4, y, SW-8, ROW_H-2, true);

      // Item color dot
      drect(ITEMS[name][4], 6, y+2, 4, 4);
      dtext(name.slice(0,14), 12, y+2, can_afford ? WHITE : GRAY);

      // Stat line
      const stat_str = (itype==="weapon") ? `+${ITEMS[name][3]} ATK` :
                       (itype==="armor")  ? `+${ITEMS[name][3]} DEF` :
                       (name==="Elixir of Life") ? "Full heal+cleanse" :
                       (name==="Soulrender") ? "+22ATK lifesteal" :
                       (name==="Scroll of Annihilation") ? "One-shots target" : "";
      dtext(stat_str.slice(0,16), 12, y+11, rgb(150,200,170));
      dtext(`${price}G`, SW-price.toString().length*6-6, y+2, can_afford ? GOLD : rgb(120,60,60));
      dtext("A:Buy", SW-34, y+11, can_afford ? CYAN : DGRAY);

      y += ROW_H;
    }

    dtext("U/D:Browse  B:Leave", 6, SH-10, GRAY);
    this.draw_msg();

    const e = poll();
    if(e.b || e.m){ this.gs = GS_DUNGEON; return; }
    if(e.u) this._merchant_scroll = Math.max(0, this._merchant_scroll-1);
    if(e.d) this._merchant_scroll = Math.min(2, this._merchant_scroll+1);
    if(e.a){
      const idx = this._merchant_scroll;
      const name = stock[idx];
      if(!name || !ITEMS[name]) return;
      const price = this._merchant_price(name);
      if(p.gold < price){ this.show_msg("Not enough gold!"); return; }
      if(p.inventory.length >= p.max_inv){ this.show_msg("Inventory full!"); return; }
      p.gold -= price;
      // Remove from stock
      this._merchant_stock.splice(idx, 1);
      // Apply special items directly
      if(name === "Elixir of Life"){
        p.hp = p.max_hp;
        p.clear_status();
        this.show_msg("Full health restored!");
        burst(SW/2, SH/2, WHITE, 20);
      } else if(name === "Scroll of Annihilation"){
        // Stored in inventory — used from magic picker like other scrolls
        p.inventory.push(name);
        this.show_msg("Handle with care...");
      } else if(name === "Soulrender"){
        p.inventory.push(name);
        this.show_msg("Dark power obtained!");
      } else {
        p.inventory.push(name);
        this.show_msg(`Bought ${name.slice(0,12)}!`);
      }
      if(this._merchant_stock.length === 0){
        this.show_msg("Sold out. Farewell.");
        this.d.tiles[this._merchant_y][this._merchant_x] = T_FLOOR;
        this.gs = GS_DUNGEON;
      }
    }
  }

  // ── COMBAT INVENTORY ────────────────────────────────────────────
  // Opened by B during combat/dungeon. Three tabs: Junk+Gems | Consumables | Gear
  tick_combat_inv(){
    const p = this.p;
    const ret = this._combat_inv_return || GS_DUNGEON;
    clear_screen(BLACK);

    // Header
    drect(DGRAY, 0, 0, SW, 14);
    dtext("INVENTORY", 36, 2, WHITE);
    dtext(`${p.inventory.length}/${p.max_inv}`, 96, 2, GRAY);

    // Sub-tab bar
    const SUB = ["Junk/Gems","Consume","Gear"];
    const stw = 42;
    for(let i=0; i<3; i++){
