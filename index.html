class Game {
  constructor(){
    this.gs = GS_TITLE;
    this.p = new Player();
    this.d = null;
    this.cam_x = 0; this.cam_y = 0;
    this.menu = null; this.dialog = null;
    this.msg = ""; this.msg_t = 0;
    this.combat_mon = null; this.combat_msg = ""; this.cphase = 0;
    this.is_boss_fight = false; this.boss_data = null;
    this.chest_item = "";
    this.perk_pool = []; this.perk_cur = 0;
    this._shop_tab = 0; this._vtab = 0;
    this._ench_phase = 0; this._ench_item = null; this._ench_pool = [];
    this._bldg_mode = "";
    this._scroll_dmg = 0;
    this._after_dialog = GS_DUNGEON;
    this._shrine_effect = null;
    this._id_mode = false;
    this._pending_levelup = false;
    this._shop_return = GS_VILLAGE;  // where to return when leaving inventory/shop
    this._home_tab = 0;       // 0=Stats 1=Gear 2=Perks
    this._home_scroll = 0;
    this._scroll_return = GS_COMBAT;  // where to return from scroll picker
    // Magic system (per-combat)
    this._magic_charges = 0;     // remaining attack/shield scroll casts this fight
    this._magic_charges_max = 3; // refilled at start of each combat
    this._shield_turns = 0;      // remaining shield turns (blocks incoming damage)
    this._shield_immune = false; // major shield grants status immunity while active
    this._burn_turns = 0;        // burn DoT applied to current monster/boss
    this._burn_dmg = 0;
    // Title-screen starfield (Pass 2)
    this._title_stars = Array.from({length: 36}, () => ({
      x: Math.random()*SW, y: Math.random()*SH/2,
      v: 0.2 + Math.random()*0.6, b: 0.5 + Math.random()*0.5
    }));
    this._title_t = 0;
  }

  show_dialog(text, title="", color=GRAY, after=null){
    this.dialog = new DialogBox(text, title, color);
    this._after_dialog = after !== null ? after : GS_DUNGEON;
    this.gs = GS_DIALOG;
  }
  show_msg(s, t=90){
    this.msg = String(s).slice(0, 20); this.msg_t = t;
  }
  _refresh_combat_magic(){
    // Called at the start of every combat encounter.
    // Base 3 charges. Arcane perk grants +1.
    this._magic_charges_max = 3 + (this.p.has_perk("arcane") ? 1 : 0);
    this._magic_charges = this._magic_charges_max;
    this._shield_turns = 0;
    this._shield_immune = false;
    this._burn_turns = 0;
    this._burn_dmg = 0;
  }
  draw_msg(){
    if(this.msg_t > 0){
      this.msg_t--;
      // Bottom-centered toast, sized to fit the message; sits just above the XP bar (SH-3..SH)
      const text = this.msg;
      const w = Math.min(SW - 6, text.length * 6 + 8);
      const x = ((SW - w) / 2) | 0;
      const y = SH - 16;  // 13px box + 3px gap above XP bar
      // Subtle fade at end of timer
      const alpha = this.msg_t < 12 ? this.msg_t / 12 : 1;
      ctx.save();
      ctx.globalAlpha = alpha;
      drect(BLACK, x, y, w, 12);
      drect(GOLD, x, y, w, 12, true);
      dtext(text, x + 4, y + 2, WHITE);
      ctx.restore();
    }
  }
  snap_cam(){
    this.cam_x = Math.max(0, Math.min(this.p.x - (VIEW_W/2|0), MAP_W - VIEW_W));
    this.cam_y = Math.max(0, Math.min(this.p.y - (VIEW_H/2|0), MAP_H - VIEW_H));
  }

  // ── TITLE ─────────────────────────────────────────────────────────
  tick_title(){
    this._title_t++;
    clear_screen(BLACK);
    // Animated starfield (Pass 2 polish)
    for(const s of this._title_stars){
      s.x -= s.v;
      if(s.x < 0) s.x = SW;
      const tw = Math.sin(this._title_t*0.05 + s.x*0.1) * 0.3 + 0.7;
      const br = (255 * s.b * tw) | 0;
      ctx.fillStyle = `rgb(${br},${br},${br})`;
      ctx.fillRect(s.x|0, s.y|0, 1, 1);
    }
    // Background mist near bottom
    for(let i=0; i<14; i++){
      const y = 100 + i*2;
      ctx.fillStyle = `rgba(${60+i*4},${20+i*2},${20+i*2},0.15)`;
      ctx.fillRect(0, y, SW, 2);
    }
    // Pulsing logo
    const pulse = Math.sin(this._title_t*0.05) * 0.3 + 0.7;
    const gc = (255 * pulse) | 0;
    ctx.fillStyle = `rgb(${gc},${(gc*0.78)|0},0)`;
    ctx.font = "bold 12px monospace";
    const t1 = "DUNGEON DIVER";
    const w1 = ctx.measureText(t1).width;
    ctx.fillText(t1, (SW-w1)/2|0, 24);
    ctx.fillStyle = ORANGE;
    ctx.font = "8px monospace";
    const t2 = "v4.2 - Mobile";
    const w2 = ctx.measureText(t2).width;
    ctx.fillText(t2, (SW-w2)/2|0, 38);
    // Decorative crossed swords (simple pixel art)
    drect(GRAY, SW/2-12, 50, 24, 2);
    drect(LBLUE, SW/2-1, 48, 2, 6);
    // Menu
    dtext("A: New Game", 30, 72, WHITE);
    dtext("B: Continue", 30, 84, CYAN);
    // Banked gold display (if any from previous run)
    if(this.p.banked > 0){
      dtext(`Banked: ${this.p.banked}G`, 22, 102, GOLD);
    }
    // Version tag — bottom right corner, always visible
    dtext("v4.2", SW-26, SH-10, rgb(80,70,55));
    draw_xpbar(this.p);

    const e = poll();
    if(e.a){ const banked = this.p.banked; this.p.reset(); this.p.gold += banked; this.gs = GS_VILLAGE; }
    else if(e.b){ this.gs = GS_VILLAGE; }
  }

  // ── DIALOG ────────────────────────────────────────────────────────
  tick_dialog(){
    const nxt = this._after_dialog;
    if(nxt === GS_DUNGEON || nxt === GS_CHEST){
      clear_screen(BLACK); draw_hud(this.p); this._draw_tiles();
    } else if(nxt === GS_BOSS_COMBAT && this.boss_data){
      clear_screen(DGRAY);
    } else {
      clear_screen(BLACK);
    }
    this.dialog.draw();
    const e = poll();
    if(e.a || e.b){
      this.gs = nxt;
      if(this._shrine_effect){
        this._apply_shrine_effect(this._shrine_effect);
        this._shrine_effect = null;
      }
      if(this._pending_levelup){
        this._pending_levelup = false;
        this.gs = GS_LEVELUP;
      }
    }
  }

  // ── VILLAGE ───────────────────────────────────────────────────────
  tick_village(){
    this.p.immune_used = false;
    clear_screen(DGREEN);
    // Sky gradient (subtle Pass 2 polish)
    for(let i=0; i<30; i++){
      ctx.fillStyle = `rgba(80,140,200,${0.4 - i*0.012})`;
      ctx.fillRect(0, 14+i, SW, 1);
    }
    // Ground (LBROWN cobble area) sized to fit both rows without bottom-bar collision
    drect(LBROWN, 0, 80, SW, 36);
    // Cobblestone hints
    for(let i=0; i<8; i++){
      drect(BROWN, i*16+2, 84, 12, 2);
      drect(BROWN, i*16+10, 102, 12, 2);
    }
    for(let i=0; i<BLDG_ORDER.length; i++){
      const bid = BLDG_ORDER[i];
      const bx = 2 + (i%4)*31;
      const by = (i<4) ? 44 : 82;
      const owned = !!this.p.buildings[bid];
      const bc = owned ? BLDG_DEF[bid][2] : DGRAY;
      drect(bc, bx, by, 28, 28);
      // Roof triangle
      ctx.fillStyle = owned ? DRED : DGRAY;
      ctx.beginPath();
      ctx.moveTo(bx, by);
      ctx.lineTo(bx+14, by-4);
      ctx.lineTo(bx+28, by);
      ctx.closePath();
      ctx.fill();
      // Door
      drect(BROWN, bx+12, by+20, 4, 8);
      drect(i===this._vtab ? WHITE : GRAY, bx, by, 28, 28, true);
      dtext(BLDG_DEF[bid][0].slice(0,5), bx+1, by+9, owned ? WHITE : GRAY);
      if(!owned) dtext(`$${BLDG_DEF[bid][1]}`, bx+1, by+19, YELLOW);
    }
    drect(DGRAY, 0, 0, SW, 14);
    dtext(`HP:${this.p.hp}/${this.p.max_hp}`, 2, 2, GREEN);
    dtext(`G:${this.p.gold}`, 60, 2, GOLD);
    dtext(`B${this.p.floor}`, 96, 2, LBLUE);
    dtext(`L${this.p.level}`, 112, 2, YELLOW);
    const bid = BLDG_ORDER[this._vtab];
    // Single-line bottom info bar (12px) - description fits if short, else fallback to name+controls
    drect(DGRAY, 0, SH-12, SW, 12);
    const desc = BLDG_DEF[bid][3];
    const owned = !!this.p.buildings[bid];
    if(!owned){
      dtext(`$${BLDG_DEF[bid][1]}`, 2, SH-10, YELLOW);
      dtext(desc.slice(0,17), 22, SH-10, CYAN);
    } else {
      dtext(desc.slice(0,15), 2, SH-10, CYAN);
      dtext("A B:Down", 78, SH-10, WHITE);
    }
    this.draw_msg();

    const e = poll();
    if(e.l) this._vtab = (this._vtab - 1 + BLDG_ORDER.length) % BLDG_ORDER.length;
    else if(e.r) this._vtab = (this._vtab + 1) % BLDG_ORDER.length;
    else if(e.u) this._vtab = (this._vtab - 4 + BLDG_ORDER.length) % BLDG_ORDER.length;
    else if(e.d) this._vtab = (this._vtab + 4) % BLDG_ORDER.length;
    else if(e.a) this._enter_building(BLDG_ORDER[this._vtab]);
    else if(e.b) this._enter_dungeon();
    else if(e.m) this.gs = GS_TITLE;
  }

  _enter_building(bid){
    if(!this.p.buildings[bid]){
      const cost = BLDG_DEF[bid][1];
      if(this.p.gold >= cost){
        this.p.gold -= cost; this.p.buildings[bid] = true;
        if(bid === "library") this.p.perk_choices = 4;
        this.show_msg(`Built ${BLDG_DEF[bid][0]}!`);
        burst(15 + (BLDG_ORDER.indexOf(bid)%4)*31, 50, GOLD, 12);
      } else {
        this.show_msg(`Need ${cost}G!`);
      }
      return;
    }
    const actions = {
      shop:    () => this._open_shop(),
      inn:     () => this._open_inn(),
      enchant: () => this._open_enchant_pick(),
      forge:   () => this._open_forge(),
      library: () => this.show_msg("Perk choices: 4"),
      temple:  () => this._open_temple(),
      bank:    () => this._open_bank(),
      home:    () => this._open_home(),
    };
    actions[bid]();
  }
  _open_inn(){
    if(this.p.hp >= this.p.max_hp && this.p.status === ST_NONE){
      this.show_msg("Already at full health!"); return;
    }
    if(this.p.gold >= 50){
      this.p.gold -= 50; this.p.hp = this.p.max_hp;
      this.p.status = ST_NONE; this.p.status_turns = 0; this.p.blinded = false;
      this.show_msg("Fully rested!");
    } else this.show_msg("Need 50G to rest!");
  }
  _open_bank(){
    const opts = [
      ["Deposit All", GOLD],
      ["Withdraw All", LBLUE],
      ["-- Depart --", GRAY],
    ];
    this.menu = new Menu(`Bank: ${this.p.banked}G`, opts);
    this._bldg_mode = "bank"; this.gs = GS_BLDG;
  }
  _open_temple(){
    const opts = [["Lift Curses(100G)",WHITE], ["Respec Perk(500G)",LPURP], ["-- Depart --",GRAY]];
    this.menu = new Menu("Temple", opts);
    this._bldg_mode = "temple"; this.gs = GS_BLDG;
  }

  // ── HOME ──────────────────────────────────────────────────────────
  _open_home(){
    this._home_tab = 0;
    this._home_scroll = 0;
    this.gs = GS_HOME;
  }

  tick_home(){
    const p = this.p;
    clear_screen(BLACK);

    // Top tab bar
    drect(DGRAY, 0, 0, SW, 14);
    const tab_labels = ["Stats","Gear","Perks"];
    for(let i=0; i<3; i++){
      const tw = 42, tx = i*tw + 1;
      const sel = (i === this._home_tab);
      drect(sel ? CYAN : MGRAY, tx, 1, tw-2, 12);
      drect(sel ? WHITE : DGRAY, tx, 1, tw-2, 12, true);
      dtext(tab_labels[i], tx+10, 3, sel ? BLACK : LBLUE);
    }

    // Content area
    const CY0 = 16;
    const CY_BOT = SH - 12;  // controls bar starts here

    if(this._home_tab === 0){
      this._draw_home_stats(p, CY0);
    } else if(this._home_tab === 1){
      this._draw_home_gear(p, CY0, CY_BOT);
    } else {
      this._draw_home_perks(p, CY0, CY_BOT);
    }

    // Bottom controls
    drect(DGRAY, 0, CY_BOT, SW, 12);
    dtext("L/R:Tab B:Back", 4, CY_BOT+2, GRAY);

    this.draw_msg();

    const e = poll();
    if(e.l){ this._home_tab = (this._home_tab - 1 + 3) % 3; this._home_scroll = 0; }
    else if(e.r){ this._home_tab = (this._home_tab + 1) % 3; this._home_scroll = 0; }
    else if(e.u) this._home_scroll = Math.max(0, this._home_scroll - 1);
    else if(e.d) this._home_scroll++;  // clamped during draw
    else if(e.a || e.b || e.m){ this.gs = GS_VILLAGE; return; }
  }

  _draw_home_stats(p, y){
    // Hero header
    drect(BLUE, 4, y+2, 18, 18);
    drect(WHITE, 4, y+2, 18, 18, true);
    drect(WHITE, 8, y+8, 2, 2);
    drect(WHITE, 16, y+8, 2, 2);
    drect(GRAY, 10, y+14, 6, 1);
    dtext(`Lv ${p.level}`, 26, y+2, YELLOW);
    dtext(`B${p.floor}`, 26, y+12, LBLUE);
    // Core stats - two columns
    let ry = y + 24;
    dtext("HP:", 4, ry, GRAY); dtext(`${p.hp}/${p.max_hp}`, 26, ry, GREEN);
    dtext("XP:", 68, ry, GRAY); dtext(`${p.xp}/${p.xp_next}`, 88, ry, CYAN);
    ry += 10;
    dtext("ATK:", 4, ry, GRAY); dtext(`${p.total_atk()}`, 28, ry, RED);
    dtext("DEF:", 60, ry, GRAY); dtext(`${p.total_def()}`, 84, ry, LBLUE);
    ry += 10;
    dtext("Gold:", 4, ry, GRAY); dtext(`${p.gold}`, 32, ry, GOLD);
    dtext("Bank:", 60, ry, GRAY); dtext(`${p.banked}`, 88, ry, GOLD);
    ry += 12;
    // Status flags row
    dtext("Status:", 4, ry, GRAY);
    let sx = 42;
    if(p.status !== ST_NONE){
      const sc = STATUS_COLORS[p.status] || WHITE;
      const sn = STATUS_NAMES[p.status] || "?";
      dtext(`${sn}(${p.status_turns})`, sx, ry, sc);
    } else {
      dtext("Healthy", sx, ry, GREEN);
    }
    ry += 10;
    // Boon flags
    dtext("Boons:", 4, ry, GRAY);
    sx = 42;
    if(p.has_perk("dungeon_born")){
      dtext(p.immune_used ? "DB-" : "DB+", sx, ry, p.immune_used ? GRAY : TEAL);
      sx += 22;
    }
    if(p.has_perk("phoenix")){
      dtext(p.revive_used ? "PHX-" : "PHX+", sx, ry, p.revive_used ? GRAY : RED);
      sx += 26;
    }
    if(p.cursed_items.size > 0){
      dtext(`C:${p.cursed_items.size}`, sx, ry, CURSE_C);
    }
    ry += 12;
    // Buildings owned
    dtext("Buildings:", 4, ry, GRAY);
    ry += 10;
    let bx = 4, by = ry;
    for(const bid of BLDG_ORDER){
      const owned = !!p.buildings[bid];
      const col = owned ? BLDG_DEF[bid][2] : DGRAY;
      drect(col, bx, by, 6, 6);
      drect(owned ? WHITE : GRAY, bx, by, 6, 6, true);
      bx += 8;
    }
  }

  _draw_home_gear(p, y, y_bot){
    // Build a flat list of lines so we can scroll
    const lines = []; // {text, color, indent}
    // Weapon
    if(p.weapon){
      const wname = p.weapon;
      const cursed = p.is_cursed(wname);
      lines.push({text: `Wpn: ${wname.slice(0,12)}`, color: cursed ? CURSE_C : WHITE, indent: 0});
      lines.push({text: `  +${ITEMS[wname][3]} ATK${cursed?" [CURSED]":""}`, color: cursed ? CURSE_C : GRAY, indent: 0});
      const encs = p.enchants[wname] || [];
      if(encs.length){
        for(const e of encs){
          lines.push({text: `  \u2605 ${e[0]}`, color: e[5], indent: 0});
        }
      } else {
        lines.push({text: "  (no enchants)", color: DGRAY, indent: 0});
      }
    } else {
      lines.push({text: "Wpn: (bare hands)", color: GRAY, indent: 0});
    }
    // Spacer
    lines.push({text: "", color: GRAY, indent: 0});
    // Armor
    if(p.armor){
      const aname = p.armor;
      const cursed = p.is_cursed(aname);
      lines.push({text: `Arm: ${aname.slice(0,12)}`, color: cursed ? CURSE_C : WHITE, indent: 0});
      lines.push({text: `  +${ITEMS[aname][3]} DEF${cursed?" [CURSED]":""}`, color: cursed ? CURSE_C : GRAY, indent: 0});
      const encs = p.enchants[aname] || [];
      if(encs.length){
        for(const e of encs){
          lines.push({text: `  \u2605 ${e[0]}`, color: e[5], indent: 0});
        }
      } else {
        lines.push({text: "  (no enchants)", color: DGRAY, indent: 0});
      }
    } else {
      lines.push({text: "Arm: (no armor)", color: GRAY, indent: 0});
    }

    this._draw_home_list(lines, y, y_bot);
  }

  _draw_home_perks(p, y, y_bot){
    const lines = [];
    if(!p.perks.length){
      lines.push({text: "No perks yet.", color: GRAY, indent: 0});
      lines.push({text: "Level up to earn", color: DGRAY, indent: 0});
      lines.push({text: "perks!", color: DGRAY, indent: 0});
    } else {
      lines.push({text: `Perks: ${p.perks.length}/18`, color: YELLOW, indent: 0});
      lines.push({text: "", color: GRAY, indent: 0});
      for(const pk of p.perks){
        lines.push({text: pk[1].slice(0,17), color: pk[6], indent: 0});
        lines.push({text: `  ${pk[2].slice(0,15)}`, color: GRAY, indent: 0});
      }
    }
    this._draw_home_list(lines, y, y_bot);
  }

  _draw_home_list(lines, y, y_bot){
    const ROW_H = 9;
    const visible = Math.floor((y_bot - y - 2) / ROW_H);
    // Clamp scroll
    const max_scroll = Math.max(0, lines.length - visible);
    if(this._home_scroll > max_scroll) this._home_scroll = max_scroll;
    for(let i=0; i<visible; i++){
      const idx = this._home_scroll + i;
      if(idx >= lines.length) break;
      const ln = lines[idx];
      dtext(ln.text, 4, y + 2 + i*ROW_H, ln.color);
    }
    // Scroll indicator
    if(lines.length > visible){
      const sb_x = SW - 4;
      drect(DGRAY, sb_x, y, 2, y_bot - y);
      const thumb_h = Math.max(4, ((visible/lines.length) * (y_bot-y)) | 0);
      const thumb_y = y + ((this._home_scroll/Math.max(1,lines.length-visible)) * (y_bot-y-thumb_h)) | 0;
      drect(LBLUE, sb_x, thumb_y, 2, thumb_h);
    }
  }

  // ── SCROLL PICKER (Magic button in combat) ───────────────────────
  _open_scroll_picker(){
    // Picker shows: damage/shield scrolls (cost a charge) + status cures (FREE)
    // Does NOT show: Recall (escape, not magic), ID, equipment, healing potions.
    const cost_charge = new Set(["fire_s","lit_s","shield_s"]);
    const free_use    = new Set(["cure_p","cure_f","cure_a","uncurse"]);
    const counts = {};
    const order = [];
    for(const n of this.p.inventory){
      const t = ITEMS[n] && ITEMS[n][2];
      if(!cost_charge.has(t) && !free_use.has(t)) continue;
      if(!(n in counts)){ counts[n] = 0; order.push(n); }
      counts[n]++;
    }
    if(!order.length){
      this.show_msg("No scrolls or cures!");
      return;
    }
    const opts = order.map(n => {
      const c = counts[n];
      const t = ITEMS[n][2];
      const is_charge = cost_charge.has(t);
      const depleted = is_charge && this._magic_charges <= 0;
      const label = c>1 ? `${n} x${c}` : n;
      // Free actions get a tilde tag so the player can see what doesn't spend a star
      const decorated = is_charge ? label : `~${label}`;
      const col = depleted ? DGRAY : ITEMS[n][4];
      return [decorated, col];
    });
    opts.push(["-- Cancel --", GRAY]);
    this._scroll_names = order;
    this.menu = new Menu("Magic", opts);
    this._scroll_return = this.is_boss_fight ? GS_BOSS_COMBAT : GS_COMBAT;
    this.gs = GS_SCROLL_PICKER;
  }

  tick_scroll_picker(){
    clear_screen(BLACK);
    drect(PURPLE, 0, 0, SW, 14);
    dtext("MAGIC", 4, 3, LPURP);
    // Show charge indicator in title bar too
    const cmax = this._magic_charges_max;
    let cx = SW - 4 - cmax*7;
    for(let i=0; i<cmax; i++){
      const lit = i < this._magic_charges;
      dtext("*", cx, 3, lit ? GOLD : DGRAY);
      cx += 7;
    }
    this.menu.draw();
    dtext("A:Use B:Back ~=free", 4, SH-10, GRAY);
    this.draw_msg();
    const e = poll();
    if(e.u) this.menu.move(-1);
    else if(e.d) this.menu.move(1);
    else if(e.b || e.m){ this.gs = this._scroll_return; return; }
    else if(e.a){
      const idx = this.menu.sel_idx();
      const sel = this.menu.sel();
      if(!sel || sel.indexOf("Cancel") !== -1){ this.gs = this._scroll_return; return; }
      if(idx >= this._scroll_names.length){ this.gs = this._scroll_return; return; }
      const target_name = this._scroll_names[idx];
      const t = ITEMS[target_name][2];
      const cost_charge_types = new Set(["fire_s","lit_s","shield_s"]);
      const is_charge = cost_charge_types.has(t);
      // Charge gate
      if(is_charge && this._magic_charges <= 0){
        this.show_msg("No magic charges!");
        return;
      }
      const inv_idx = this.p.inventory.indexOf(target_name);
      if(inv_idx < 0){ this.gs = this._scroll_return; return; }
      // Use the item via existing handler (consumes from inventory)
      const [msg, tag] = this.p.use_item(inv_idx);
      // Free-use cures and uncurse — show message and return
      if(tag === null || tag === "uncurse" || tag === undefined){
        this.show_msg(msg);
        this.gs = this._scroll_return;
        return;
      }
      // Combat scrolls — apply effect immediately
      if(tag === "fire_s"){
        this._magic_charges--;
        const d = SCROLL_DATA[target_name];
        this._cast_damage_scroll(target_name, d, ORANGE);
        // Apply burn (reuse poison DoT but tracked separately on the target)
        this._burn_turns = d.burn_turns;
        this._burn_dmg = d.burn_dmg;
        this.gs = this._scroll_return;
        return;
      }
      if(tag === "lit_s"){
        this._magic_charges--;
        const d = SCROLL_DATA[target_name];
        this._cast_damage_scroll(target_name, d, YELLOW);
        this.gs = this._scroll_return;
        return;
      }
      if(tag === "shield_s"){
        this._magic_charges--;
        const d = SCROLL_DATA[target_name];
        this._shield_turns = d.turns;
        this._shield_immune = !!d.status_immune;
        this.show_msg(`Shield ${d.turns} turn${d.turns>1?"s":""}!`);
        burst(SW/2, SH-30, d.color, 18);
        flash(d.color, 5);
        this.gs = this._scroll_return;
        return;
      }
      // Unknown tag — bail safely
      this.show_msg(msg || "Used");
      this.gs = this._scroll_return;
    }
  }

  // Apply immediate damage from a Fire/Lightning scroll to whatever target we're fighting.
  _cast_damage_scroll(name, d, color){
    const dmg = d.dmg;
    if(this.is_boss_fight && this.boss_data){
      this.boss_data[2] -= dmg;
    } else if(this.combat_mon){
      this.combat_mon[2] -= dmg;
    }
    this.show_msg(`${name.split(" ").pop()} -${dmg}!`);
    FX.combat_target_flash = 6;
    shake(5);
    flash(color, 6);
    burst(64, 28, color, 20);
  }


  // ── SHOP ──────────────────────────────────────────────────────────
  _open_shop(){ this._shop_tab = 0; this._build_shop_menu(); this.gs = GS_SHOP; }
  _build_shop_menu(){
    const p = this.p;
    if(this._shop_tab === 0){
      const opts = SHOP_STOCK.map(n => [`${n} $${ITEMS[n][1]}`, ITEMS[n][4]]);
      opts.push(["-- Depart --", GRAY]);
      this.menu = new Menu("Buy [L/R tab]", opts);
    } else if(this._shop_tab === 1){
      const inv = p.inventory;
      const opts = [];
      for(const n of inv){
        let tag = "";
        if(n === p.weapon) tag += "[W]";
        else if(n === p.armor) tag += "[A]";
        if(p.enchants[n] && p.enchants[n].length) tag += "★";
        if(p.is_cursed(n)) tag += "(C)";
        const col = p.is_cursed(n) ? CURSE_C : (p.enchants[n] && p.enchants[n].length ? GOLD : ITEMS[n][4]);
        opts.push([`${n} $${ITEMS[n][0]}${tag}`, col]);
      }
      if(!opts.length) opts.push(["(nothing)", GRAY]);
      opts.push(["-- Depart --", GRAY]);
      this.menu = new Menu("Sell [L/R tab]", opts);
    } else {
      const inv = p.inventory;
      const opts = [];
      for(const n of inv){
        let tag = "";
        if(n === p.weapon) tag += "[W]";
        else if(n === p.armor) tag += "[A]";
        if(p.enchants[n] && p.enchants[n].length) tag += "★";
        if(p.is_cursed(n)) tag += "(C)";
        else if(!p.is_identified(n) && (ITEMS[n][2]==="weapon" || ITEMS[n][2]==="armor")) tag += "?";
        const col = p.is_cursed(n) ? CURSE_C : (p.enchants[n] && p.enchants[n].length ? GOLD : ITEMS[n][4]);
        opts.push([`${n}${tag}`, col]);
      }
      if(!opts.length) opts.push(["(empty)", GRAY]);
      opts.push(["-- Depart --", GRAY]);
      this.menu = new Menu("Inventory", opts);
    }
  }
  tick_shop(){
    clear_screen(BLACK); this.menu.draw();
    dtext(`Gold:${this.p.gold}`, 4, SH-10, GOLD);
    // Lock to Inventory tab when opened from anywhere except the village
    const inv_only = this._shop_return !== GS_VILLAGE;
    if(inv_only){
      // Show only the Inv label, centered, to make it clear what's accessible
      dtext("Inventory", 44, SH-18, YELLOW);
    } else {
      const labels = ["Buy","Sell","Inv"];
      for(let i=0; i<3; i++) dtext(labels[i], 4+i*38, SH-18, i===this._shop_tab ? YELLOW : GRAY);
    }
    this.draw_msg();
    const e = poll();
    if(e.u) this.menu.move(-1);
    else if(e.d) this.menu.move(1);
    else if(e.l && !inv_only){ this._shop_tab = (this._shop_tab-1+3)%3; this._build_shop_menu(); }
    else if(e.r && !inv_only){ this._shop_tab = (this._shop_tab+1)%3; this._build_shop_menu(); }
    else if(e.b || e.m){ this.gs = this._shop_return; this._shop_return = GS_VILLAGE; return; }
    else if(e.a){
      const sel = this.menu.sel(); const idx = this.menu.sel_idx();
      if(sel && sel.indexOf("Depart") !== -1){ this.gs = this._shop_return; this._shop_return = GS_VILLAGE; return; }
      if(this._shop_tab === 0){
        const name = SHOP_STOCK[idx];
        if(name){
          const ok = this.p.buy_item(name);
          this.show_msg(ok ? `Bought ${name}` : "Insufficient coin");
          this._build_shop_menu();
        }
      } else if(this._shop_tab === 1){
        const earned = this.p.sell_item(idx);
        this.show_msg(earned ? `+${earned}G!` : "Unequip first!");
        this._build_shop_menu();
      } else {
        if(idx < this.p.inventory.length){
          this._handle_inv_use(idx);
          this._build_shop_menu();
        }
      }
    }
  }

  _handle_inv_use(idx){
    if(this._id_mode){
      if(idx < this.p.inventory.length){
        const name = this.p.inventory[idx];
        if(ITEMS[name][2]==="weapon" || ITEMS[name][2]==="armor"){
          if(!this.p.is_identified(name)){
            if(ITEMS[name][5]>0 && Math.floor(Math.random()*100)+1 <= ITEMS[name][5]) this.p.cursed_items.add(name);
            this.p.identified.add(name);
          }
          if(this.p.is_cursed(name)) this.show_msg(`${name.slice(0,8)}: CURSED!`);
          else this.show_msg(`${name.slice(0,10)}: clean`);
        } else this.show_msg("Not equippable");
      }
      this._id_mode = false;
      return;
    }
    const [msg, tag] = this.p.use_item(idx);
    if(tag === "recall") this.gs = GS_VILLAGE;
    else if(tag === "fire_s" || tag === "lit_s" || tag === "shield_s"){
      // Combat scroll used outside combat — give it back and warn
      this.p.inventory.splice(idx, 0, msg);  // msg is the item name for these tags
      this.show_msg("Use in battle!");
    } else if(tag === "id"){
      this._id_mode = true;
      this.show_msg("Choose item to ID");
    } else if(tag === "cursed"){
      this.show_msg("Cursed item equipped!");
    } else this.show_msg(msg);
  }

  // ── ENCHANT ───────────────────────────────────────────────────────
  _open_enchant_pick(){
    const inv = this.p.inventory;
    const enchantable = inv.filter(n => enchantsFor(n).length > 0);
    if(!enchantable.length){ this.show_msg("Nothing to enchant!"); return; }
    const opts = enchantable.map(n => [n, ITEMS[n][4]]);
    opts.push(["-- Depart --", GRAY]);
    this.menu = new Menu("Pick item", opts);
    this._ench_phase = 0; this._ench_item = null;
    this.gs = GS_ENCHANT;
  }
  _build_enchant_list(){
    const pool = enchantsFor(this._ench_item);
    this._ench_pool = pool;
    const existing = new Set((this.p.enchants[this._ench_item] || []).map(e => e[3]));
    const opts = [];
    for(const enc of pool){
      const lap = enc[1], lv = enc[2];
      let col = enc[5];
      const have = existing.has(enc[3]);
      let label = `${enc[0]} L${lap} v${lv}`;
      if(have){ label += " +"; col = GRAY; }
      opts.push([label, col]);
    }
    opts.push(["-- Depart --", GRAY]);
    this.menu.rebuild(opts);
    this.menu.title = `Ench: ${this._ench_item.slice(0,8)}`;
  }
  tick_enchant(){
    clear_screen(BLACK);
    const lapis = this.p.count_lapis();
    drect(INDIGO, 0, 0, SW, 14);
    dtext("ENCHANTING", 4, 3, LPURP);
    dtext(`Lap:${lapis} L:${this.p.level}`, 68, 3, LBLUE);
    this.menu.draw();
    dtext("A:Select B:Back", 4, SH-10, GRAY);
    this.draw_msg();
    const e = poll();
    if(e.u) this.menu.move(-1);
    else if(e.d) this.menu.move(1);
    else if(e.b || e.m){ this.gs = GS_VILLAGE; return; }
    else if(e.a){
      const sel = this.menu.sel(); const idx = this.menu.sel_idx();
      if(!sel || sel.indexOf("Depart") !== -1){ this.gs = GS_VILLAGE; return; }
      if(this._ench_phase === 0){
        this._ench_item = sel; this._build_enchant_list(); this._ench_phase = 1;
      } else {
        if(idx < this._ench_pool.length){
          const enc = this._ench_pool[idx];
          if(this.p.count_lapis() < enc[1]){ this.show_msg(`Need ${enc[1]} Lapis!`); return; }
          if(this.p.level < enc[2]){ this.show_msg(`Need level ${enc[2]}!`); return; }
          this.p.remove_lapis(enc[1]);
          if(!this.p.enchants[this._ench_item]) this.p.enchants[this._ench_item] = [];
          this.p.enchants[this._ench_item] = this.p.enchants[this._ench_item].filter(ex => ex[3] !== enc[3]);
          this.p.enchants[this._ench_item].push(enc);
          if(enc[3] === "maxhp"){
            this.p.max_hp += enc[4];
            this.p.hp = Math.min(this.p.hp + enc[4], this.p.max_hp);
          }
          this.show_msg(`${enc[0]} applied!`);
          burst(SW/2, SH/2, enc[5], 16);
          this.gs = GS_VILLAGE;
        }
      }
    }
  }

  // ── FORGE / BLDG ──────────────────────────────────────────────────
  _open_forge(){
    const inv = this.p.inventory;
    const forgeable = inv.filter(n => ITEMS[n][2]==="weapon" || ITEMS[n][2]==="armor");
    if(!forgeable.length){ this.show_msg("Nothing to forge!"); return; }
    const opts = forgeable.map(n => [n, ITEMS[n][4]]);
    opts.push(["-- Depart --", GRAY]);
    this.menu = new Menu("Forge (200G)", opts);
    this._bldg_mode = "forge"; this.gs = GS_BLDG;
  }
  tick_bldg(){
    clear_screen(BLACK); this.menu.draw();
    dtext("A:OK B:Back", 4, SH-10, GRAY);
    this.draw_msg();
    const e = poll();
    if(e.u) this.menu.move(-1);
    else if(e.d) this.menu.move(1);
    else if(e.b || e.m){ this.gs = GS_VILLAGE; return; }
    else if(e.a){
      const sel = this.menu.sel();
      if(!sel || sel.indexOf("Depart")!==-1){ this.gs = GS_VILLAGE; return; }
      if(this._bldg_mode === "forge"){
        if(this.p.gold < 200){ this.show_msg("Need 200G!"); return; }
        this.p.gold -= 200; const t = ITEMS[sel][2];
        if(t === "weapon"){ this.p.atk += 2; this.show_msg(`${sel.slice(0,10)}+2ATK`); }
        else { this.p.defense += 1; this.show_msg(`${sel.slice(0,10)}+1DEF`); }
        burst(SW/2, SH/2, ORANGE, 18);
        this.gs = GS_VILLAGE;
      } else if(this._bldg_mode === "temple"){
        if(sel.indexOf("Lift Curses") !== -1){
          if(this.p.cursed_items.size===0){ this.show_msg("No curses!"); return; }
          if(this.p.gold < 100){ this.show_msg("Need 100G!"); return; }
          this.p.gold -= 100; this.p.cursed_items.clear();
          this.p.atk_mod = Math.max(0, this.p.atk_mod);
          this.p.def_mod = Math.max(0, this.p.def_mod);
          this.show_msg("Curses lifted!");
        } else if(sel.indexOf("Respec") !== -1){
          if(!this.p.perks.length){ this.show_msg("No perks!"); return; }
          if(this.p.gold < 500){ this.show_msg("Need 500G!"); return; }
          this.p.gold -= 500; const pk = this.p.perks.pop();
          this.show_msg(`Removed ${pk[1].slice(0,8)}`);
        } else this.gs = GS_VILLAGE;
      } else if(this._bldg_mode === "bank"){
        if(sel.indexOf("Deposit") !== -1){
          if(this.p.gold <= 0){ this.show_msg("No gold to deposit!"); return; }
          const amt = this.p.gold;
          this.p.banked += amt;
          this.p.gold = 0;
          this.show_msg(`Deposited ${amt}G!`);
          burst(SW/2, SH/2, GOLD, 12);
          // Rebuild menu to refresh balance in title
          this._open_bank();
        } else if(sel.indexOf("Withdraw") !== -1){
          if(this.p.banked <= 0){ this.show_msg("Vault is empty!"); return; }
          const amt = this.p.banked;
          this.p.gold += amt;
          this.p.banked = 0;
          this.show_msg(`Withdrew ${amt}G!`);
          burst(SW/2, SH/2, GOLD, 12);
          this._open_bank();
        }
      }
    }
  }

  // ── DUNGEON ───────────────────────────────────────────────────────
  _enter_dungeon(){
    this.d = new DungeonMap(this.p.floor);
    this.p.x = this.d.start_x; this.p.y = this.d.start_y;
    this.snap_cam();
    FX.transition = 30; FX.transition_text = `Floor ${this.p.floor}`;
    this.gs = GS_DUNGEON;
  }

  // Floor palette shift - deeper floors get cooler/darker tones (Pass 2)
  _floor_palette(){
    const f = this.p.floor;
    const t = Math.min(1, (f-1)/24);
    // Wall: brown → cold purple-grey
    const wr = (35 + (35-35)*t) | 0;
    const wg = (35 + (20-35)*t) | 0;
    const wb = (45 + (60-45)*t) | 0;
    // Floor: brown → dark teal
    const fr = (110 + (60-110)*t) | 0;
    const fg = (70 + (60-70)*t) | 0;
    const fb = (30 + (70-30)*t) | 0;
    return {
      wall: rgb(wr, wg, wb),
      wall_edge: rgb(wr+25, wg+25, wb+25),
      floor: rgb(fr, fg, fb),
      floor_alt: rgb(Math.max(0,fr-15), Math.max(0,fg-10), Math.max(0,fb-5)),
    };
  }

  _draw_tiles(){
    const d = this.d, p = this.p;
    const pal = this._floor_palette();
    for(let ty=0; ty<VIEW_H; ty++){
      for(let tx=0; tx<VIEW_W; tx++){
        const mx = tx + this.cam_x, my = ty + this.cam_y;
        const t = d.tile_at(mx, my);
        const px = tx*TILE, py = ty*TILE + HUD_H;
        if(t === T_WALL){
          drect(pal.wall, px, py, TILE, TILE);
          // Wall variation: 3 patterns
          const v = (d.wall_var[my] && d.wall_var[my][mx]) || 0;
          if(v === 0){ drect(pal.wall_edge, px, py, TILE, TILE, true); }
          else if(v === 1){
            drect(pal.wall_edge, px, py, TILE, TILE, true);
            drect(pal.wall_edge, px+1, py+1, 2, 1);
          } else {
            drect(pal.wall_edge, px, py, TILE, TILE, true);
            drect(pal.wall_edge, px+5, py+3, 2, 2);
          }
        } else if(t === T_FLOOR){
          const v = (d.floor_var[my] && d.floor_var[my][mx]) || 0;
          drect(v===0 ? pal.floor : pal.floor_alt, px, py, TILE, TILE);
          // subtle floor speckle
          if((mx*7 + my*13) % 11 === 0){
            ctx.fillStyle = pal.floor_alt;
            ctx.fillRect(px+3, py+5, 1, 1);
          }
        } else if(t === T_STAIR){
          drect(LBROWN, px, py, TILE, TILE);
          drect(YELLOW, px+2, py+2, TILE-4, TILE-4);
          // animated glow
          const g = (Math.sin(performance.now()/200) * 0.5 + 0.5);
          ctx.fillStyle = `rgba(255,255,255,${g*0.4})`;
          ctx.fillRect(px+3, py+3, 2, 2);
        } else if(t === T_CHEST){
          drect(BROWN, px, py, TILE, TILE);
          drect(GOLD, px+1, py+1, TILE-2, TILE-2);
          // lock plate
          drect(DRED, px+3, py+3, 2, 2);
          // sparkle
          if(Math.random() < 0.05) burst(px+TILE/2, py+TILE/2, GOLD, 1);
        } else if(t === T_TOWN){
          drect(TEAL, px, py, TILE, TILE);
          drect(WHITE, px+2, py+2, TILE-4, TILE-4, true);
          const g = (Math.sin(performance.now()/300) * 0.5 + 0.5);
          ctx.fillStyle = `rgba(255,255,255,${g*0.5})`;
          ctx.fillRect(px+3, py+3, 2, 2);
        } else if(t === T_SHRINE){
          drect(SHRINE_C, px, py, TILE, TILE);
          drect(WHITE, px+3, py+1, 2, TILE-2);
          drect(WHITE, px+1, py+3, TILE-2, 2);
        } else if(t === T_BOSS_DOOR){
          drect(BOSS_C, px, py, TILE, TILE);
          drect(DRED, px+1, py+1, TILE-2, TILE-2, true);
          drect(YELLOW, px+3, py+3, 2, 2);
          // pulsing menace
          const g = (Math.sin(performance.now()/120) * 0.5 + 0.5);
          ctx.fillStyle = `rgba(255,${(50*g)|0},${(50*g)|0},${g*0.3})`;
          ctx.fillRect(px, py, TILE, TILE);
        }
      }
    }
    // Monsters
    for(const m of d.monsters){
      if(!m[10]) continue;
      const sx = m[8] - this.cam_x, sy = m[9] - this.cam_y;
      if(p.blinded && (Math.abs(m[8]-p.x) > 2 || Math.abs(m[9]-p.y) > 2)) continue;
      if(sx >= 0 && sx < VIEW_W && sy >= 0 && sy < VIEW_H){
        const mx = sx*TILE + 1, my = sy*TILE + HUD_H + 1;
        // body
        drect(m[7], mx, my, TILE-2, TILE-2);
        // simple eyes
        drect(BLACK, mx+1, my+2, 1, 1);
        drect(BLACK, mx+4, my+2, 1, 1);
      }
    }
    // Player (Pass 2: facing direction + walk animation)
    const ppx = (p.x - this.cam_x)*TILE;
    const ppy = (p.y - this.cam_y)*TILE + HUD_H;
    const pc = (p.status !== ST_NONE) ? (STATUS_COLORS[p.status] || BLUE) : BLUE;
    // shadow
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.fillRect(ppx+1, ppy+TILE-2, TILE-2, 1);
    // body outline
    drect(WHITE, ppx, ppy, TILE, TILE);
    drect(pc, ppx+1, ppy+1, TILE-2, TILE-2);
    // weapon shown by facing
    const bob = FX.player_anim_frame;
    if(p.facing === 0){      // N
      drect(GRAY, ppx+TILE/2, ppy-1+bob, 1, 3);
    } else if(p.facing === 1){ // E
      drect(GRAY, ppx+TILE-1, ppy+TILE/2-1+bob, 3, 1);
    } else if(p.facing === 2){ // S
      drect(GRAY, ppx+TILE/2, ppy+TILE-1+bob, 1, 3);
    } else {                   // W
      drect(GRAY, ppx-1, ppy+TILE/2-1+bob, 3, 1);
    }
    // eyes facing direction
    drect(WHITE, ppx+2, ppy+2, 1, 1);
    drect(WHITE, ppx+5, ppy+2, 1, 1);
  }

  tick_dungeon(){
    apply_shake_transform();
    clear_screen(BLACK); draw_hud(this.p); this._draw_tiles();
    draw_particles();
    draw_xpbar(this.p); this.draw_msg();
    end_shake_transform();
    draw_flash();
    draw_transition();

    const e = poll();
    if(e.m){ this._attempt_recall(); return; }
    if(e.b){ this._shop_return = GS_DUNGEON; this._shop_tab = 2; this._build_shop_menu(); this.gs = GS_SHOP; return; }
    if(this.p.has_perk("paladin") && Math.random() < 0.12){
      this.p.hp = Math.min(this.p.hp + this.p.perk_val("pala"), this.p.max_hp);
    }
    if(this.p.status === ST_FREEZE && this.p.status_turns > 0){
      this.p.tick_status();
      this.show_msg("Frozen still!");
      return;
    }
    let dx=0, dy=0;
    if(e.u){ dy=-1; this.p.facing=0; }
    else if(e.d){ dy=1; this.p.facing=2; }
    else if(e.l){ dx=-1; this.p.facing=3; }
    else if(e.r){ dx=1; this.p.facing=1; }
    if(!dx && !dy) return;
    const nx = this.p.x + dx, ny = this.p.y + dy;
    const t = this.d.tile_at(nx, ny);
    if(t === T_WALL) return;
    const mon = this.d.monster_at(nx, ny);
    if(mon){
      this.combat_mon = mon; this.cphase = 0; this.combat_msg = "";
      this.is_boss_fight = false;
      this._refresh_combat_magic();
      this.gs = GS_COMBAT; return;
    }
    this.p.x = nx; this.p.y = ny; this.snap_cam();
    const dmg = this.p.tick_status();
    if(dmg > 0){
      this.show_msg(`Poison -${dmg}!`);
      flash(POISON_C, 3);
    }
    if(this.p.hp <= 0){ this.gs = GS_GAMEOVER; return; }
    if(t === T_STAIR){
      this.p.floor++;
      this.d = new DungeonMap(this.p.floor);
      this.p.x = this.d.start_x; this.p.y = this.d.start_y;
      this.snap_cam(); this.p.immune_used = false;
      this.show_msg(`Floor ${this.p.floor}!`);
      FX.transition = 30; FX.transition_text = `Floor ${this.p.floor}`;
    } else if(t === T_TOWN){
      this.gs = GS_VILLAGE;
    } else if(t === T_BOSS_DOOR){
      this._enter_boss_fight();
    } else if(t === T_CHEST){
      const key = `${nx},${ny}`;
      const item = this.d.chests[key];
      if(item){
        delete this.d.chests[key];
        this.d.tiles[ny][nx] = T_FLOOR;
        this.chest_item = item;
        if(this.p.inventory.length < 20) this.p.inventory.push(item);
        if(this.p.has_perk("treasure")){
          const b = randomLoot(this.p.floor);
          if(this.p.inventory.length < 20) this.p.inventory.push(b);
          this.chest_item = `${item} +${b.slice(0,8)}`;
        }
        // Burst!
        burst((nx-this.cam_x)*TILE + 4, (ny-this.cam_y)*TILE + HUD_H + 4, GOLD, 18);
        this.gs = GS_CHEST;
      }
    } else if(t === T_SHRINE){
      this.d.tiles[ny][nx] = T_FLOOR;
      this._trigger_shrine();
    } else if(`${nx},${ny}` in this.d.traps){
      const trap = this.d.traps[`${nx},${ny}`];
      delete this.d.traps[`${nx},${ny}`];
      this._trigger_trap(trap);
    }
  }

  _attempt_recall(){
    if(this.is_boss_fight){
      const msg = BOSS_SEAL_MSGS[Math.floor(Math.random()*BOSS_SEAL_MSGS.length)];
      this.show_dialog(msg, "Sealed!", DRED, GS_BOSS_COMBAT); return;
    }
    for(let i=0; i<this.p.inventory.length; i++){
      if(this.p.inventory[i] === "Recall Scroll"){
        this.p.inventory.splice(i, 1);
        this.show_dialog(RECALL_MSG, "Recall", CYAN, GS_VILLAGE);
        return;
      }
    }
    this.gs = GS_VILLAGE;
  }

  _trigger_trap(trap){
    const p = this.p;
    if(trap === "spike"){
      const dmg = Math.max(1, 3 + ((p.floor/2)|0) - p.total_def());
      p.hp = Math.max(1, p.hp - dmg);
      shake(4); flash(RED, 5);
      burst((p.x - this.cam_x)*TILE + 4, (p.y - this.cam_y)*TILE + HUD_H + 4, RED, 12);
      this.show_dialog(`Spikes burst forth!\n${dmg} damage taken!`, "TRAP!", RED, GS_DUNGEON);
    } else if(trap === "poison"){
      if(p.apply_status(ST_POISON, 6)){
        flash(POISON_C, 4);
        this.show_dialog("A foul miasma rises!\nThou art poisoned!", "TRAP!", POISON_C, GS_DUNGEON);
      } else this.show_msg("Resist poison!");
    } else if(trap === "freeze"){
      if(p.apply_status(ST_FREEZE, 3)){
        flash(FREEZE_C, 4);
        this.show_dialog("Ice shatters beneath!\nThou art frozen!", "TRAP!", FREEZE_C, GS_DUNGEON);
      } else this.show_msg("Resist freeze!");
    }
  }

  _trigger_shrine(){
    const outcomes = [
      ["Blessing of Valor","The shrine glows!\n+10 Max HP!","hp"],
      ["Shrine of Might","Runes pulse red!\n+3 ATK gained!","atk"],
      ["Warding Shrine","Holy light flows!\nStatus cleared!","cure"],
      ["Shrine of Plenty","Coins rain down!\n+50 gold!","gold"],
      ["Knowledge","Visions of battle!\n+30 XP gained!","xp"],
      ["Cursed Altar","Dark runes flare!\n-2 ATK -2 DEF!","curse"],
      ["Mimic!","A mimic strikes!\n-15 HP!","dmg"],
    ];
    const s = outcomes[Math.floor(Math.random()*outcomes.length)];
    this._shrine_effect = s[2];
    burst((this.p.x - this.cam_x)*TILE + 4, (this.p.y - this.cam_y)*TILE + HUD_H + 4, SHRINE_C, 16);
    this.show_dialog(s[1], s[0], SHRINE_C, GS_DUNGEON);
  }

  _apply_shrine_effect(eff){
    const p = this.p;
    if(eff === "hp"){ p.max_hp += 10; p.hp = Math.min(p.hp+10, p.max_hp); }
    else if(eff === "atk"){ p.atk += 3; }
    else if(eff === "cure"){ p.status = ST_NONE; p.status_turns = 0; p.blinded = false; }
    else if(eff === "gold"){ p.gold += 50; }
    else if(eff === "curse"){ p.atk_mod -= 2; p.def_mod -= 2; p.apply_status(ST_CURSE, 8); }
    else if(eff === "dmg"){ p.hp = Math.max(1, p.hp-15); shake(5); flash(RED, 4); }
    else if(eff === "xp"){
      if(p.gain_xp(30)){
        p.do_level_up();
        FX.level_flash = 30;
        this.perk_pool = getPerkChoices(p, p.perk_choices);
        this.perk_cur = 0;
        this.gs = GS_LEVELUP;
      }
    }
  }

  // ── BOSS ──────────────────────────────────────────────────────────
  _enter_boss_fight(){
    const b = getBoss(this.p.floor);
    // [name, max_hp, cur_hp, atk, def, xp, gold, color, loot, phase]
    this.boss_data = [b[0], b[1], b[1], b[2], b[3], b[4], b[5], b[6], b[8], 1];
    this.is_boss_fight = true;
    this._pending_levelup = false;
    this._refresh_combat_magic();
    this.show_dialog(BOSS_INTRO[Math.floor(Math.random()*BOSS_INTRO.length)],
                     `Boss:${b[0]}`, BOSS_C, GS_BOSS_COMBAT);
  }

  tick_boss_combat(){
    apply_shake_transform();
    clear_screen(DGRAY);
    const b = this.boss_data, p = this.p;
    // Boss portrait — dark backdrop + sprite art on the right half (text on left)
    const flash_b = FX.combat_target_flash > 0 && (FX.combat_target_flash%2);
    drect(rgb(40,15,15), 20, 4 - FX.combat_attacker_offset, 88, 48);
    drect(DRED, 20, 4 - FX.combat_attacker_offset, 88, 48, true);
    const b_sprite = BOSS_SPRITE[b[0]];
    if(b_sprite){
      // Position boss sprite on right half so left-side text stays readable
      // Sprites are 32-40 wide × 17-20 tall — center in right 60% of box
      const spW = b_sprite[0].length;
      const sx = 20 + 28 + (60 - spW) / 2;
      const sy = 4 + (48 - b_sprite.length) / 2 - FX.combat_attacker_offset;
      drawSprite(b_sprite, sx, sy, flash_b);
    } else {
      // Fallback for unknown bosses
      drect(b[7], 50, 12 - FX.combat_attacker_offset, 50, 32);
      drect(RED, 60, 22, 4, 4);
      drect(RED, 86, 22, 4, 4);
    }
    dtext(b[0].slice(0,14), 4, 6, WHITE);
    hbar(4, 16, 50, 6, Math.max(0, b[2]/b[1]), RED);
    dtext(`HP:${b[2]}/${b[1]}`, 4, 24, RED);
    dtext(`ATK:${b[3]} DEF:${b[4]}`, 4, 34, GRAY);
    dtext(`Phase ${b[9]}`, 4, 44, b[9]===1 ? YELLOW : ORANGE);
    // Magic charge indicator (right side, vertical)
    this._draw_charge_indicator();
    // Shield ring around the bottom hero portrait area if shielded
    if(this._shield_turns > 0) this._draw_shield_ring();
    drect(DGRAY, 0, SH-28, SW, 28);
    const hpf = Math.max(0, p.hp/p.max_hp);
    const hpc = hpf>0.5 ? GREEN : (hpf>0.25 ? ORANGE : RED);
    hbar(2, SH-27, 50, 5, hpf, hpc);
    dtext(`${p.hp}/${p.max_hp}`, 54, SH-27, hpc);
    dtext(`ATK:${p.total_atk()} DEF:${p.total_def()}`, 2, SH-20, GRAY);
    if(p.status !== ST_NONE){
      dtext(STATUS_NAMES[p.status] || "?", 90, SH-20, STATUS_COLORS[p.status] || WHITE);
    }
    if(this.cphase === 0) dtext("A:Fight M:Magic B:Inv", 2, SH-10, WHITE);
    else dtext(this.combat_msg.slice(0,21), 2, SH-10, YELLOW);

    draw_particles();
    end_shake_transform();
    draw_flash();

    const e = poll();
    if(e.m){ this._open_scroll_picker(); return; }
    if(this.cphase === 1){
      if(e.a || e.b){
        if(b[2] <= 0){
          this.is_boss_fight = false;
          if(this.d.boss_door){
            const [bx,by] = this.d.boss_door;
            this.d.tiles[by][bx] = T_FLOOR;
          }
          if(this._pending_levelup){
            this._pending_levelup = false;
            this.gs = GS_LEVELUP;
          } else this.gs = GS_DUNGEON;
        } else this.cphase = 0;
      }
      return;
    }
    if(e.b){ this._shop_return = GS_BOSS_COMBAT; this._shop_tab = 2; this._build_shop_menu(); this.gs = GS_SHOP; return; }
    if(e.a) this._do_boss_round();
  }

  _do_boss_round(){
    const b = this.boss_data, p = this.p;
    let atk = p.total_atk() + this._scroll_dmg; this._scroll_dmg = 0;
    if(p.has_perk("berserker") && p.hp/p.max_hp < 0.3) atk += p.perk_val("brsk");
    const is_crit = p.roll_crit();
    let pdmg = Math.max(1, atk - b[4] + Math.floor(Math.random()*4) - 1);
    if(is_crit) pdmg = Math.max(2, pdmg * 2);
    b[2] -= pdmg;
    let thorn = 0;
    if(p.armor){
      for(const e of (p.enchants[p.armor] || [])){
        if(e[3] === "thorn") thorn += e[4];
      }
    }
    if(thorn && b[2] > 0) b[2] -= thorn;
    // Burn DoT (from Fire scroll) — ticks on boss each round
    let burn_done = 0;
    if(this._burn_turns > 0 && b[2] > 0){
      burn_done = this._burn_dmg;
      b[2] -= burn_done;
      this._burn_turns--;
      if(this._burn_turns <= 0){ this._burn_dmg = 0; }
      burst(64, 28, ORANGE, 8);
    }
    // FX
    FX.combat_target_flash = 4;
    if(is_crit){
      shake(8); flash(YELLOW, 8);
      burst(64, 28, YELLOW, 24);
    } else {
      shake(pdmg > 15 ? 4 : 2);
      burst(64, 28, RED, 10);
    }
    const burn_tag = burn_done > 0 ? `+B${burn_done}` : "";
    const dmg_label = (is_crit ? `CRIT!${pdmg}` : `${pdmg}`) + burn_tag;

    if(b[2] <= b[1]/2 && b[9] === 1){
      b[9] = 2; b[3] += 4;
      this.combat_msg = `You:${dmg_label} PHASE 2!`;
      shake(6); flash(ORANGE, 6);
      burst(64, 28, ORANGE, 24);
      this.cphase = 1; return;
    }
    if(b[2] <= 0){
      p.gold += b[6];
      if(p.has_perk("scavenger")) p.gold += b[6];
      if(p.inventory.length < 20) p.inventory.push(b[8]);
      const leveled = p.gain_xp(b[5]);
      if(leveled){
        p.do_level_up();
        FX.level_flash = 30;
        this.perk_pool = getPerkChoices(p, p.perk_choices);
        this.perk_cur = 0;
        this._pending_levelup = true;
      }
      this.combat_msg = `Win! +${b[5]}XP`;
      burst(64, 28, GOLD, 32);
      this.cphase = 1; return;
    }

    // Boss attack
    let raw = Math.max(0, b[3] - p.total_def() + Math.floor(Math.random()*4) - 1);
    if(p.has_perk("ninja") && Math.floor(Math.random()*100)+1 <= p.perk_val("dodge")){
      this.combat_msg = `DODGE! You:${dmg_label}`;
      this.cphase = 1; return;
    }
    if(raw > 0 && p.has_perk("dungeon_born") && !p.immune_used){
      raw = 0; p.immune_used = true;
    }
    // Arcane Shield blocks incoming damage
    let shield_blocked = false;
    if(this._shield_turns > 0){
      if(raw > 0){ shield_blocked = true; raw = 0; }
      this._shield_turns--;
      // Shield visual: blue ring flash on player area
      flash(this._shield_immune ? CYAN : LBLUE, 3);
    }
    p.hp -= raw;
    if(raw > 0){ shake(3); flash(RED, 4); FX.combat_attacker_offset = 3; }
    let st_str = "";
    if(Math.floor(Math.random()*100)+1 <= 25){
      const st = [ST_POISON, ST_FREEZE, ST_BLIND][Math.floor(Math.random()*3)];
      // Major shield grants status immunity while active (turn already ticked, was active this strike)
      if(!shield_blocked || !this._shield_immune){
        if(p.apply_status(st, 4)) st_str = "+" + (STATUS_NAMES[st] || "?");
      }
    }
    const block_tag = shield_blocked ? "BLK" : `${raw}`;
    this.combat_msg = `You:${dmg_label} B:${block_tag}${st_str}`;
    this.cphase = 1;
    if(p.hp <= 0){
      if(p.has_perk("phoenix") && !p.revive_used){
        p.hp = 5; p.revive_used = true;
        this.show_msg("PHOENIX revive!");
        burst(SW/2, SH/2, GOLD, 24);
        this.cphase = 0;
      } else this.gs = GS_GAMEOVER;
    }
  }

  // ── NORMAL COMBAT ─────────────────────────────────────────────────
  tick_combat(){
    apply_shake_transform();
    clear_screen(DGRAY);
    const m = this.combat_mon, p = this.p;
    // Backdrop (Pass 2)
    for(let i=0; i<14; i++){
      ctx.fillStyle = `rgba(20,15,30,${0.5 - i*0.03})`;
      ctx.fillRect(0, 14+i, SW, 2);
    }
    // Monster — draw backdrop panel then pixel art sprite
    const flash_m = FX.combat_target_flash > 0 && (FX.combat_target_flash%2);
    drect(rgb(30,25,40), 36, 6 - FX.combat_attacker_offset, 56, 46);
    drect(BLACK, 36, 6 - FX.combat_attacker_offset, 56, 46, true);
    const m_sprite = MONSTER_SPRITE[m[0]];
    if(m_sprite){
      // Sprite is ~20 wide × ~18 tall — center in 56x46 box
      const sx = 36 + (56 - 20) / 2;
      const sy = 6 + (46 - m_sprite.length) / 2 - FX.combat_attacker_offset;
      drawSprite(m_sprite, sx, sy, flash_m);
    } else {
      // Fallback for unknown monsters
      drect(m[7], 50, 20 - FX.combat_attacker_offset, 28, 22);
      drect(RED, 56, 26, 3, 3);
      drect(RED, 70, 26, 3, 3);
    }
    dtext(m[0].slice(0,12), 2, 8, WHITE);
    hbar(2, 18, 34, 6, Math.max(0, m[2]/m[1]), RED);
    dtext(`HP:${m[2]}/${m[1]}`, 2, 26, RED);
    dtext(`ATK:${m[3]}`, 2, 36, GRAY);
    if(m[11] > 0) dtext(STATUS_NAMES[m[12]] || "?", 80, 10, STATUS_COLORS[m[12]] || WHITE);
    // Magic charge indicator (right side, vertical)
    this._draw_charge_indicator();
    // Hero portrait — backdrop + pixel art with idle breathing
    drect(rgb(30,25,40), 36, 62, 30, 34);
    drect(WHITE, 36, 62, 30, 34, true);
    // Idle breathing: alternate hero frame every ~30 ticks
    const hero_sprite = (Math.floor(performance.now()/600) % 2) ? SPRITE_HERO_B : SPRITE_HERO_A;
    const hx = 36 + (30 - 18) / 2;  // center 18-wide sprite in 30-wide portrait
    const hy = 62 + (34 - 24) / 2;  // center 24-tall sprite in 34-tall portrait
    drawSprite(hero_sprite, hx, hy, false);
    // Shield ring around hero portrait if shielded
    if(this._shield_turns > 0) this._draw_shield_ring();
    drect(DGRAY, 0, SH-26, SW, 26);
    const hpf = Math.max(0, p.hp/p.max_hp);
    const hpc = hpf>0.5 ? GREEN : (hpf>0.25 ? ORANGE : RED);
    hbar(2, SH-25, 50, 5, hpf, hpc);
    dtext(`${p.hp}/${p.max_hp}`, 54, SH-25, hpc);
    dtext(`A:${p.total_atk()} D:${p.total_def()}`, 2, SH-18, GRAY);
    if(this.cphase === 0) dtext("A:Fight M:Magic B:Inv", 2, SH-10, WHITE);
    else dtext(this.combat_msg.slice(0,21), 2, SH-10, YELLOW);

    draw_particles();
    end_shake_transform();
    draw_flash();

    const e = poll();
    if(this.cphase === 1){
      if(e.a || e.b){
        if(!m[10]) this.gs = GS_DUNGEON;
        else this.cphase = 0;
      }
      return;
    }
    if(e.m){ this._open_scroll_picker(); return; }
    if(e.b){ this._shop_return = GS_COMBAT; this._shop_tab = 2; this._build_shop_menu(); this.gs = GS_SHOP; return; }
    if(e.a) this._do_combat_round();
  }

  // ── COMBAT VISUAL HELPERS ─────────────────────────────────────────
  _draw_charge_indicator(){
    // Right-side vertical stack of stars. 3 by default, 4 with Arcane perk.
    const cmax = this._magic_charges_max;
    const x = SW - 8;
    let y = 52;
    // Background panel
    drect(BLACK, x-2, y-2, 8, cmax*9 + 4);
    drect(LPURP, x-2, y-2, 8, cmax*9 + 4, true);
    for(let i=0; i<cmax; i++){
      const lit = i < this._magic_charges;
      // Star glyph (simple cross of pixels for a tiny "star" feel)
      const c = lit ? GOLD : DGRAY;
      drect(c, x+1, y, 2, 1);
      drect(c, x,   y+1, 4, 1);
      drect(c, x+1, y+2, 2, 1);
      y += 9;
    }
  }
  _draw_shield_ring(){
    // Faint colored ring/outline behind the hero portrait when shielded.
    const t = performance.now() / 80;
    const pulse = (Math.sin(t) * 0.5 + 0.5) * 0.6 + 0.4;  // 0.4..1.0
    const c = this._shield_immune ? CYAN : LBLUE;
    ctx.save();
    ctx.globalAlpha = pulse * 0.6;
    // Two concentric outlines around the hero area
    drect(c, 33, 59, 36, 40, true);
    drect(c, 32, 58, 38, 42, true);
    ctx.restore();
    // Show remaining turns next to it
    dtext(`S:${this._shield_turns}`, 70, 92, c);
  }

  _do_combat_round(){
    const m = this.combat_mon, p = this.p;
    let atk = p.total_atk() + this._scroll_dmg; this._scroll_dmg = 0;
    if(p.has_perk("berserker") && p.hp/p.max_hp < 0.3) atk += p.perk_val("brsk");
    const is_crit = p.roll_crit();
    let pdmg = Math.max(1, atk - m[4] + Math.floor(Math.random()*4) - 1);
    if(is_crit) pdmg = Math.max(2, pdmg * 2);
    m[2] -= pdmg;
    let thorn = 0;
    if(p.armor){
      for(const e of (p.enchants[p.armor] || [])){
        if(e[3] === "thorn") thorn += e[4];
      }
    }
    if(thorn && m[2] > 0) m[2] -= thorn;
    // Burn DoT (from Fire scroll)
    let burn_done = 0;
    if(this._burn_turns > 0 && m[2] > 0){
      burn_done = this._burn_dmg;
      m[2] -= burn_done;
      this._burn_turns--;
      if(this._burn_turns <= 0){ this._burn_dmg = 0; }
      burst(64, 28, ORANGE, 8);
    }

    FX.combat_target_flash = 4;
    if(is_crit){
      shake(6); flash(YELLOW, 6);
      burst(64, 28, YELLOW, 16);
    } else {
      shake(pdmg > 12 ? 3 : 2);
      burst(64, 28, RED, 8);
    }
    const burn_tag = burn_done > 0 ? `+B${burn_done}` : "";
    const dmg_label = (is_crit ? `CRIT!${pdmg}` : `${pdmg}`) + burn_tag;

    const alive = m[2] > 0;
    let mdmg = 0;
    let shield_blocked_outer = false;
    if(alive){
      let raw = Math.max(0, m[3] - p.total_def() + Math.floor(Math.random()*3) - 1);
      if(p.has_perk("ninja") && Math.floor(Math.random()*100)+1 <= p.perk_val("dodge")){
        this.combat_msg = `DODGE! You:${dmg_label}`;
        this.cphase = 1; return;
      }
      if(raw > 0 && p.has_perk("dungeon_born") && !p.immune_used){ raw = 0; p.immune_used = true; }
      // Arcane Shield blocks monster damage
      let shield_blocked = false;
      if(this._shield_turns > 0){
        if(raw > 0){ shield_blocked = true; raw = 0; }
        this._shield_turns--;
        flash(this._shield_immune ? CYAN : LBLUE, 3);
      }
      shield_blocked_outer = shield_blocked;
      mdmg = raw; p.hp -= mdmg;
      if(mdmg > 0){ shake(2); flash(RED, 3); FX.combat_attacker_offset = 2; }
      if(m[11] > 0 && Math.floor(Math.random()*100)+1 <= m[11]){
        // Status applies unless major shield's status immunity kicked in this turn
        const status_blocked = shield_blocked && this._shield_immune;
        if(!status_blocked && p.apply_status(m[12], 4)){
          const sn = STATUS_NAMES[m[12]] || "?";
          const dmg_tag = shield_blocked ? "BLK" : `${mdmg}`;
          this.combat_msg = `You:${dmg_label} F:${dmg_tag}+${sn}`;
          this.cphase = 1; return;
        }
      }
    }
    if(!alive){
      m[10] = false;
      let gold = m[6];
      if(p.has_perk("scavenger")) gold *= p.perk_val("gold_m");
      if(p.weapon){
        for(const e of (p.enchants[p.weapon] || [])){
          if(e[3] === "gold") gold += m[6] * e[4];
          if(e[3] === "life") p.hp = Math.min(p.hp + e[4], p.max_hp);
        }
      }
      if(p.has_perk("bloodthirst")) p.hp = Math.min(p.hp + p.perk_val("blood"), p.max_hp);
      p.gold += gold;
      if(Math.random() < 0.45){
        const item = randomLoot(p.floor);
        if(p.inventory.length < 20) p.inventory.push(item);
      }
      const leveled = p.gain_xp(m[5]);
      this.combat_msg = `Win! +${m[5]}XP +${gold}G`;
      burst(64, 28, GOLD, 16);
      this.cphase = 1;
      if(leveled){
        p.do_level_up();
        FX.level_flash = 30;
        this.perk_pool = getPerkChoices(p, p.perk_choices);
        this.perk_cur = 0;
        this.gs = GS_LEVELUP;
      }
      return;
    }
    const final_foe_tag = shield_blocked_outer ? "BLK" : `${mdmg}`;
    this.combat_msg = `You:${dmg_label} Foe:${final_foe_tag}`;
    this.cphase = 1;
    if(p.hp <= 0){
      if(p.has_perk("phoenix") && !p.revive_used){
        p.hp = 5; p.revive_used = true;
        this.show_msg("PHOENIX revive!");
        burst(SW/2, SH/2, GOLD, 24);
        this.cphase = 0;
      } else this.gs = GS_GAMEOVER;
    }
  }

  // ── CHEST / LEVELUP / GAMEOVER ────────────────────────────────────
  tick_chest(){
    clear_screen(BLACK); draw_hud(this.p); this._draw_tiles();
    draw_particles();
    drect(BROWN, 16, 44, 96, 40);
    drect(GOLD, 16, 44, 96, 40, true);
    // Pulsing sparkle around chest text
    const g = (Math.sin(performance.now()/200) * 0.5 + 0.5);
    ctx.fillStyle = `rgba(255,255,0,${0.4 + g*0.4})`;
    ctx.fillRect(20, 46, 88, 2);
    dtext("A CHEST!", 30, 48, GOLD);
    dtext(this.chest_item.slice(0,18), 20, 60, WHITE);
    dtext("A: Take", 46, 74, GRAY);
    const e = poll();
    if(e.a || e.b) this.gs = GS_DUNGEON;
  }

  tick_levelup(){
    clear_screen(BLACK);
    // background sparkle
    if(Math.random() < 0.3){
      burst(Math.random()*SW, Math.random()*SH, GOLD, 1);
    }
    draw_particles();
    drect(PURPLE, 8, 6, 112, 116);
    drect(GOLD, 8, 6, 112, 116, true);
    const p = this.p;
    dtext("LEVEL UP!", 34, 12, GOLD);
    dtext(`Level ${p.level}`, 36, 22, YELLOW);
    dtext(`HP:${p.max_hp} ATK:${p.total_atk()}`, 12, 32, GREEN);
    dtext("Choose Perk:", 22, 43, WHITE);
    for(let i=0; i<this.perk_pool.length; i++){
      const pk = this.perk_pool[i];
      const py = 55 + i*20;
      const sel = (i === this.perk_cur);
      drect(sel ? DBLUE : DGRAY, 12, py-1, 104, 18);
      drect(pk[6], 12, py-1, 104, 18, true);
      dtext(pk[1].slice(0,16), 14, py, WHITE);
      dtext(pk[2].slice(0,18), 14, py+9, GRAY);
    }
    dtext("U/D:Pick A:Take", 16, SH-12, GRAY);
    const e = poll();
    if(e.u) this.perk_cur = Math.max(0, this.perk_cur-1);
    else if(e.d) this.perk_cur = Math.min(this.perk_pool.length-1, this.perk_cur+1);
    else if(e.a && this.perk_pool.length){
      const pk = this.perk_pool[this.perk_cur];
      p.perks.push(pk);
      if(pk[3] === "maxhp"){
        p.max_hp += pk[4];
        p.hp = Math.min(p.hp + pk[4], p.max_hp);
      }
      this.show_msg(`Perk: ${pk[1].slice(0,12)}`);
      burst(SW/2, SH/2, pk[6], 24);
      this.gs = GS_DUNGEON;
    }
  }

  tick_gameover(){
    clear_screen(BLACK);
    // Atmospheric red flicker
    const flick = (Math.sin(performance.now()/300) * 0.2 + 0.8);
    ctx.fillStyle = `rgba(80,0,0,${flick*0.3})`;
    ctx.fillRect(0, 0, SW, SH);
    drect(DRED, 8, 20, 112, 88);
    drect(RED, 8, 20, 112, 88, true);
    dtext("THOU HAST", 24, 28, RED);
    dtext("  FALLEN  ", 24, 40, RED);
    const p = this.p;
    dtext(`Floor ${p.floor}`, 36, 56, WHITE);
    dtext(`Level ${p.level}`, 36, 68, YELLOW);
    dtext(`Gold: ${p.gold}`, 30, 80, GOLD);
    if(p.banked > 0) dtext(`Banked: ${p.banked}`, 22, 92, GOLD);
    dtext("A: Title", 36, 104, GRAY);
    const e = poll();
    if(e.a || e.b){
      const banked = this.p.banked;
      this.p.reset();
      this.p.gold += banked;
      this.gs = GS_TITLE;
    }
  }

  // ── MAIN TICK ─────────────────────────────────────────────────────
  tick(){
    update_fx();
    const g = this.gs;
    if(g === GS_TITLE) this.tick_title();
    else if(g === GS_VILLAGE) this.tick_village();
    else if(g === GS_DUNGEON) this.tick_dungeon();
    else if(g === GS_COMBAT) this.tick_combat();
    else if(g === GS_BOSS_COMBAT) this.tick_boss_combat();
    else if(g === GS_SHOP) this.tick_shop();
    else if(g === GS_CHEST) this.tick_chest();
    else if(g === GS_LEVELUP) this.tick_levelup();
    else if(g === GS_GAMEOVER) this.tick_gameover();
    else if(g === GS_ENCHANT) this.tick_enchant();
    else if(g === GS_BLDG) this.tick_bldg();
    else if(g === GS_DIALOG) this.tick_dialog();
    else if(g === GS_HOME) this.tick_home();
    else if(g === GS_SCROLL_PICKER) this.tick_scroll_picker();
  }
}

// ════════════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════════════
const game = new Game();
let last = 0;
function loop(t){
  // 30 FPS feel — Thumby Color targets similar
  if(t - last >= 33){
    last = t;
    game.tick();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// Focus canvas so keys work
canvas.tabIndex = 0;
canvas.focus();
window.addEventListener("click", () => canvas.focus());
</script>
